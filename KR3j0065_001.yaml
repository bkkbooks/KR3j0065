body:
  text: 徐氏筆精卷一明徐􅎾撰易通潛龍勿用鄭氏曰乾初一畫有初九潛龍勿用之象故聖人係之以潛龍勿用之辭朱子分潛龍為象勿用為占似支離決裂如九二見龍在田亦是一氣語坤之六二有占無象是其證也天行健胡安定曰天形蒼然一晝一夜行九十餘萬里故曰天行健人身小天地上有天關下有地軸若能迴天關轉地軸上下徃來一息一周天矣君子自强不息欲吾身内運轉如天之行健耳潛龍勿用陽在下也婁東張元蒙曰孔子發明曰陽在下也陽氣潛藏在下者非有時而在上也即在上者常在下也潛藏者非有時而發用也即發用者常潛藏也此聖人退藏於密老子書皆主此故曰猶龍雲從龍風從虎楊氏慎曰張璠從音隨從之從去聲雲出則龍必從之風出則虎必從之猶曰龍從雲虎從風也今按此説甚異諸家而有至理凡龍起必雲生謂龍能致雲非也虎出必風生謂虎能致風非也猶蟻徙必雨乃雨氣感蟻蜥蜴聚必雹乃雹氣感蜥蜴謂蟻能作雨蜥蜴能作雹可乎古人多倒語成文後人不達便成滯義古樂府云虎嘯谷風起龍興景雲浮無怪乎今之誤也至哉坤元萬物資生徐氏曰至哉坤元萬物資生乃順承天夫人之元氣藏於腹猶萬物之藏於坤神入氣中猶天氣降而至地氣與神合猶地上而承天天地以此而生物吾身以此而生育太𤣥經云藏心於淵美厥靈根參同契云恒順地理承天布宣本易㫖也必有餘慶黄氏震曰慶當作平聲與下文殃字協韻上文乃終有慶亦與應地無疆平聲相協暌卦志行也徃有慶也亦協韻益卦其道大光中正有慶亦協韻他如井困豐兑凡易中慶字無不與平聲協韻者黄中徐氏曰坤為腹故太𤣥以坤為黄宫黄宫即黄庭也黄屬土而在中又曰黄中艮卦行其庭即黄庭也道書解極𤣥奥宋儒釋之淺矣九五屯其膏小貞吉大貞凶楊氏曰漢書谷永傳引此文孟康註云膏者所以入潤肌膚爵禄亦所以養人也小貞臣也大貞君也遭屯難饑荒君當開倉廩振百姓而反吝則凶臣吝嗇則吉也利用刑人張氏鼎思曰初六發蒙利用刑人用説桎梏以徃吝三原王氏曰利用刑人刑即書所謂扑作教刑學記稱夏楚二物是也責之以警其怠惰使之從教程傳威之以刑者所以説去昏蒙之桎梏也若痛懲有甚於擊蒙似拷訊罪者非發蒙之道也需于沙衍在中也楊氏曰衍寛平之地也左傳地名有昌衍漢書地名有鄜衍衍之文亦承需沙為義也孟喜易文辭作需于沙衍天與水違行張氏曰象曰天與水違行訟先儒謂天在上水在下其行相違故訟或謂上下體也非行也違者天西旋水東注有相左之義故取此象訟也或錫之鞶帶張氏曰鞶帶命服之飾草廬吴氏以為革帶所以繫鞞繫佩凡命服先束革帶乃加大帶禮曰男鞶革即此帶也先儒就以鞶帶為大帶葢未詳耳丈人黄氏曰程云尊嚴之稱朱云長老之稱丈者黍龠尺引之積王充論衡云人形以一丈為正故名男子為丈夫尊翁嫗為丈人此説亦可補諸説淮南子謂老者杖於人為丈人毒天下之民徐氏曰師卦以此毒天下之民而民從之朱子注毒害也凡有害於民則民弗從許慎説文毒音篤訓生厚也從生母㑹意䓯音獨傷害也從草毒諧音二字聲音訓義皆有分别風行天上陳潛室曰風行天上似無蓄聚之理何以謂之小畜風者披揚解散之意今為風矣而止行于天之上是猶有物止蓄而未得解散所以成畜之小輿説輻吴草廬曰輿説輻與大畜九二輿説輹同殊不知大畜小畜義異安得以為同一輹哉葢輹伏莵也在軸之上承輿者車不行則脱之大畜陽能自止欲不行則説輹也小畜則陽與隂爭有傷於輻而説之不得行也則輹主於不欲行亦有辨耳有所疑張氏曰君子征凶有所疑也疑舊作礙謂畜道已成抗陽之時也隂抗陽如小人害君子其徑路必為布置阻礙動則不利君子安得行乎礙且與韻叶其旋元吉黄氏曰旋字上連視履恐是旋踵之旋苞桑張氏曰其亡其亡繫于苞桑今之解者以苞桑為固結之喻非也苞桑豈固結之物乎葢古人朽索六馬虎尾春冰之類也陸宣公收復河北後請罷兵狀云邦國之杌隉綿綿聮聮若苞桑綴旒幸而不殊者屢矣此得其解簮猗覺寮曰豫之九四朋盍簮王弼云盍合也簮集也謂朋來之速子美云盍簮喧櫪馬列炬散林鵶以簮為冠簮之簮古冠有笄不謂之簮簮後人所名弼言為是澤中有雷臨川鄒氏曰澤中有雷此收聲于兑之時也不事王侯焦氏竑曰蠱之五爻皆言幹父之蠱至上九則曰不事王侯髙尚其事象曰不事王侯志可則也後人往往引四皓子陵解此一爻誤矣出則事公卿入則事父兄不事王侯此索隠行怪之為聖人不取也禮曰八十者一子不從政九十者其家不從政上九處卦之終當父母耄期之日不出從政非所以要譽鄉黨朋友非惡干禄而然葢知尊尚孝徳者也曽子居魯齊欲聘為卿曽子曰吾父母老不忍違親以為人役斯人也其百世之師歟故曰志可則也雷電噬嗑黄氏曰程朱諸家皆言于卦合云電雷今云雷電者字相類而誤惟鄒氏謂象亦云雷電合而章不必以是疑經文此卦雖離上震下然陽氣将震發乃閃然成火故雷與電止一氣而雷為主電者雷之精光如爆杖火一出而聲即透亦主在聲雷電非其他判然二象之比彖言雷電合而章語意絶好經文未必誤也噬乾胏得金矢徐氏曰王肅注易十卷今不傳其注噬乾胏得金矢曰四體離隂卦骨之象骨在乾肉脯之象金矢所以獲野禽故食之反得金矢君子于味必思其毒于利必備其難見太平御覽賁于丘園束帛戔戔張氏鳯翼曰賁于丘園束帛戔戔吝終吉是言人君禮聘賢才令光生丘園也宋王敬宏奏云宜加旌聘賁于丘園以彰止遜之美即是此意但聘賢之禮貴乎厚而戔戔其薄者以隂性吝嗇故耳然禮賢自是盛典故終可以得吉以杞包𤓰蔡節齋曰五與初無相遇之道猶以髙大之把包在地之𤓰惟當自畜其徳以待之其有隕墜乃出於天非人所能為也楊氏曰太𤣥蒼木維流厥美可以逹于𤓰包先王以至日閉闗商旅不行后不省方慈溪黄氏曰商旅至賤也后至貴也上自后下至商旅皆以安靜為事此説諸家未之及也葢若不如此兩下總提則先王與后分為兩主人矣何天之衢長洲張氏曰何梁武帝作荷負也王延壽魯靈光殿賦云直荷天衢以元亨程子曰天之衢亨誤加何字朱子曰何天之衢何其通達之甚也讃之也俞玉吾集説引晦叔王氏曰荷當作行以上四説均于易有禆而晦叔王氏似尤簡明過涉滅頂凶无咎張氏鳯翼曰大過辭云過涉滅頂凶无咎趙温與李𣙜書謂一為過再為涉三而弗改則滅其頂凶可見无咎云者葢言無所歸咎如易所謂又誰咎也本義與此義殊遇坎有酒徐氏曰坎之六四樽酒簋貳用缶需九五需于酒食未濟上九有孚于飲酒困九二困于酒食卦皆有坎文王周公以酒告戒其象見于易三爻皆陽剛制之之意也坎不盈祗既平張氏曰祗既平祗鄭作坻水渚也詩宛在水中坻説文云小渚坎之象也澤水盈科而後進九五坎之陽流而不盈適平于坻而已葢陽剛中正而能出險之象離麗也黄氏曰古説皆以為附愚恐亦兼文明之意如日月麗乎天百穀草木麗乎土重明以麗乎正皆有華麗氣象不特言附著而已咸其脢徐氏曰古註云脢心之上口之下進不能大感退亦不為無志其志淺末故無悔而已背肉之説起于程朱肥遯焦氏竑曰遯卦肥遯无不利肥字古作􅖦與古蜚字相似後世同譌為肥字九師道訓云遁而能飛吉孰大焉張平子思𤣥賦云欲飛遁以保名曹子建七啓云飛遁離俗金陵攝山碑緬懐飛遁皆可證焦氏之説本姚西溪叢語大壯則止大壯則止遯則退也熊氏曰大壯剛以動而曰止非其象矣止葢上字之誤大壯之勢陽上而不已遯則陽退諸家之説紛紛多牽合無取也晉如鼫䑕鼫䑕子夏康成皆作碩碩大也二三四五艮象䑕九陽為大䑕本草指為螻蛄項本菴以土狗言皆非箕子陸氏深曰明夷箕子以之漢趙賓訓箕子者隂陽之氣萬物方荄滋非商箕子也賓蜀人晉晝明夷誅晉書明夷誅也誅孫奕作昧明出地上為晝明入地中為昧得反對之義闗子明曰蒙昧者厥道求乎明明夷亦昧也昧不明葢傷之也孫奕本此風自火出濳室陳氏曰風自火出何以謂之家人猶言風化自内出也火文明之徳夫夫婦婦父父子子兄兄弟弟即内文明之象一家之風化由嚴明中來所以一卦多尚嚴明馬為曳其于馬也為曳邵氏雍曰馬字誤當作其于輿也為曳易曰見輿曳又曰曳其輪輿有曳而馬無曳也位正當也毛晃曰易當位不當位皆作平聲讀俗作去聲讀誤蹇利西南不利東北劉子新論利西南就土順也不利東北登山逆也龜弗克違徐氏曰程傳云或益之一句十朋之一句龜弗克違即書云龜從之意莧陸夬夬徐氏曰夬卦九五莧陸夬夬稽攷萈誤作莧朱子注莧即馬齒莧按許氏説文萈音桓山羊細角者象山羊蝸角形寬字諧其音易傳澤天夬為兑兑為羊見闗朗易傳萈陸顔氏玩詞曰萈音丸山羊也陸其所行之路也猶鴻漸于陸之陸兑為羊在上卦有山羊之象􅎾按説文莧山羊細角也從兎足莧聲讀若丸萈字從此徐鍇按本草注莧羊似鹿羊角有文俗作羱學齋佔畢曰莧陸草之柔脆者也決之至易故曰夬夬以莧陸為一草至馬鄭曰莧陸商陸也以莧陸為一物宋衷云莧莧菜也陸商陸也虞云莧蕢也陸商也然後别而為二至注疏正義乃引子夏傳云莧陸木根草莖剛下柔上馬融鄭𤣥王肅皆云莧陸一名商陸皆以莧陸為一惟董遇云莧人莧也陸商陸也以莧陸為二終不訂其或一或二異名之説余因謂釋經莫若爾雅為正且祖因証之爾雅疏草部云蕢赤莧釋曰赤莧一名蕢今莧菜之赤莖者也又曰遂薚釋曰藥草商陸也一名當陸初無莧陸一名商陸之説則莧自莧陸自陸莧為菜陸為草其為二物明甚宋謂之菜虞謂之蕢董謂之人莧三家之説得之矣萃亨徐氏曰萃聚也民富物阜財力有餘之時也萃則亨矣經文原有亨字解之未嘗不通本義以亨字衍文豈以彖文不及亨字乎太拘矣用大牲太倉陸氏曰萃卦用大牲吉大牲者坤為衆為牛牛乃牲之大者以萃時而有此象如其象而用之可也困于酒食朱紱方來徐氏曰二以剛處困無酒食以施惠困于酒食之少也乃朱紱之貴卒然而來困吝不足可知已利用享祀乃利用禴之意薄祭只可羞鬼神而巳豈可以奉王公也哉困于赤紱徐氏曰困之九五劓刖困于赤紱乾鑿度曰文王在諸侯之位上困于紂也天子三公九卿朱紱諸侯赤紱利用祭祀徐氏曰困九五曰利用祭祀謂明雖困于人而幽可感于神豈以人不能知而鬼獨知之乎孔子曰知我者其天乎韓子云惟乖于時乃與天通不求人知而求天知處困之道也木上有水井君子以勞民勸相張元蒙曰以木為器汲水而上井之象君子法井之象制為井田使民服田力穡勤勞于下供給乎上勸其相助不敢惰農自安亦井養而不窮也卦以養人為義象以使民交相養為義井收勿幕徐氏曰井收者井口之臼亦一井之體收于此也掘井及泉渫之使清甃之使固自下而上至于井收則井之功畢矣井甃者所以禦惡于内井收者所以禦惡于外收以禦惡非杜人之汲也故禁之使勿幕已日乃孚張氏曰經典義理之説最為無窮以故解釋傳疏自漢至今不可槩舉至有一字而數説者姑以周易革卦言之已日乃孚革而信之自王輔嗣以降大抵謂即日不孚已日乃孚已字讀如音矣葢其義亦止是耳唯朱子發讀為戊己之己洪适曰昔與易僧曇瑩論及此曰或誤作己音紀日何如瑩曰豈惟此也雖作己日亦有義乃言曰天元十干自甲至己然後庚庚者革也故己日乃孚猶云從此而革也十二辰自子至巳六陽數極則變而之隂于是為午故巳日乃孚猶云從此而變也用是知好奇者欲穿鑿附㑹固各有説云豹變君子豹變言變而為豹也揚子曰貍變則豹所謂豹變大人虎變言變而為虎也揚子曰豹變則虎所謂虎變厲薫心學齋佔畢曰唐李鼎祚所集易傳李巽嵒序引頗取之予近詳觀則皆漢晉諸儒之解虞翻一家頗多而稍的切于𤣥弼之上宜乎自詭以夢吞三畫也其在艮卦之九三艮其限列其夤厲薫心今易作薰心而李本作閽心且引虞翻注曰限腰帶處也坎為腰五來之三坎為心厲危也艮為閽閽守門人坎盜動門故厲閽心古閽作薰字馬因言薰灼其心未聞以坎水薰灼人也荀氏以薫為勲或又誤作動皆非也大率鼎祚六十四卦皆指動爻互體卦為説非後人之所及又于鼎卦鼎象也注引虞翻曰六十四卦皆觀繫辭而獨于鼎言象何也象事知器故獨言象也尤為有理余又按艮為閽寺乃易繫辭説卦虞翻援引非曲學也徐氏筆精卷一
