body:
  text: 徐氏筆精卷二明徐􅎾撰易通上九鴻漸于陸徐氏曰注疏皆言于陸漢儒無釋逵字之說唐陸羽筮得此爻因以為名為字何程子臆改之後朱子依之後人習而不察也若謂以韻讀之則鴻漸于干小子厲亦謂之協韻可乎歸妹以須本義曰須女之賤者未竟其說嘗考之天官書須女四星陸氏震云織女三星貴須女賤此取象之意也漢上之說亦然帝乙歸妹王氏應麟曰帝乙歸妹子夏傳謂湯之歸妹也京房載湯嫁妹之詞曰無以天子之尊而乘諸侯無以天子之貴而驕諸侯隂之從陽女之順夫本天地之義也往事爾夫必以禮義荀爽對䇿引帝乙歸妹言湯以娶禮歸其妹于諸侯也張說鄎國公主銘亦曰帝唐降女天乙歸妹若左傳筮遇泰之需曰微子啓帝乙之元子也虞翻亦云紂父二說不同正義皆略之楊慎曰帝乙殷之賢君尚書所謂成湯至于帝乙罔不明德恤祀是也史記云帝乙時殷道益衰此皆經之說也後世注易者因史記之言遂以帝乙為成湯則易與尚書又相矛盾矣信史而疑經其弊有如此者嗚呼一代之君聲迹豈微乎其善惡之名傳信傳疑一彼一此况史之紀録一人一事之得失可盡信乎徐氏曰􅎾按乾鑿度云歸妹八月卦也陽氣歸下隂氣方盛故復以見湯妹之嫁以天子貴妹而能自卑順從變節也孔子曰自成湯至帝乙帝乙湯之𤣥孫之孫也此帝乙即湯也殷尚質以生日為名順天性也𤣥孫之孫外恩絶矣同以乙日生疏可同名乾鑿度與京氏合湯名帝乙無疑矣君子以居賢德善俗徐氏曰王弼注賢德以止巽則居風俗以止巽乃善此說既不失經㫖且明徹本義疑賢字衍釋經經亡視漢儒為烈矣唐郭京周易舉正云俗字上脫一風字良是史巫紛若徐氏曰史巫皆善口舌紛若丁寧煩悉也巽在床下卑之極矣惟用于史巫則吉祝史之言紛然而多故巽其究為躁卦渙王居黃氏曰此爻渙汗大號之下又曰渙王居者故再提卦名渙字言九五渙之君位也故象曰王居無咎正位也似無散積聚之意豚魚吉張氏曰中孚豚魚吉豚魚先儒皆以為二物朱子以為無知之物則一物耳按吳草廬曰豚魚澤中之物似豬俗謂江豚澤將風則浮出水面有南風則口南向有北風則口北向舟人稱為風信其說是也言誠信能如豚魚則誠能動物吉之道也我有好爵徐氏曰中孚九二好爵當是好雀孟子為叢驅爵漢改元神爵可證古之爵字中孚卦爻皆取象于禽獸豚魚吉有他不燕鳴鶴在隂我有好爵馬匹亡翰音登于天我有好爵吾與爾靡之徐氏曰鳴鶴在隂其子和之我有好爵吾與爾靡之相觀而善謂之摩鳴鶴以相和成聲好爵以相摩成德子夏易說如此今本作縻縻牛纒也取繫戀之義然不如摩厲之說為長以韻讀之又叶也或作劘劘與摩通漢賈山傳自下劘上注音摩厲也剴切之也與易爻摩義合禴祭王氏曰漢郊祀志引西鄰之禴祭顔師古注瀹煮新菜以祭蓋以瀹為禴王輔嗣云禴祭之薄者也沼沚之毛蘋蘩之菜可羞于鬼神亦與顔注同鄭康成謂禴夏祭之名曳其輪濡其尾徐氏曰乾鑿度文王下吕九尾見注云文王師吕尚遂致九尾狐瑞渭濱俱載而歸既濟初九曳其輪濡其尾當是文王事也三爻則引髙宗伐鬼方事濡其首徐氏曰未濟上九以剛明處天下之事可以濟矣雖飲酒宴樂信乎其無灾咎也故曰有孚于飲酒無咎若懷其宴安沈湎無度則又將入于未濟而飲酒之樂信乎其失之故濡其首有孚失是本義如狐之涉水本爻無狐字剝牀徐氏曰剝卦初六剝牀以足六二剝牀以辨朱子注辨牀幹也不知出何故典稽考牀乃戕字之誤按爾雅革中絶謂之辨日月運行一寒一暑楊氏曰日在牽牛則寒東井則暑牽牛水宿逺人故寒東井火宿近人故溫也君子所居而安者易之序也今文作序陸德明曰虞翻本序作象吕東萊曰作象乃與下義合象者立象成器以為天下利也悔吝者憂虞之象也楊氏曰或曰虞度也非也憂則悔矣度何以吝乎古字虞與娛同孟子曰霸者之民歡虞如也戰國䇿顔蠋云晚食以當肉安步以當車無罪以當貴清靜寧固以自虞注虞娛同毛詩小序以禮自虞漢書郊祀歌神嘉虞又合好效歡虞太乙魏相傳君安虞而民和睦闔闢往來徐氏曰一闔一闢謂之變往來不窮謂之通蓋人身之隂陽與天地之隂陽相似若能御呼吸于上下使之周流不息則闔闢往來之妙盡在吾身中矣通則通吾身之關竅也游魂為變林子曰自太虛中來者元神也智慮日長而元神遂化為識神矣故其夢也都從識神而變釋氏四生六道亦從游魂而變故孔子曰游魂為變鬼神情狀徐氏曰神氣聚則物生神氣散則物死又曰隂精陽氣聚而成物神之伸也魂遊魄降散而為變鬼之歸也冶容誨淫楊氏曰冶銷也遇熱則流遇冷則合與冰同志故冶字從冰女之艷媚亦令人銷神流志故美色曰冶也坤為柄俞氏曰柄當作枘乾性圜轉而曲坤性枘方而直故乾圜坤枘相反也震為龍張氏曰說卦震為龍與乾同故虞翻干寶本作龍荀爽九家集解兑後有二曰為常為輔頰注云常西方神也寡髮洪景盧曰考工記車人之事半矩謂之宣注頭髮皓落曰宣易巽為宣髮宣字本或作寡周易巽為寡髮釋文云本又作宣黑白雜為宣髮君不密徐氏曰君不密臣不密幾事不密密者周密也非隱祕也大抵君臣相謀須周詳縝密毋至疏略滲漏致臣下議其短長也若作隱密則君臣相語之際如神出鬼沒之狀矣豈聖人立教之意哉聖人用心光明無不可對人言與天知者也潤之以風雨張氏曰潤之以風雨風未嘗潤也烜之以日月月未嘗烜也楊用修曰古人之文有因此而援彼者有從此而省彼者如沽酒市脯不食酒非可食也大夫不得造車馬馬不可言造也如此類者皆是乾乾夬夬王氏曰乾乾夬夬皆九三重剛也謙謙初六居下卦之下也坎坎六三居重險之間也蹇蹇六二隂居隂也龍飛虎變何孟春曰乾九五龍飛之大人龍飛虎變惟有聖德而在天位者當之龍飛堯舜當之虎變湯武當之九四得金矢六二得黃金黃氏曰傳云金取剛矢取直以九四陽德而言也黃中色金剛物以六五居中處剛而言也諸家皆從其說惟晦菴主周禮獄訟入鈞金束矢而後聽之之說以經說經固尤有據但恐周禮出于王莽之世未必盡皆周公之真若先要取其金而後與之聽訟雖昏亂之世不為况成周之治哉或者劉歆輩欲假此為取貨張本已而即激天下之亂不及施行也耶金矢黃金皆象也非真也洛書方位焦氏曰佛典云戴九履一左三右七二四為肩六八為膝縱橫皆十五而五居其室今所傳膝誤作足亦無五居其室一句獨見于佛書耳終朝三褫楊氏曰鄭康成古注褫作拖朝以道謂如拖紳之拖蓋上剛之極本以訟而得鞶帶不勝其矜而終朝三拖之以誇于人本義作奪非是象曰以訟受服而今以奪解之可乎渙奔其機徐氏曰機與几同有所憑依之象俗誤為杌非也公用亨于天子蘇氏曰亨不必作享字亨通也大有之世廟堂之上通為一體四海之衆通為一家為公者豈無所以上通于君乎古稱羣后肆朝敷奏以言嘉謀嘉猷入告爾后此則人臣所以通于君者也除戎器戒不虞蘇氏濬曰萃之時任武不可忘武亦不可故曰除戎器偃武也其櫜弓歸馬之風乎曰戒不虞不忘武也其重門擊柝之備乎朱子以除為修治竊所未解好遁蘇氏曰好遁言有所好而遁如論語所謂從吾所好也世人之所好者在富貴功名君子之所好者在性天真境世人逐逐乎世味之內君子悠悠乎世味之外此之謂好遁也此惟君子能之而小人不能也如曰有所好而能絶之以遁未免添足鼎折足覆公餗其形渥凶蘇氏曰九四一爻當依本文不宜妄改九四不中不正而處髙位如繫辭所云者折足失其所以行也覆公餗所謂敗乃公事也形渥王弼曰渥沾濡之貌程子曰赧汗也極是大臣以凉德取充位至天下之事敗壞而不可為何面目立于朝廷宜其汗出沾背也朱子以形渥如刑剭且曰重刑按周禮剭誅謂夷三族大臣誤國不應處之極刑非之非矣利用賓于王蘇氏曰用賓非朝覲仕進也必有所不召之臣然後成其大有為之君故利在自重而尚賓易取象易重取象龍血𤣥黃雨于何地日中見斗災于何世載鬼一車見于何人然衆人不以為誣君子不以為怪何也取象也非實也經臆賢賢易色賢賢易色注訓易其好色之心是矣然與下文事父母能竭其力語意不類蓋遇賢人必極其禮貌以敬之色指禮貌而言論語云其次避色亦指禮貌衰也色力身信皆自已身上事一說謂輕易女色而不以為重亦通晏平仲晏嬰諡平仲朱注未詳儺鄉人儺朱注儺雖古禮而近于戲非也按月令十二月紀曰命有司大儺髙誘注曰大儺逐盡隂氣為陽導也與土牛同義今不戲擊土牛送寒氣而戲儺之導陽氣可乎若以為戲則周公所制之禮孔子所行之事皆背戾矣孔子朝服而立于阼階正信而好古上律天時者也負版鄉黨式負版者注云持邦國圗籍者儀禮注曰前有衰後有負版左右有辟領孝子哀戚之心無所不在三者惟子為父母用之夫子凶服者式之式負版者俱哀有喪也若曰周禮重民數殊附㑹矣賢者七人賢者辟世與作者七人注疏原作一章朱子分為兩章注云七人者儀封人荷蕢晨門楚狂接輿長沮桀溺荷蓧丈人也陶潜聖賢羣輔録本漢儒之注而列之朱子云不知其誰何求其人以實之則鑿矣豈漢晉諸賢之說盡謬耶且接辟世章㫖尤有原委另作一章未敢為然深厲淺揭深則厲淺則揭爾雅曰帶以上為厲帶以下為揭襄子晉陽之師亦有帶上帶下之說朱子云以衣涉水則本注疏不遵爾雅蒲盧爾雅云蒲盧蟲也唐敬括蒲盧賦云究政化之所歸于蒲盧而可見負么麼之異族云云全篇以為蟲屬也韓致堯詩云窗裏日光飛野馬案頭筠管長蒲盧亦言蟲也朱子引沈存中蒲葦與爾雅唐賦大異多助寡助鴻門舞劍項伯自蔽沛公此所謂多助之至天下順之寡助之至親戚叛之者也武帝遣李陵屬二師軍陵願得自當一隊帝遣路博德迎李陵博德亦羞為陵後武帝所以覆軍敗將此所謂長子帥師弟子輿尸凶者也仲尼亟稱於水徐子曰仲尼亟稱於水論語川上之歎或指此歟其他經傳不復再見惟荀子宥坐篇及劉向說苑子貢問大水必觀之說孔子答之極詳亦可證亟稱之義焚廩浚井萬章述舜完廩浚井一段當時必書載其事觀其措辭命句非春秋戰國之文也萬章引書以問孟子必先代相傳非臆說也孟子孟子七篇不曽引易一句似不深於易理者也帝力擊壤歌日出而作日入而息鑿井而飲耕田而食帝何力於我哉古本作帝於我有何力哉力字合韻乖居陳貞鉉語豫云朱注引列女傳關雎未嘗見其乘居而匹處者悮也淮南子關雎興於鳥而君子美之為其雌雄不乖居也乘居宜作乖居於義尤得芭杞有三種薄言采芭菜也豐水有芭草也維穈維芭白粱粟也無折我樹杞柳屬也南山有杞在彼杞棘梓杞也集于苞杞隰有杞桋枸檵也荼有三種誰謂荼苦苦菜也有女如荼茅莠也以薅荼蓼陸草也百穀楊泉物理論曰稻粱菽各二十種為六十蔬果之實助穀各二十為四十共名百穀詩曰播厥百穀非漫無所指也淫奔詩有女懷春吉士誘之又云毋使尨也吠儼然寫出淫奔之態小序乃曰惡無禮也而詩意愈晦矣淫奔之詩何處無之寧獨鄭衛哉笙詩詩南陔以下六篇有其聲而亡其辭亡非亡失之亡乃無也宋人辨之不啻數千百言總之於亡字未嘗深味也相鼠埤雅云有一種鼠見人則交其前足而拱謂之禮鼠亦謂拱鼠詩曰相鼠有體人而無禮正謂此也今有人家見鼠作拱揖狀遂以為妖是未識相鼠之性耳鳬雁鳬雁常以晨飛故詩曰明星有爛弋鳬與雁宗法不行詩大雅公劉篇君之宗之注云為之君為之宗上則皆統于君下則各統于宗春秋哀公四年晉人執戎蠻子赤歸于楚左傳云楚司馬致邑立宗以誘其遺民宗法自夏商至周末猶行秦漢而下無聞矣不知廢于何時也文質商尚質周尚文古語也然商頌繁而周頌簡何哉周正辨古今周正之辨紛紛不一溫陵陳𤣥齡引六經語孟最為明白辨曰周正建子六經闕如也其紛紛藉藉以為三正遞建者皆漢以後諸儒之記傳也如尚書大傳如史記如獨斷如元命苞如孔叢子如後漢書皆穿鑿附㑹以周十一月為正夜半為朔八寸為律中黃鍾是也若其他則承訛而襲舛者也如晉董巴如宋邵堯夫朱元晦以十一月斗指於子至十二月斗雖指丑而日月五星乃㑹於子故商正周正皆取於此是也又其他則隨聲而附和者也如程伊川春王正月孔子自行天子之事胡文定夏時冠周月劉和夫三正迭建不止三代是也皆於口授之餘以疑傳疑而未嘗於載籍之中以信考信日懸逺而日支離故竟千古而莫決也吾以為詳周之故者莫備於六經六經今犂然在也當商周之際而未嘗一及改朔之事即細搜博考而無從一徵建子之實其非建子可知也且不特此也六經之中其記時日月者亦不為少然徵之建子而無所可徵至按之建寅則無一而非夏正其非建子而為建寅又可知也夫六經莫先於書書之陳範曰日月之行則有冬有夏謂二至也建子而春冬而秋夏矣二至其何以稱之金縢曰秋大熟未穫天大雷電以風禾盡偃言夏令也周之秋五六月禾方出土安得大熟而盡偃之此書證也繼書莫若詩詩之陳豳風也七月終篇無一而非夏時朱元晦以為追述公劉后稷似也然詩作於周亦周時之云耳强而附於夏無論周公不出此其如生今反古何也小雅采薇諸詩勞還率還役之詩也今年春暮行而其詩曰昔我往矣楊栁依依又曰采薇采薇薇亦剛止其非建子之春暮矣明年夏代者至復留備秋故其詩曰有杕之杜有皖其實日月陽止至過十一月而歸又明年中春至故其詩曰今我來歸雨雪霏霏今我來思雨雪載途又曰卉木萋止女心悲止征夫歸止其非建子之秋春與十一月矣此詩證也六月詩曰六月棲棲戎車既飭詩曰燁燁震電不寧不令皆以建寅言也不然周之六月何以犯司馬法而曰當夏興師且八月雷未收聲何不寧而不令也又如四月之四月維夏六月徂暑秋日萋萋百卉具腓冬日烈烈飄風發發小明之二月初吉載離寒暑臣工之維暮之春亦又何求節節參看其為建寅皆無容置一喙者此又詩證也詩亡而後春秋作春秋魯史魯之厯周厯也隱三年左氏傳云夏四月鄭祭足率師取溫之麥秋又取成周之禾明乎其夏時之夏秋也以為周之四月夏之二月周七八月夏之五六月麥禾其何從取之九年三月庚辰大雨雪傳云書失時也必夏之三月而後建辰月而後雨雪以為大異也莊七年秋大水無麥苗周之秋兩麥未及下種可云無麥耶此春秋證也僖五年八月甲午晉圍上陽問於卜偃對曰童謡云丙之晨龍尾伏辰鶉之賁賁天䇿焞焞火中成軍虢公其奔其九月十月之交乎丙子旦日在尾月在畢鶉火中必是時也旦而鶉火中夏之九十月交非建子之九十月交也甲午至丙子四十三日正十月朔日也十五年秦伐晉卜徒父筮曰嵗云秋矣我落其實而取其材實落材亡其為夏之令也徵矣二十一年夏大旱焚巫尫杜當陽注云周之夏二三四月旱不為災焚巫尫災極也周不災而夏災也成二年二月無氷注云啓而無也建子而二之日鑿氷冲冲何以無氷耶十六年正月雨木氷傳云寒過節也以為過節則夏之正而非周之正又明矣此又春秋證也大戴禮之夏小正夫子之所謂吾得夏時者也戴記之月令所謂周時者也今觀月令之嵗月日時星中辰次與小正有以異乎無以異而以為夏寅而周子何也周禮五官俱以正月之吉始和布令於邦國都鄙非寅正而正月之吉其安能以始和乃若遂大夫正嵗而簡稼器修稼政也媒氏中春而令㑹男女也黨正四時孟月之吉而讀法也其何非夏令也又如旅師用粟而春頒而秋斂也山虞而仲冬斬陽木仲夏斬隂木也籥章中春擊土鼓以迎暑中秋迎寒亦如之司爟季春出火季秋納火也挈壺氏及冬則火爨鼎水而沸之而沃之也又何時而為周令也此又禮證也曽㸃曰暮春者春服既成孟子曰春省耕而補不足秋省斂而助不給非夏正也而暮春何以春服既成而浴沂風舞雩非當秋而斂何省而助不給也又曰七八月之間旱則苗槁矣夏之七八月之間苗豈其穫而無可槁而元晦必以為夏五六也豳風云十月穫稻又云十月納禾稼稼以十月登場去前七八月之間尚有兩月此時苗正望雨之時一不雨而槁甚矣而必强而附之五六月何也嵗十一月徒杠成十二月輿梁成正於農隙之時以平治道塗而必以為周之十一十二月信如所言則築場圃納禾稼之時而勞之以修造橋梁不知病民而虐用之豈所為先王之制耶凡此皆載在六經語孟當時朝廷之所以作事民間之所以興作與夫聖賢之所以刪定里巷之所以歌謡自上及下自周初至戰國人經數十代書傳數百年細細搜索無一不合於夏正不知何故而為三正之說而後人隨聲逐影至於夫子修春秋如春王正月正叔康侯求之而不得其說而一以為夏時冠周月一以為夫子自行天子之事支離穿鑿遂至厚誣吾夫子也或曰胡文定曰前乎周者改年而不改月如伊訓元祀冬十有二月三祀冬十有二月此何以稱也曰商之十二月僅見此二年耳他無所考也彼凡事書年而偶及月若必以此為建丑定案則周書中之惟三月亦再見二月五月十有二年六月亦數見幾何不以周之建二三五六月為嵗首耶曰左氏僖五年正月日南至昭二十年二月日南至此又何說也曰此與襄二十一年九月十月二十四年七月八月日頻食所謂司厯過也失置閏之故也日月無連月頻食之理以失閏亂書夫子因而筆之而無從正定左氏正月南至之說正為是也至二十年二月則益荒矣今用夏正未有十二月冬至者即以為建子而二月乃南至此其為失閏無疑然亦左氏傳之夫子未嘗筆之經也左氏出於西漢之末其為魯魚附㑹不可知然以左質左而為夏正十之九獨二至以失閏而偶不合耳夫吾何知周正吾知有六經語孟而已徐氏筆精卷二
