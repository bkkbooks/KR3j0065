body:
  text: 徐氏筆精卷三明徐􅎾撰詩談古詞有本古樂府巴東三峽猿鳴悲夜鳴三聲淚沾衣杜甫聽猿實下三聲淚本此梁簡文採蓮渡頭擬黃河郎今欲渡畏風波李白郎今欲渡緣何事如此風波不可行本此古辭白石郎臨江居前導江伯後從魚李賀沙浦走魚白石郎本此古辭陳孔驕赭白陸郎乘斑騅李賀陸郎去矣乘斑騅本此唐人作詩必熟讀樂府諸作能化舊為新時時見筆端不為蹈襲風雅屈宋之文出于風韓栁之文出于雅風者動也雅者常也如曾㸃之言志似風三子之言志似雅伯竒之履霜操似風閔子之失紖語似雅栁詩多似風韓詩多似雅太白風多于雅子美雅多于風至于義山飛卿雖本國風然篇篇入鄭衛之響矣繐帳馬策魏武命銅雀臺施六尺牀下繐帳陸機文曰悼繐帳之溟漠至謝朓詩云繐帳飄井幹張正見詩云曲罷繐帷空乃易帳為帷左傳秦繞朝贈士㑹以策李白詩云臨行將贈繞朝鞭乃易策為鞭蓋帳即帷䇿即鞭古今更端用之不嫌杜撰阿嚲回樂府有阿濫堆名曰阿嚲回李白司馬將軍歌羌笛橫吹阿嚲回是也釣竿古今注云釣竿者伯常子避仇河濵為漁者其妻思之而作也每至河側輒歌之後司馬相如作釣竿詩故卓文君白頭吟云竹竿何嫋嫋魚尾何篩篩正引伯常子事以諷相如非漫無所指也如花似乳梁張率對酒詩云如花良可貴似乳更堪珍言酒之香如花色如乳也孝經緯曰酒者乳也乳名本此東鄰棗庾肩吾云池通西舍之流窗映東鄰之棗杜子美詩堂前剝棗任西鄰用庾語耳别賦鮑照升天行云暫遊越萬里近别數千齡江淹别賦暫遊萬里少别千年襲其語也祖陶句陶詩云雖無紀厯志四時自成嵗唐詩云山中無厯日寒盡不知年又云山僧不解數甲子一葉落知天下秋王百谷云此地人家無玉厯梅花開處是新年皆從陶詩變化也茅山僧林和靖茅山老僧詩云一池荷葉衣無盡數畝松花食有餘剛被傍人相問訊老僧今日又移居林和靖詩云山水未深猿鳥少此生猶擬别移居直過天竺溪流上獨樹為橋小結廬二作頗相類然皆蹈襲唐陳羽吳融二絶也羽詩云雖有柴門長不關古烟髙木共身閒猶嫌住近人知處現欲移居入逺山吳融云石臼山頭有一僧朝無香積夜無燈近嫌俗客知踪跡擬向中峯斷石層宿酲中酒詩云憂心如酲徐幹情詩云憂思連相屬中心如宿酲唐人下第詩云氣味如中酒情懷似别人本此六朝詩似唐六朝人詩與唐逈别然有句法類唐者如朔風動秋草邊馬有歸心亂流趨正絶孤嶼媚中川野曠沙岸靜天髙秋月明銅陵映碧澗石竇㵼紅泉歸華先委露别葉早辭風秋河曙耿耿寒渚夜蒼蒼雲去蒼梧野水還江漢流實開盛唐之門户也蹈襲古句晉羊球西樓賦畫棟浮細細之輕雲朱栱濕濛濛之飛雨王勃滕王閣則襲為畫棟朝飛南浦雲珠簾暮捲西山雨也杜甫陽城郡王新樓又襲為碧窗宿霧濛濛濕朱栱浮雲細細輕也唐人多讀古賦往往變化而用之若勃序一篇蹈襲甚多前人拔出不獨落霞秋水而已唐詩蹈襲唐詩往往蹈襲六朝人語句戴叔倫一年將盡夜萬里未歸人則梁武帝一年漏將盡萬里人未歸也郎士元暮蟬不可聽秋葉豈堪聞則吳均落葉思紛紛蟬聲猶可聞也髙適功名萬里外心事一杯中則庾信悲生萬里外恨起一杯中也杜甫薄雲巖際宿孤月浪中翻則何遜薄雲巖際出孤月波中上也滕王閣序王勃滕王閣序云層巒聳翠上出重霄飛閣流丹下臨無地乃襲王屮頭陀寺碑云層軒延袤上出雲霓飛閣逶迤下臨無地又不獨落霞秋水襲庾信也犀渠鮑照白紵歌象牀瑶席鎮犀渠鎮壓席之物即今之鎮子也古者坐必席地以鎮石壓其四角恐捲動不安犀渠即硨磲也梁昭明將進酒宜城溢渠碗中山浮羽巵渠碗亦車渠也獨漉傅𤣥有獨漉篇注云一作獨祿晉歌為鹿字古通用也不知何義汲冡周書王命篇有獨鹿是獸名嵗腴梁武帝江南弄舞春心臨嵗腴嵗腴未詳所出似指豐年而言博山爐古詞楊叛兒歡作沈水香儂作博山爐博山爐上有蓋如山形香烟纒繞不相離也鐵鹿古詞長檣鐵鹿子鐵鹿者以鐵為轆轤而拘帆者故下句云布帆阿那起阿那二字又狀布帆因轆轤而動之意望羊文王操五神運精合謀房兮興我之業望羊來兮按竹書紀年武王駢齒望羊望羊言目如羊之望視五星聚房亦是當時事此文王望武王克商之意孔子學琴於師襄有曰黮而黑頎而長曠如望羊奄有四方非文王孰能為此鄭侯升秕言解曰按釋名望羊陽氣在上舉頭髙似若望之然也輞川詩摩詰輞川詩來者復為誰空悲昔人有注皆未分明蓋輞川舊為宋之問别業摩詰後改為莊此二句蓋指之問而言昔人即之問也余嘗質陳幼孺深然之艇板古樂府暫泊牛渚磯歡不下艇板艇板即今上岸透板也刻本誤作廷板非弓蛇弩蛇漢應彬為汲縣令請主簿杜宣賜酒壁上有懸赤弩照于杯中形如蛇宣惡之謂蛇入腹遂病後至其故處知弩影遂解晉樂廣嘗有親客曰前蒙賜酒杯中有蛇即飲而疾于時河南㕔事有角弓畫作蛇廣復置酒曰復有所見否客曰如初廣告之故沉疴頓愈二事絶相類梁簡文詩云沉疴類弩影杜子美詩云弩影落杯中皆用宣事金碗南史沈炯行經漢武通天臺為表奏之曰甲帳朱簾一朝零落茂陵玉碗遂出人間杜詩早時金碗出人間注杜者謂欲避玉魚故改作金曲為掩護耳金玉兩物安可通用耶焦氏筆乘載盧充金碗足破諸注之妄柿蒂綾杭州古有柿蒂綾白樂天杭州春望詩云紅袖織綾誇柿蒂元張翥詩云為織春袍柿蒂綾樂天自注云柿蒂花者尤佳施肩吾詩云朝織葡萄綾不知出何地鶴雲易緯立春雲如白鶴唐魏徴郊祀樂章云鶴雲旦起言青帝也走竿丸劍走竿丸劍之戲古已有之至宋齊尤盛何承天詩云修標多巧捷丸劍亦入神標竿也丸劍能縮劍成丸而復伸之也今倭國有軟刀亦丸劍之遺制馬飾鐵裲襠鐵􅰷鉾鏤渠鞍皆馬上飾鞍之具苻融云齊著鐵裲襠又云齊著鐵􅰷鉾徐陵云雕鞍名鏤渠渠即車渠也鱗風吹水上紋如魚鱗郭璞詩閶闔西南來潛波渙鱗起言兌為閶闔風水波渙然如魚鱗之起也若認鱗為魚則索然無味矣撲朔撲渥撲朔兔走也木蘭辭雄兔腳撲朔又作撲渥東坡詩寒窗暖足來撲渥日三竿今作詩者用日三竿按齊書天文志永明五年十一月丁亥日出三竿其色黃赤暈三竿之說本此僑裝客裝一曰僑裝鮑照云僑裝多闕絶旅服少裁縫井如六博楊用修云二十八宿井星形似六博乃詩人北斗挹酒漿之意余按陳謝燮詩云井公能六箸玉女解投壺周王褒詩云誰能攬六博還當訪井公按神異經云穆天子東征與井公博三日不決井公指人也用修語想别有據勞劍劍屢殺人曰勞劍唐鮑溶詩云閒弓失月影勞劍無龍光勞劍即勞薪之例軒帆謝惠連詩軒帆遡遙路軒帆即車舟也羅塵羅塵羅襪之塵也顧野王艷歌行羅塵笑洛妃又云豈知洛渚羅塵步新竒可愛薤葉簟薤葉簟紋之細如薤葉也陸龜蒙詩云小簟風來薤葉凉砂牀陸龜蒙云自拂烟霞安筆格獨開封檢試砂牀按五溪蠻地産丹砂石之不碎而砂附其上者名砂牀見宋輔溪蠻叢笑委蛇詩羔羊曰委蛇離騷曰載雲旗之委蛇一本作逶迤一本作逶移劉向九嘆曰遵江曲之逶移張衡西京賦曰聲清暢而委蛇孫綽天台賦曰路威夷而修通潘安仁金谷詩曰峻坂路威夷漢書作逶蛇樂郊詩有水出逶夷蓋聲同而字屢變不妨通用惟韓退之石鼓歌蛇字叶陀昔耶蒼苔一曰昔耶梁王僧孺詩云夜風吹熠耀朝光照昔耶又南方草木狀素馨花一名昔耶茗烽唐邉塞未嘗置驛以烽計程張說云黑山烽外陳雲開回樂烽前沙似雪可證岑參云苜蓿烽邉逢立春戎昱云山頭烽子聲聲呌烽子守烽卒也外獎謝靈運詩云沮漳自可美客心非外獎江淹詩云得失非外獎言內有所樂非外人所能勸獎也噫嘻吁蜀人見物驚異必曰噫嘻吁李白蜀道難用方言也古文未見此三語耳更㸃唐更漏二十五㸃故云二十五聲秋㸃長宋減初更二㸃五更二㸃本朝依之南叶心韻南字古叶心韻詩經凱風自南吹彼棘心漢鐃歌美人歸以南駕車馳馬美人傷我心蘇頲幼稱捷悟避裴談諱誦枯樹賦易其韻曰昔年楊栁依依漢隂何不押心字韻以誦之以叶江潯之句乎寧音寧古韻叶平聲與沈韻庚青通用漢郊祀歌云穰穰復正直往寧馮蠵切和疏寫平疆場疆場左傳讀易韻陳後主馬草報疆場叶陽字韻唐人多叶陽亦失考耳車字叶韻車叶魚又叶麻韋昭曰古無居音自漢以來始有也然易暌卦先張之弧後脫之弧見豕負塗載鬼一車已協居韻矣櫓字誤古詞張罾不得魚不櫓罾不歸櫓字恐是魚字之誤各本俱作櫓于義不暢岫爾雅曰山有穴曰岫陶淵明云雲無心以出岫是也謝𤣥暉云窗中列逺岫徐季海云孤岫龜形在皆誤用耳後世盡以岫為峯去爾雅逺矣白苧舞古辭晉白苧舞歌分作三首首章用兩韻至晉世方昌樂未央意盡矣質如輕雲色如銀另是一首豈當初編次之誤遂相沿襲耶伯竒稱考尹伯竒履霜操履朝霜兮採晨寒考不明其心兮聽讒言按父沒則稱考子竒投河而死吉甫尚在此必後人述之之作也騎吹鼓吹古樂府騎吹鼓吹曲有分别列殿廷者名鼓吹從行者名騎吹木蘭辭木蘭辭女子代父從征之作也中有可汗大㸃兵之句按後魏太武帝時蠕蠕始自號伊利可汗則是辭當是晉以後人所作也或者疑萬里赴戎機關山度若飛朔氣傳金柝寒光照鐵衣四句如唐人詩遂以為唐人僞為之者不知齊梁如此句甚多也如玉珂鳴戰馬金距鬬場雞蓮花穿劍鍔秋月掩刀環絶漠衝風急交河夜月明等句不類唐人句法耶如當窗理雲鬢對鏡貼花黃大類齊梁口吻豫謂此辭出齊梁作者無疑崔皓李白崔皓黃鶴樓詩古今絶唱首起四句渾然短歌句法也李白鳯凰臺效之聲調亦似歌行今人槩收入律恐未必當唐人律格甚嚴漢陽樹對鸚鵡洲青天外對白鷺洲謂之歌體則自然謂之律體則遷就矣匡山子美憶李白詩匡山讀書處頭白好歸來趙子常及諸注皆謂其指廬山五老峰而言也唯修可引白墓在蜀之彰明有大小匡山白讀書于大匡山有讀書臺尚存非潯陽之廬山也余謂以指蜀之匡山為是蓋甫時在蜀而憶白之在夜郎故云歸來若是廬山則來字無著落而讀書處又無實事矣髙適學詩史言髙適五十始學為詩辨者以為不然豫觀子美云歎息髙生老新詩日又多曰老曰新則適學詩之遲可見矣樊川别集杜牧樊川集語多猥澀惟别集句調新清宋姚西溪以别集為許渾詩言之有據且今世許集傳本多鬱林詩蓋渾曾至鬱林也杜牧未有粵西之行而别集忽有松牌出象州之句似可證非牧詩然其中又有寄許渾并華堂今日綺筵開詩乃牧之作然疑信相半千載而下莫能為之分别也天馬歌李白天馬歌馬之形態悉備儼然相馬經也中云白雲在天丘陵逺崔巍鹽車上峻坂諸本天字上增一青字遂失句讀相思子筆叢謂唐人骰子近方寸凡四㸃當加緋者或嵌相思子其中溫庭筠詩云玲瓏骰子安紅豆入骨相思知也無相思子即今紅豆也愚按嶺南閩中有相思木嵗久結子色紅如大豆故名相思子每一樹結子數斛非即紅豆也惟和兄子夜歌云紅豆落深坑到底相思子亦沿襲溫語之誤糾卿雲歌卿雲爛兮禮漫漫兮禮字乃糾字之誤糾似禮又誤作禮失之逺矣糾紛也注云郁郁紛紛即糾字之義見宋書樂志人皆未考耳康浪寧戚歌滄浪之水白石粲滄當作康齊有康浪水見一統志滄浪楚水也剔齒纎仙人鄭思逺常騎彪故人許隱齒痛求治鄭拔彪鬚及熱插齒間即愈陸雲與兄機書曰有剔齒纎一枚以寄兄所謂纎者疑是此類趙子昂老態詩云食肉先尋剔齒纎今皆作籖詩題誤郎士元送南史云雨餘清巷靜獨酌送殘春車馬雖嫌僻鶯花不厭貧蟲聲粘户網鼠跡印牀塵借問山陽㑹如今有幾人通篇全非送别語諸選本俱相仍未有考其本題者葉想衣裳太白清平調雲想衣裳花想容蔡端明曾書此詩作葉想衣裳劉后村以為落筆之誤非也蓋端明書不茍作况首字安得有誤然細味之葉想衣裳固自與牡丹穩帖差勝雲字豈端明得正本而後世反誤耶雲霄一羽毛杜甫詠諸葛云三分割據紆籌䇿萬古雲霄一羽毛虞伯生注云三分鼎立之計可謂屈曲而費心思矣然此籌策無以復加獨見之超出萬古之上雲霄之間見一羽毛無與儔匹也鄉先輩謝大司農漢甫詹言云雖三分割據未伸其籌䇿而萬古雲霄長瞻其羽毛羽毛猶言羽儀也二說豫猶有疑焉豫謂武侯三分割據之籌策其功甚大然以武侯視之不過萬古雲霄之上一羽毛耳言視如此大功輕若鴻毛也歸期無奈何子美逰何將軍山林六首末首起句云幽意忽不愜歸期無奈何趙注云自叙客懷謂所以忽不愜者由未有歸期也真類說夢耳蓋子美前五首俱述何氏山林之勝故末首云幽意忽不愜將别何氏而歸真無奈何耳故頸聨云出門流水住回首白雲多尚有戀戀之意結句云祇應與朋好風雨亦來過全首俱是眷戀山林之想若作自叙客懷思歸故鄉大無意味矣杜律虞注杜律虞注楊文貞作序疑其不出伯生之手然實京口張性伯成所著也性亦元進士後世借伯生之名以行豫家有張刻古本名杜律演義世所罕知也謝司農嘗言使琉球時見彼國讀書無經而以杜律虞注當之是以燕石寶少陵也今其注具存若鶯啼修竹不知為梁孝之園犬吠白雲不知為淮南之宅宗臣之贊不知為蕭何頻煩之表不知為庾亮如意不知為王戎下鞲不知為桓虞仗鉞不知為宗資褰帷不知為賈琮斷石不知為峽長流不知為江自寬不知有榮期息機不知有馬援如泥不知有周澤髙門不知有鮑宣郫筒不知有李商隱行路難不知有袁山松烏皮几不知有謝𤣥暉與夫窮愁之本於史記獨夜之本於七哀糾紛之本於賈誼幽側之本於沈約真源之本於昭明青龍之本於葛陂朱栱之本於西樓伯仲之本於典論指揮之本於漢書莫打鴉之本於古曲欲教鋤之本於卜居芰荷之本於離騷蕙葉之本於孔雀賦悲壯之本於漁陽撾奉引之本於聖公傳袈裟之本於四分律甚者金碗泥於玉碗步檐訛為步蟾軍儲自供未稽府兵之制洞門對雪莫察掖垣之規髙葉忽雲石之光打鼓昧發船之節芋栗忘其橡實諸天遺乎內典柑黃三寸莫憶義康之豪鵬礙九天弗紀楚文之異則其涉於蕪陋也滋甚曽謂聞人之注有是乎􅎾按張本編次與虞本大異其中訓詁張簡而虞繁必後人以張之舊稿稍增益之僞為伯生所注蓋伯生位極人臣而張宦不達故耳元吳伯慶有挽張伯成詩云何處重逢說别時斯文千載盡交期學憐知己先登早生愧同庚後死遲箋疏空令傳杜律志銘誰與繼唐碑寡妻弱子將焉託節傳遺文只益悲楊文貞素以博洽聞又去元季未逺序文猶未能決其非虞筆宜乎愈久而愈誤也冬青行楊璉真伽發諸陵骨義士唐珏林景熙收而葬之後人紛紛不知為唐為林李西涯云唐義士林義士千載傳疑定誰是陶九成輟耕録云唐收者諸陵骨林收者髙孝兩陵骨故林詩中有雙匣之語皆拘方之見也夫當時發掘陵寢二義士協力收瘞共賦冬青行三首以紀其事是以唐林二集俱載九成謂林詩誤入於唐集尤拘泥也今諸志以冬青行三首分為兩人所作豫未敢謂信史耳華清宫詩杜常華清宫詩云行盡江南數十程曉風殘月入華清朝元閣上西風急都入長楊作雨聲連用二風字瞿宗吉詩話云向見一善本作曉乘殘月入華清殊覺氣味深長驅雁謝曰可廷讚云王右丞出塞第三句暮雲空磧時驅馬七句玉靶角弓珠勒馬重一馬字按鮑照詩秋霜曉驅雁又北風驅雁天雨霜又洛陽伽藍記北風驅雁千里飛雲然則右丞句為驅雁無疑矣曰可此辨足破千古之疑郎士元詩每讀郎士元月在上方諸品靜心持半偈萬緣空末句又云此心期與故人同重一心字且費解偶見馮元成藝海泂酌云於朱太史家見宋本此心作他時於義了然是以書貴古本也鼉鼓鼉鳴如鼓其數應更江淮人以鼉鼓為鼉更夏小正剝鼉為鼓鼉介屬皮不可冒鼓漢儒傅㑹其說耳鼉鼓即蛙鼓之例唐李賀詩云吹龍笛擊鼉鼓後人皆襲用之然詩曰鼉鼓逢逢矇瞍奏公則又似可為鼓者木葉城木葉城在今遼東之地沈雲卿古意九月寒風催木葉是也後人改為下葉誤矣右丞詩右丞詩迸水定侵香案濕魏禹卿辨云定水迸侵又桃源面面絶風塵陳可棟辨云桃源西面對栁市南頭皆破千古疑案面皮䰄賀知章回鄉詩云少小離鄉老大回鄉音難改面皮䰄兒童相見不相識笑問客從何處來今本俱作鬢毛衰非唐韻矣近覩侯鯖録始知是面皮䰄䰄多鬚也唐詩誤字鄧泰素語豫曰嘗見古本唐詩滿寺枇杷冬著花滿樹作滿寺近與單車向洛陽近與作匹馬昨夜微霜初度河昨夜作乍夜驛路西連漢畤平驛路作驛樹二水中分白鷺洲二水作一水細味自得也焦弱侯筆乘云疏松影落空壇靜細草春香小洞幽春香作香生的對况又有砧聲近報漢宫秋之句豈當復著春字耶溶溶雨世傳晏元獻詩梨花院落溶溶月栁絮池塘淡淡風為警句然溶溶水流貌月不得名溶溶豫嘗病之近閲吳處厚青箱雜記云梨花院落溶溶雨始知月者後人改之雨字自妙淵明采菊詩沈啓南咏淵明采菊云典午河山已不支先生歸去自嫌遲寄奴蔓草無容地慳剩黃花一兩籬見石田集陳眉公祕笈以為王行作誤也銅鞮伯氏鄭繼之野興詩末云年來混迹漁樵下况有銅鞮伯氏風按春秋晉叔向其兄銅鞮伯華匿德藏光不與叔向遊者罕知伯華仲尼稱之曰多聞內植進退兩尊繼之銅鞮句用伯華事耳向見鄭詩刻本疑其用白銅鞮故事改為習氏夫題曰野興用伯氏固宜改曰習氏不惟失作者本意而於題㫖句法不相符矣板本未更因筆而出之以俟知者草堂詩餘宋人選詩餘名曰草堂楊用修強為之解曰李白有草堂集詩餘中有憶秦娥菩薩蠻二闋為百代詞曲之祖故名草堂殊牽合附㑹今世此書盛行人人傳誦然知其說者蓋寡矣胡元瑞稱博洽亦未釋然於此西園詩麈張維城西園詩麈云易象幽微法鄰比興書辭敷暢式用賦物春秋借警義本風刺三禮莊鴻體類雅頌匪謂六籍同歸於詩祇緣六義觸處皆是不先窮經而以别才别趣之說自蓋者究竟與此道何涉又云五言古莫工於漢魏莫盛於晉七言古莫工於初唐莫盛於盛唐五言律莫工於盛唐亦莫盛於盛唐絶句莫工於盛唐莫盛於晚唐獨七言律自唐而工至我明而始盛又云世謂作詩勿入唐以後事自五代入明事物人羣之變不知幾許而謂盡不堪入詩料此詞家習談實藝林之積蠧又云宋三百年間名卿碩儒髙士踔絶諸代製作纍纍豈無篇句可追踪往昔流布來兹者一稱宋詩竟從抹殺既未目覩且不耳聆相率唾棄真可涕可怪右數段皆發前哲之所未發實論詩之金針也今人乍占四聲即自負曰詩有别才不窺四部而欲橫行藝苑試取維誠詩麈讀之詩道之敝屠田叔詩談云近時崇尚甫解之乎輒便咿啞稍習聲偶遽夀棗梨人靡不握管城以摛詩詩無不丐元晏而為序詩道崇尚無過今日清風輟響亦無過此時沈韻屠緯真云天下事有最僥幸而不可解者沈約韻書是也一東與二冬六魚與七虞之屬前此諸韻並通孔子作經及漢魏古詩班班可考豈盡訛謬至約始改正耶約吳興人局於方言蠻俗不審宫羽而敢背越聖賢變亂千古後世遵之如聖經百代而不敢易此甚不可曉也約本齊臣更事梁武禪代之詔出約手後夢齊和帝引刀斷舌乃上章于天謂禪代之事不由已出天可欺乎古文人最濫得名者此人也賀鑑湖賀知章乞鑑湖歸老時年八十餘矣其詩曰少小離鄉老大回鄉音難改鬢毛衰兒童相見不相識笑問客從何處來夫少小仕宦至於兒童不相識貪戀祿位亦已久矣及將歸又問明皇乞鑑湖一曲占故鄉之水利推知章之心無一事一息放過後世侈為賢達髙尚不已過乎蓋當時明皇有詩送之在朝各有贈言後世遂因之而重亦知章之幸也趙子昂題陶詩趙子昂題陶濳歸去來圖云生世各有時出處非偶然淵明賦歸來佳處未易言後人多慕之效顰惑媸妍終然不能去俯仰塵埃間斯人真有道名與日月懸青松卓然操黃花霜中鮮棄官亦易耳忍窮北窗眠撫卷嘗三嘆世久無此賢觀此詩子昂之慕淵明至矣然身事異姓貽譏後世信能言而行不逮也王李劉詩文屠緯真云讀元美詩如入武庫不勝利鈍讀元美文如覽江海終成大觀讀于鱗詩初喜其雄俊多則厭其雷同若雜一首于衆作之中則矯然特出不翅衆鳥中一蒼隼矣劉子威文深古艱澀驚心聱牙文章如是不妨自成一家詩道必不可爾所謂本性情中宫商被管絃相距萬里矣劉徐贈答劉楨贈徐幹云思子沈心曲長嘆不能言起坐失次第一日三四遷幹答云與子别無幾所經未一旬我思一何篤其愁如三春雖路在咫尺難涉如九閽皆情至之語顔謝以降華藻勝而情語稍漓矣覓句古今詩人摹寫覓句景象有極工者如吟安五箇字撚斷數莖鬚如險覓天應悶狂搜海亦枯如竟日覓不得有時還自來如句向夜深得心從天外歸如是事精皆易惟詩㑹却難如窮理多瞑目含毫靜倚松如終篇渾不寐危坐到晨鐘如兩句三年得一吟雙淚流如夜吟曉不休苦吟神鬼愁如生應無輟日死是不吟時如五七字中苦百千年後清如宿客嫌吟苦乖童恨睡遲宋林逋云只緣吟有味不覺坐勞神此非深於詩者不能道也唐詩溫厚豈不惜賢達其如髙尚心唐𤣥宗不逆其臣得罪風霜苦全生天地仁劉長卿不怨其君家貧僮僕慢官罷友朋踈耿湋不罪其友見詩人溫厚之意磨筓戴斗唐張易之出塞曲云轉戰磨筓地橫行戴斗鄉磨筓見戰國策戴斗見爾雅又云將軍占太白小婦怨流黃腰裊青絲騎娉婷紅粉粧一春鶯度曲八月雁成行皆佳句也是故君子不以人廢言乾坤杜少陵喜用乾坤字曰乾坤萬里眼乾坤一草亭乾坤一腐儒無力正乾坤納納乾坤大乾坤水上萍乾坤一戰收乾坤繞漢宫開闢乾坤正皆鄙俗可厭惟乾坤日夜浮一句頗佳嶽陽樓詩杜甫嶽陽樓詩大都與浩然伯仲杜起首句昔聞洞庭水今上嶽陽樓孟云八月湖水平涵虗混太清杜首聨吳楚東南坼乾坤日夜浮孟云氣蒸雲夢澤波撼嶽陽城皆渾雄警策至于杜次聨親朋無一字孟云端居耻聖明覺無謂而結句各不稱矣霜雨雪雲唐張謂餞田尚書還兖州云别路逢霜雨行營對雪雲霜雨雪雲原非連綿之字張合用之亦新不似盛唐人句塞上四時張敬忠五原春色舊來遲二月垂楊未掛絲即今河畔氷開日正是長安花落時蓋言春之氣候異也盧弼盧龍塞外草初肥燕乳平蕪曉不飛鄉國近來音信斷至今猶自著寒衣蓋言夏之氣候異也王縉莫將邉地比京都八月秋風草已枯今日登髙尊酒裏不知能有菊花無蓋言秋之氣候異也李頻關門南北雜戎夷草木秋來即出師落日風沙長暝早窮冬雨雪轉春遲蓋言冬之氣候異也四詩摹寫邉塞光景極肖任華長篇盛唐任華寄李白寄杜甫懷素草書歌三長篇信口狂呌不遵紀律亦是怪體盧同飲茶月蝕詩效之耳贈鄰錢起贈鄰居齊六詩云雞聲共林巷燭影隔茅茨于鵠題鄰居云蒸藜常共竈澆薤亦同渠傳履朝尋藥分燈夜讀書髙季迪贈鄰友云林近書燈露溪回酒舫通放鳬長合隊移竹每分叢傅木虗贈鄰人馬水莆云樓逈常分月墻低不隔花陳軒伯贈鄰友云夜泉皆屋後曉塔共窗中趙仁甫題鄰舍云户外分垂栁墻頭過落花又徐鎧喜李少保卜鄰云井泉分地脉砧杵共秋聲梅堯臣贈鄰居云籬根分井口壁隙透燈光皆能摹寫真切者也豫與鄰友吳元化交最密戲贈十韻云草舍相鄰並幽居隔短垣山光齊到屋樹䕃兩遮園碧露篝燈影香聞壓酒尊花分黏户片苔長過籬痕碩鼠均偷果驕尨互守門藝蔬先得種蒔竹易移根蛛網牽簷近雞羣鬬柵繁不窺家室好時聽笑聲喧賽社輪僮僕搏沙狎子孫杜華與王翰朝夕往來煩言詩今之為官者皆諱言詩蓋言詩往往不利于官也不惟今時為然即唐以詩取士詩髙者官多不達錢起有云微官是何物許可廢言詩其意逺矣日斜人去賈誼鵩鳥賦云四月孟夏庚子日斜野鳥入室主人將去劉長卿過賈誼宅首聫云秋草獨尋人去後寒林空見日斜時用其語略無痕迹劉方平銅雀臺詩劉方平銅雀臺詩云遺令奉君王顰蛾強一妝嵗移陵樹色恩在舞衣香玉座生秋氣銅臺下夕陽淚痕沾井幹舞袖為誰長此詩較昔年分鼎地之作可相伯仲殺風景松間喝道甚殺風景嚴維逰雲門寺云深木鳴騶馭晴山耀武賁實不雅也蔡襄云欲望喬松却飛蓋為聽山鳥歇鳴騶庶幾免俗馬汗驚濤李益云馬汗凍成霜孫魴云驚濤濺佛身人謂冬月豈有汗馬驚濤不入佛寺然竒妙處正在此以理論詩失之逺矣徐氏筆精卷三
