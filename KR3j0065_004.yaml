body:
  text: 徐氏筆精卷四明徐􅎾撰詩談印文硯匣柳子厚柳州詩云印文生緑經旬合硯匣留塵盡日封印文生緑公事絶少硯匣留塵私事亦稀投荒情况不盡凄凉况十二年之久乎李杜韓柳輒遭放逐往往文生於情信夫富貴之言難工也在官種樹柳子厚貶柳州種木槲花詩云上苑年年占物華飄零今日在天涯祇因長作龍城守剰種庭前木槲花白樂天守忠州種荔支詩云紅顆珍珠誠可羡白鬚太守亦何癡十年結子知誰在自向庭前種荔支程師孟守福州種榕樹詩云三樓相望枕城隅臨去頻栽木萬株試問國人來往處不知還憶使君無柳詩近怨白詩近達程詩近誇新竹昌黎新竹詩云稀生巧補林迸出疑爭地深得體物之妙幘峰寺三絶劉禹錫𤣥都先後二絶世人傳誦而不知任翻幘峰寺三絶尤委宛可詠也初逰云絶頂清秋生夜凉鶴飜松露滴衣裳前峰月照半江水僧在翠㣲開竹房再逰云靈江江上幘峰寺三十年來兩度登老鶴尚存松露滴竹房不見舊時僧三逰云清秋絶頂竹房開松鶴何年去不迴惟有前峰明月在夜深猶過半江來咏草白樂天咏草云野火燒不盡春風吹又生已傳播今昔矣又唐僧云時平生戰地農惰入春田又元楊基云六朝舊恨斜陽外南浦新愁細雨中風調情境俱不在樂天之下唐僧句見山谷集或云是蔡襄詩非也長吉儁語長吉詩評者以為牛鬼蛇神二百三十餘篇頗難解説然其佳處固不在於詭怪也如花臺欲暮春辭去落花起作迴風舞又半捲紅旗臨易水霜重鼓寒聲不起又王子吹笙鵝管長呼龍耕烟種瑶草又空將漢月出宫門憶君清淚如鉛水又樓頭曲宴仙人語帳底吹笙香霧濃又終南日色低平灣神兮長在有無間又樓前流水江陵道鯉魚風起芙蓉老又况是青春日將暮桃花亂落如紅雨又一編香絲雲撒地玉釵落處無聲膩又春風爛熳惱嬌慵十八鬟多無氣力又天授秦封祚未終衮龍衣染荆卿血又有時半醉百花前背把金丸落飛鳥又春羅書字邀王母共宴紅樓最深處鶴羽衝風過海遲不如却使青龍去如此工鍊即少陵太白未必能道也下第咏燕元和中章孝標下第賦燕詩上主司庾承宣云舊壘危巢泥已落今年故向社前歸連雲大厦無栖處更傍誰家門户飛又歐陽澥下第亦賦燕詩上主司鄭愚云翩翩雙燕畫堂開送故迎新㡬萬回長向春秋社前後為誰歸去為誰來託諷㣲婉得風人之體詩用之字盧仝詩喜用之字青樓朱箔天之涯林花撩亂心之愁此心復在天之側相逢之處花茸茸皆不俗切夢繫腸繫悶割愁施肩吾云三更風作切夢刀萬轉愁成繫腸線蘇子瞻云繫悶豈無羅帯水割愁還有劍鋩山皆有苦思陳陶步虛引劍浦陳陶唐末隠西山步虛引云小隠山人十洲客莓苔為衣雙耳白青編為我忽降書暮雨虹蜺一千尺赤城門閉六丁直暁日已燒東海色朝天半夜聞玉雞星斗離離礙龍翼竒峭不減李賀輕薄温飛卿聞車駕西遊因而有作云宣曲長楊瑞氣凝上林狐兎待秋鷹誰將詞賦陪雕輦寂寞相如卧茂陵輕薄之意溢于言外蘇武故事温飛卿蘇武廟詩迴日樓臺非甲帳去時冠劍是丁年甲帳是武帝事丁年用李陵書中語極痛切有味不獨對偶之工也犁岳廟唐李頻四皓廟云東西南北人髙跡自相親天下已歸漢山中猶避秦龍樓曽作客鶴氅不稱臣獨有千年後青青廟木春頻詩寫出四皓心事而頻心事亦自可見後為建州刺史卒於官民懐其徳立廟犁岳至今血食不絶可謂千年廟木春矣羅隠詩羅隠詩極淺俗有江南曲云江烟濕雨鮫綃軟漠漠逺山眉黛淺水國多愁又有情夜槽壓酒銀船滿綳絲採怨凝暁空吳王臺榭春夢中鴛鴦鸂鶒喚不起平鋪緑水眠東風西陵路邉月悄悄油壁輕車嫁蘇小竒麗可比温李然亦不多得也江湖漁隠韓偓萬里晴江萬里天一村桑柘一村烟漁翁醉著無人喚過午醒來雪滿船杜荀鶴山雨溪風捲釣絲瓦甌蓬底獨斟時醉來睡著無人喚流下前灘也不知司空曙釣罷歸來不繫船江村月落正堪眠縱然一夜風吹去只在蘆花淺水邉陸龜蒙雨後沙虛古岸崩魚梁携入亂雲層歸時月墜汀洲暗認得妻兒結網燈四作寫江湖漁隠境界如畫自是一家語也洞賔詩世傳吕洞賔詩朗吟飛過洞庭湖一絶耳嘗題河南錦屏山云半空豁然雷雨收洗出一片瀟湘秋長虹倒掛碧天外白雲走上青山頭誰家緑樹正啼鳥何處夕陽斜倚樓道人醉卧巖下石不管人間萬事愁又云時當海晏河清日白鹿閒騎下翠臺本為君平川裏去不妨却到錦屏來自是仙人風骨漁山神女祠唐王叡漁山神女祠云蓪草頭花椰葉裙蒲葵樹下舞蠻雲引領望江遥滴酒白蘋風起水生紋迎神也棖棖山響答琵琶酒滴青莎肉飼鴉樹葉無聲神去後紙錢飛出木棉花送神也真可泣鬼神矣陸羽詩陸羽著書甚富今所傳者茶經一種耳至于詩惟六羨歌最膾炙人口他作鮮有收者嘗題㑹稽剡溪詩云月色寒潮入剡溪青猿呌斷緑林西昔人已逐東流去空見年年江草齊可備選唐絶者栁古人詠栁必比美人詠美人必比栁不獨以其態相似亦柔曼兩相宜也若松檜竹栢用之於美人則乏婉媚耳唐牛嶠栁枝詞云吳王宫裏色偏深一簇纎條萬縷金不憤錢塘蘇小小與郎松下結同心亦謂美人不宜松下也譽栁貶松殊有深興曹娥廟潘閬詩李文正公題曹娥廟云死隨枯骨葬江濵報徳真憐女子身千載斷碑空過眼當時亦有姓曹人用事真切亦堪膾炙然不及宋潘逍遥一絶云曹娥廟前秋草平曹娥廟裏秋月明扁舟一宿都無寐近聽江聲似哭聲尤含蓄有味響屧廊王元之題響屧廊云廊壊空留響屧名為因西子繞廊行可憐伍相終朝諌誰記當時曵履聲落花落花詩始於二宋漢臯佩冷臨江失金谷樓危到地香將飛更作迴風舞已落猶存半靣妝誠絶倡也余襄公云金谷已空新步障馬嵬徒見舊香囊至國朝作者愈盛多至三十首矣文徴仲云丹葩漂泊明妃淚緑葉差池杜牧情沈啓南云錦里門前溪好浣黄陵廟裏鳥還啼近嵗滇中馬弢叔云武陵路别迴漁艇金谷春深落妓釵影揺團扇愁班女艷逐㣲波度洛妃山東于文若云紅樓白日憐珠墜青塜黄昏痛玉埋吾鄉董叔允云拂地霓裳迴妙舞淩波羅襪冷香魂楚妃腰細難勝雨漢女身輕合避風建溪丘文舉云撩亂隋宫抛剪綵漂流秦苑棄餘脂建溪魏君屏云馬嵬妃死香猶在垓下人亡血未乾余少時亦曽賦十首有云麗華魂散胭脂井闗盼香消燕子樓雖皆效法二宋然比興之體亦自俊麗可傳也西崑宋楊文公億錢思公惟演李宗諤劉子儀號西崑體組織華麗楊南朝詩云五鼓端門漏滴稀夜籖聲斷翠華飛繁星暁埭聞雞度細雨春塲射雉歸步試金蓮波濺襪歌翻玉樹涕沾衣龍盤王氣終三百猶得澄瀾對敞扉錢和云結綺臨春映夕暉景陽鐘動曙星稀潘妃寳釧光如晝江令花箋落似飛舴艋淩波朱火度觚稜拂漢紫烟㣲自從飲馬秦淮水蜀栁無因對殿幃李和云仙華玉夀暁沉沉三閣齊雲複道深平昔金鋪空廢苑於今瓊樹有遺音珠簾映寢方成夢麝壁飄香未稱心惆悵雷塘都㡬日吟魂醉魄已相尋劉和云華林酒滿勸長星青漆樓髙未稱情麝壁燈迴偏照畫雀航波漲欲浮城鐘聲但恐嚴妝晚衣帯那知敵國輕千古風流佳麗地盡供哀思與蘭成楊咏始皇云滄波沃日虗鞭石白刃凝霜枉鑄金錢云金椎漫築甘泉道七首還隨督亢圖楊咏成都云漫傳西漢祠神馬已見南陽起卧龍錢云雨經蜀市應和酒琴到臨卭别寄情楊咏漢武云力通青海求龍種死諱文成食馬肝錢云立候東溟邀鶴駕窮兵西極待龍媒劉云桑田欲㸔千年變瓠子先成此日歌皆用事精確對偶森嚴即義山丁夘不是過也豈可槩目宋詩為陳腐哉咏梅林和靖暗香踈影一聨歐陽公極賞之黄山谷以為不如雪後園林纔半樹水邊籬落忽横枝為佳我朝髙季迪咏梅云詩隨十里尋春路愁在三更挂月村似勝瓊林苑唐宴進士於慈恩寺宋宴進士於瓊林苑苑中松栢森列百花芬郁樓觀層列金碧相射韓琦詩云春光濃簇寳津樓樓下新波漲鴨頭嘉節難逢真上已賜筵贏入小瀛洲仙園雨過花遺靨御陌風長絮滚毬褉飲不須辭巨白清明來日尚歸休其繁盛光景可見荆公詩荆公謝公墩詩云我名公字偶相同我屋公墩在眼中公去我來墩屬我不應墩姓尚隨公又戲贈段約之云竹栢相望數十楹藕花多處復開亭如何更欲通南埭割我鍾山一半青雖曰戲謔之詞而人我之相見於筆端矣石湖夜步范石湖夜步詩云人家簾幙夜香飄燈火蕭疎照市橋滿院月明春意好小樓吹笛近元宵清婉可詠蔡持正鸚鵡詩蔡持正人品最汙人羞稱之其安置英州日賦侍兒琵琶鸚鵡一絶鸚鵡言猶在琵琶事已非傷心瘴江水同渡不同歸即唐人莫是過也山靜日長唐子西山靜似太古日長如小年自羅景綸引之世無不知者但未見其全篇耳其題乃醉眠也詩云山靜似太古日長如小年餘花猶可醉好鳥不妨眠世味門常掩時光簟已便夢中頻得句拈筆又忘筌如水裁偏岸直雲截亂山平翻泥逢暗筍汲井得飛梅橘林香處飯杉木翠邉程硯田無惡嵗酒國有長春破窓燈焰走凍硯筆鋒遲皆警句也不獨山靜日長兩句耳琴臺蜀中有相如琴臺古今題咏多本琴心事惟宋少傅田況一絶云西漢文章世所知相如閎麗冠當時游人不賞凌雲賦只説琴臺是故基亦善為相如解嘲者龜山詩楊龜山為吾閩道學之祖世人但知其語録而不知龜山之詩亦有可誦者如含雲寺詩云山前咫尺市朝賒垣屋蕭條似隠家過客不須携鼓吹野塘終日有鳴蛙又云竹間幽徑草成圍藜杖穿雲翠滿衣石上坐忘驚覺晚山前明月伴人歸又如岳陽樓長歌宛然唐響絶無宋人習氣宋詩工麗宋洪咨䕫直玉堂詩云寳鴨炷雲朝太紫玉蜍浥露校鉛黄又云雲收翠㦸龍文潤日透金鋪獸面明楊萬里云雲翻孔雀金花碧日射鴛鴦玉瓦紅皆工麗可誦委羽居士宋左緯號委羽居士宣和間以詩名隠黄嵓有詩云騎馬出門三月暮楊花無頼雪漫天客情惟有夜難過宿處先尋無杜鵑可謂深于旅況矣東皐子宋戴敏號東皐子浙之黄巖人小園詩云小園無事日徘徊頻報家僮送酒來惜樹不磨修月斧愛花湏築避風臺引些渠水添池滿移個柴門傍竹開多謝有情雙白鷺暫時飛去又飛回雖調不離宋而清淡閒適亦可喜也范香溪宋香溪范浚南渡後隐居不仕詩有竒思春融融云天香地媚春融融化工㸃染分花容東風夜半入香陌雜樹暁繁爭白紅蘭叢蕙根芳翠滴栁艷明眉輕罩䍥紅顔緑鬢青春客壺中新醅鴨頭色殘絲冉冉愁如織日暮低迷草萋碧又云海棠紅歇鶯停歌麥風時候猶清和簾垂簏􅉡深院靜赤闌細栁隂婆娑池塘正覺幽事好萍葉藻蔓涵清波一雙紫燕薇叢外銜得芹泥來補窠世人所知者心箴而已不知浚之深于詩也岳忠武詩世傳岳忠武滿江紅詞激烈悲壯溢於言外而忠武詩句有絶閒靜者如池州齊山翠㣲亭云經年塵土滿征衣得得尋芳上翠㣲好水好山㸔不足馬蹄催趂月明歸又如潭水寒生月松風夜帯秋何必減唐人語玉堂陪祀二絶宋趙汝談直玉堂詩云宫井城鴉欲動時春猿夢斷北山移攬衣擬草歸田賦猶是金蓮燭半枝潘牥陪祀詩云碧天無滓月光寒霽色分明在露盤一夜九重全不寐時教中使捲簾看雋永有味不似宋格千巖警句宋蕭徳藻號千巖閩中人以詩名于時采蓮曲云清暁去采蓮蓮花帯露鮮溪長湏急槳不是趂前船又云相隨不覺逺直到暮烟中恐嗔歸得晩今日打頭風絶似玉臺劉後村酷稱之徳夀宫夀詩唐無夀詩有之自宋始至今則濫觴可厭也宋髙宗為太上皇夀日楊萬里作慶夀詩云長樂宫前望翠華玉皇來賀太皇家青天白日仍飛雪錯認東風轉栁花清暁鞭聲出禁中驚開剩雨及殘風金鴉銜取紅鸞扇飛上玻璃碧海東春色何湏羯鼓催君王元日領春回牡丹芍藥薔薇朶都向千官帽上開雙金獅子四金龍噴出香雲繞殿中太上垂衣今上拜百王曽有個家風帝捧瑶觴玉座前綵衣三世祝堯年天皇八十一萬嵗休説莊椿兩八千天父晨興未出房君王忍冷立風廊忽然鳴珮珠簾捲萬嵗聲𫝊震八荒花外班行霧外山何縁子細望龍顔竊窺玉色真難老底用臞仙九轉丹甘露祥風天上來今回恩數賽前回都將四海歡聲裏釀作慈皇萬嵗杯堯舜同時已甚都祖孫四世古今無誰將冩日摹天手畫作皇王盛事圖甲戌王春試集英小臣曽是老門生蒼顔華髪鵷行裏也聽鈞天九奏聲必如此方可稱夀也仙霞嶺宋馬子儼宿仙霞嶺詩云月影自催人起早泉聲不許客眠安摹冩真切予家在閩北上往來必由斯嶺輒賞此句不置白玉蟾集亦載此首未知孰是雲龕先生宋李邴鉅野人㕘知政事歸隐泉州自號雲龕先生著草堂集一百卷軼弗傳有訪僧詩云數丈招提四面山羨師終日掩禪闗十年不踏門前路只遣松風送我還蕭爽可味祖孫詩宋吕雪屋贈陳隨隐父子有句云人羨杜閒生杜甫天教蘇頲繼蘇瓌予以庚戌嵗得𤣥孫友人陳伯孺贈予云慙長慙卿終不惡生𤣥生運總多竒用祖孫父子事皆切當咏針宋裘萬頃有客令咏針出羮字韻萬頃云一寸堅剛銕鑄成綺羅叢裏度平生有時穉子敲成釣釣得魚兒便作羮亦巧於押韻可喜也王介翁括蒼王鎡字介翁宋室播遷義不仕元宋史藝文志謂鎡文集三十卷世尠傳矣近其裔孫之棟丞甌寜掇拾家乗得月洞集一帙特片鱗隻羽耳如塞上曲云馬嘶經戰地鵰認打圍山秋深云子黒石蓮老柿紅霜葉疎山居云香老蒲花春洞影凉生槲葉午窓風落葉石闌霜信早敗荷池屋雨聲凉杭州懐古云雲寒飛殿排班石草卧前朝記事碑時事云雲生殺氣鵰旗暗風肅軍聲虎帳寒絶句漁父云竹絲籃裏白魚肥日落江頭換酒歸只恐明朝江雪凍老妻連夜補蓑衣置之晩唐劉許之間誰辨其為宋人作也鹿皮子元初陳樵好衣鹿皮自號鹿皮子有詩一卷如掃葉僧將猿共爨賣花人與蝶俱還殊有巧思元詩趙子昂絶句云春寒側側掩重門睡鴨香殘火尚温燕子不來花又落一庭風雨自黄昏滕玉霄絶句云吟人瘦倚玉闌干酒醒香消午夢殘燕子不來春社去一簾疎雨杏花寒二首頗相似皆詩餘中絶佳句也唐人無此纎弱之作真山民詩偶於陳幼孺案上檢破冊一帙糜爛醯雞前後俱損失不存姓氏幼孺云此冊得之邵武仁夀寺僧寮中多佳句如蜂王衙早晩燕子社春秋烟碧栁生色燒青山返魂白沙難認月黄葉易為霜棠醉風扶起栁眠鶯喚醒檻低簷礙月窓破紙吟風與鷗分渚泊邀月共船眠窓月燈昏見巖泉雨歇聞花影掃不去草根鋤又生風竹有聲畫石泉無操琴許猿分野果留鶴守雲林水清明白鷺花落失青苔飛花遊蕩子古木老成人途窮身是累痛定語猶悲葉新林掛緑花落地生香蕉葉卷舒雨鳩聲問答春七言如雲開逺嶂碧千叠雨過落花紅半溪塵書邀我共髙閣濁酒勸人歸醉鄉碑因藤蔓無完字城為田侵失舊基氣増浙左霜威勁面帯終南山色寒書猶能看未為老詩亦莫吟方是閒寛著庭除貪貯月少栽竹樹要看山廊下蝸粘沿砌蘚佛前蜂戀挿瓶花青山隔絶市朝面白髪消磨豪傑心雕鏤花栁春無迹沐浴山川雨有恩花影忽生知月到竹梢輕響覺風來皆自創新意雖有酸餡氣亦可喜向不知誰作近讀元人詩中有真山民一卷即此詩也山民西山先生裔刺馮道馮道歴事四朝後世羞之歐公作史謂其無廉恥史斷諸賢紛紛訾詆百千萬言不如元劉靜修一絶約而盡也亡國降臣固位難癡頑老子㡬朝官朝梁暮晉渾閒事更捨殘骸與契丹獨王荆公以伊尹五就湯五就桀稱之近李禿翁亦主其説吳草廬詩元吳草廬澄專志理學而詩亦多巧思咏雪云臘轉鴻鈞嵗已殘東風剪水下天壇賸添吳楚千江水壓倒秦淮萬里山風竹婆娑銀鳳舞雲松偃蹇玉龍寒不知天上誰横笛吹落瓊花滿世間叠葉梅云羅浮夢斷杳無蹤氷雪仙姿兩兩逢縞袂怯單寒後襲粉妝嫌薄暁來濃迎風一笑知顔厚臨水相看見影重道眼只將平等視玉環飛燕總天容又如百年竹木青春在一院香花白書閒屋頭月上元無夜樹杪風來若有期花香靜晝㣲風裏草色深春一雨餘金鏡南飛光欲半銀潢西去寂無聲定非戰國談天衍疑是仙家縮地房秋隴故園迷蝶夢暁窓客枕厭雞聲等句皆超脱理學蹊徑者也何太虚元季詩人踵出知名者無論已予家藏何中知非集六卷佳句叠見如燕來春已去花少雨偏多漢殿金人别唐陵石馬嘶落花縈樹轉幽鳥過林鳴山圍雙鷺暁門閉一蟬秋鳥語前林日雞鳴曲巷烟年華流水在春事落花知日明山氣改江靜水痕歸七言如赤壁驚烏飛夜月衡陽歸雁落秋風兩澗寒聲通法席數峰秋影上香臺隔水歸樵分路散衝嵐飛鳥認林還水寒古道鳴駝外雪暗空村落雁邊馬嘶平野呼鷹吏犬吠寒沙射雁人中字太虗臨川人集中所往還者吳澄劉㑹孟揭傒斯程鉅夫諸人至大皇慶間寄寓閩中賦詩頗多所著有易類象二卷書𫝊補遺十卷通鑑測海一卷通書問一卷吳才老叶韻補疑一卷六書綱領一卷補逸六書攷三十二卷薊丘游録一卷搘頥録十卷知非集十七卷外集十六卷可謂富矣然姓名泯泯不與吳揭雁行胡元瑞詩藪拈拔元人佳句無遺亦不及太虗真有幸有不幸也題和靖墓古今題和靖先生墓者不下百篇悉梅鶴封禪數事而已獨張羽一絶云水繞荒山路半斜墓園無主屬官家我來正是梅開日滿目蓬蒿不見花淡而有味又陳剛中一絶云北邙翁仲拱朱門玉盌時驚古帝魂爭似孤山一抔土梅花依舊月黄昏亦可掩諸作者也同根竹武夷城髙巖有巨竹一幹雙梢予與謝在杭欲賦詩詠之未就也偶閲元人謝宗可詩云競秀亭亭一種竒駢頭㑹脱錦䙀兒西山二子情依舊湘浦雙娥影鎮隨髙節原非連理樹虗心共是傲霜枝莫教移作仙人杖恐化雌雄下葛陂似不能復繼矣盧圭齋詩泉州惠安盧圭齋名琦字希韓登元至正進士令永春改寜徳所著有圭齋詩集嵗久弗傳近恵安莊户部徴甫蒐而梓之悞入雁門薩天錫詩六十餘首薩詩世有傳本較者一時未之考耳亟當釐正不然恐後世以圭齋為齊丘之盜化書也盧詩自佳如嵐氣滿林晴亦雨溪聲近驛夜如秋潮生逺浦孤帆小雨過蒼崖古木寒小橋跨澗村舂急老樹吹花野店香暮雲松徑僧歸寺夜雨篷窓客在船門掩落花春去後夢回殘月酒醒時梧葉㡬畨深夜雨梅花一樹短籬霜清典可詠元詩多纎弱若圭齋者實有唐調者也月泉吟社元至元間浦江吳清翁渭有月泉吟社預於丙戌小春月望命題至正月望收卷用好紙楷書謄副聘謝翺為考官三月三日揭暁收二千七百三十五卷選中二百八十名首名羅公福吟社中人詩限五七言律刻至六十名止皆有詩賞者也第一名公服羅一縑七丈筆五帖墨五笏第二名公服羅六丈筆四帖墨四笏第三名公服羅五丈筆三帖墨三笏第四至十名各春衫羅一縑筆二帖墨二笏第十一至二十名深衣布一縑筆一帖墨一笏第二十一名至三十名各深衣布一縑筆一帖第三十一名至五十名各筆一帖墨一笏吟箋二沓詩以春日田園雜興為題公福詩云老我無心出市朝東風林壑自逍遥一犁好雨秧初種㡬道寒泉藥旋澆放犢暁登雲外壠聽鶯時立柳邉橋池塘見説生新草已許吟魂入夢招李西崖懐麓堂詩話亦載此事言此集未及見予家有藏本因録出之然佳句甚多不獨公福也公福本姓連名文鳯吾閩人字伯正號應山偽名羅公福集中皆不著的名如屋角枯藤粘樹活田頭野水入溪渾青林伐木村村社緑水平疇處處秧土脉正融催觳觫林隂㣲合聽軥輈田烏飛逐耕烟犢桑扈鳴隨喚雨鳩草青隨意牛羊卧門靜無人燕雀多麥壠風㣲牛睡穏芹塘泥滑燕歸忙小雨杏花村問酒淡烟楊柳巷巾車榆莢雨酣新水滑棟花風軟薄寒收又皆六十人中警句也張思廉元季詩人軰出語皆竒警㑹稽張思廉尤峭峻可喜題唐五王擊毬圖云興慶宫前春正熱緑楊夾道花如雪毬門風起日西斜五馬歸來汗成血潞州别駕醉眼纈雙袖傾欹擁岐薛申王按鞚宋王馳杖撲毬囊手親挈草平如掌馬力均玉鞭十里不動塵黄門扶入五花帳大衾長枕娛家人花蕚相輝雨氣寒樓中歌管漸闌殘紫騮不踏毬塲路萬里青螺蜀道難又太真明皇並笛圖黒奴絃索花奴鼓譂奴撫掌閹奴舞阿嬌自品玉􅌑瓏御手夷猶親按譜風生龍爪玉星香露濕櫻桃金縷長莫倚花深人不見李謩側足傍宫墻思廉有玉笥集十卷詩多富贍盖熟于史學者以方駕銕厓未知鹿死誰手岑安卿至正中餘姚岑安卿字靜能號栲栳山人有集一卷平淡不類元習如蛩鳴深巷靜月昃半樓明山髙不礙夢日落易生愁清新有味亦胡元瑞所未覩也趙大年畫元胡淵頴題趙大年林塘秋晚圖云老景青黄筆底收晴鳬冷雁共汀洲王孫畫學空花竹不到銅駝陌上秋譏刺之意㣲而婉矣金青村元末金青村涓與邑人吳萊宋濂友善有詩名嘗賦詩云燕子飛來近畫簷暮春時節雨纎纎杏花落盡無情緒何處人家有酒帘又有逺峰晴見色獨樹暖無聲人行秋葉滑鶴立晩松凉皆佳句也黄秋聲元季詞人軰出而邵武有黄鎮成詩多竒警秋聲集十卷佳句叠出如王孫不歸怨芳草山鬼欲啼牽女蘿銕檄召雷秋雨足瑶壇謁帝夜雲髙游山採藥辭家早掃石看雲出洞遲青山盡處海門濶紅日上來天宇低花竹一家巢絶頂烟塵九㸃認齊州潮來估客船歸市月上人家水浸空惜梨棗朽腐尠有覩其全篇者宗藩詩國朝宗藩之詩寜府為盛諸王孫以詩鳴者多炡多􅖷其著者也多炡絶句清逸如泊長蕩云蒹葭一望暮蒼蒼長蕩湖頭烟水長怪道今朝楓葉盡夜來七十二橋霜湖口縣云湖水澄清江水渾江烟湖靄易黄昏請看湖口江心月一片寒光照縣門清明湖上云湖畔行吟曰未斜四年三度客天涯不知鶗鴂驚飛去穿破來禽滿樹花多􅖷屬對精工如太室出雲來署裏黄河如帯掛城頭闗山暁月趨三輔鴻雁秋霜度九河路經軒后臨戎坂山接髙歡避暑宫皆翩翩爾雅無紈袴習氣過餘干弋陽詩貞吉王孫過餘干詩云餘干城頭雲泊天琵琶洲下水如弦推篷理詠隨州句落日平沙似往年謝在杭宿弋陽云羣峰迴合俯清溪寂寞荒城古渡西惟有女墻秋月在只今猶照夜烏啼二詩皆用劉隨州句略無痕迹余近過弋陽亦效顰云頗憶文房舊日題餘干水落弋陽溪平沙渺渺孤城在朝暮猶聞山鳥啼汪廣洋汪廣洋詩云三百六十灘水清桃花春浪近來生催歸不待臨歧語夜夜子規啼到明酷似晚唐郵亭圖國初唐肅題陶榖郵亭圖云紫鳯檀槽緑髪娼玉堂見慣可尋常作歌未必腸能斷明日聽歌更斷腸先兄惟和曽題秦弱蘭一首足為陶學士解嘲莫笑郵亭一夜春此身元已落風塵韓家亦有如花女枕畔衣裳著向人王止仲吳郡王止仲名行國初布衣也王文恪筆記稱其才敏嘗識姚廣孝于未遇余嘗得楊文敏公遺書中有王行半軒文集十二卷寫本也其詩不甚多如髙館疎簾晚乍開讀書聲裏故人來山中本自無塵土催得家僮掃緑苔清逸可誦文敏去止仲甚邇即為之抄録想當時無刻板耳今又二百餘年恐吳人亦未必有也震澤長語載其初傭于金閶徐姓竊書讀之後為南京武臣教授上召見武臣怪其識見特進以實告召見語不合賜死藍明之靜之武夷藍明之名智永樂中辟為廣西僉憲與兄布衣靜之齊名詩詞俊逸雅有唐風嘗見其書銅雀臺瓦詩于建陽友人處可泣鬼神詩云曹瞞騁志吞劉社銅雀臺髙瞰中夏徒知扼腕有卧龍豈料垂涎已司馬萬里河山尚出師九原魂魄歸何時清秋風雨滿陵樹落日笙歌空繐帷翠娥紅袖恩情絶廢塚荒臺狐兎穴空餘片瓦落人間千載奸雄磨未滅藍靜之紙帳詩云數幅秋藤拂地齊匡牀閒對竹爐低山中一枕梅花月不識雞聲送馬蹄瓊姬墓吳中有夫差女瓊姬墓髙季迪詩云夢别芙蓉殿頭堕釵零落誰收土昏青鏡忘暁月冷珠襦恨秋麋鹿昔來廢苑牛羊今上荒丘香魂若怨亡國莫與西施共遊六言最難佳此篇警策雋永求之古今不多見也威寜伯國朝威寜伯王襄敏公以文臣而三佩將印特敇獎諭二十餘次歿後諭祭九壇歴任四十餘年身臨戰陣一百九十四次生擒畨賊二百九十名斬首三千三百顆奪獲戰馬駱駝牛羊以數十萬計子孫世世承襲給以銕劵書生之寵遇未有若此之極者也然公詩氣魄雄壯不事磨鍊自見逺大如斬蛇赤帝留神劍堕淚銅仙泣露盤風向眼中吹出淚霜於髯上凍成冰三緘已錮金人口百鍊難消銕漢心六國竟銷蘇子印萬金空鑄鄧通錢仕宦得閒方是貴世途雖好不如歸妄夢㡬時曽得鹿多歧何處不亡羊公馳驅戎馬之間而賦咏不輟未可與操觚翰苑者並論也然阿附權閹不無㣲玷云八嵗詩𢎞治間金陵謝子象有詩名八嵗時客命賦暮秋詩謝曰紫塞風寒雁呌霜秋花薫夢一樓香客驚為竒童後從吳郎中元玉學詩有深林下馬蒼苔滑野寺入門秋爽多之句一時傳誦謝贈刑部主事子應午官河南㕘議刻其全集佳句甚多不特此也石田題畫沈啟南畫入神品而詩亦清真可咏予嘗得其題畫數首不必觀丹青水墨而詩亦可當生綃粉本也獨樹髙樓日欲西竹梢晴霧四簷低流雲過去青山在恰好捲簾幽鳥啼山隐幽居雲木深鳥啼花落晝沉沉行人杖履多迷路不是書聲無處尋愛是垂楊嫩緑齊放舟晴日弄春溪滄浪自唱無人和飛過水禽能一啼雨跡未乾花亂飄一溪新水欲平橋有人問我門前路不覺斜陽在樹腰住處真成與世迷一重雲水一重溪㑹琴㑹茗還容客接木通橋野水西碧水丹山映杖藜夕陽猶在小橋西㣲吟不道驚溪鳥飛入亂雲深處啼臨水人家竹樹中只因孤嶼水船通當門細荇牽㣲浪繞屋藤花落軟風水次人家似瀼西參差竹樹路俱迷溪翁兀坐不出户日午飯香雞正啼客來客去吾何較山靜山深事亦無一卷黄庭看未了紫藤花落鳥相呼山雨欲來雲滿屋溪風未起水生波石苔坐久人垂釣猶有㣲陽掛女蘿山徑蕭蕭落木疎小橋流水限林廬秋風黄葉少人迹雞犬不聞惟讀書獨坐樹根無一事清風滿袖作㣲吟夕陽好在秋林外日閣逺山還未沉右詩皆石田集所不載皆于畫幅見之録之以當卧逰耳胡笳圖沈啟南題胡笳十八拍云蘆葉傳聲拍拍鳴畫圗傳得態如生琰從三姓邕從卓自是人間父子情猛于斧鉞之誅矣唐伯虎唐伯虎疎狂玩世嵇阮之流也詩雖不甚雅馴而一段天然之趣自不可及如去日苦多休檢厯知音諒少莫修琴生涯畫筆兼詩筆踪跡花船與酒船秋榜才名標第一春風絃管醉千塲苦拈險韻邀僧和煖簇薫籠與妓烘皆自冩胸次非若組織套語者也近雲間彚刻伯虎集中悞入宋張文潛七夕歌宜刪去之唐寅題畫偶見唐子畏山水一幅題詩云春風修禊憶江南酒榼茶爐共一擔尋向人家好花處不通名姓即停驂極有風致唐集不載伍晏清流伍晏𢎞治中貢為廣文能詩如草根蛙鼓吹花底鳥笙歌閒堦秋掃葉荒徑晩挑蔬隔寺聞僧磬㣲燈認釣舟又漁滄廟云漁滄之下潭水流漁滄之上雲悠悠行雲流水自今古荒城故壘行人愁龍為蛇兮䑕為虎腥毛臭骨皆塵土遊魂絶魄無所歸時傍寒蛩泣秋雨俱清雋可喜寳鏡詩楊用修寳鏡篇云繡户無波菱自動紗窓不夜月恒光足稱工巧王子淵祠詩楊用修題王子淵祠一絶云灼灼靈芝發秀翹子淵摛藻擅天朝漢皇不賞賢臣頌只教宫人咏洞簫詩意與田况琴臺相類陸子絲詩姑蘓陸文組子夜歌云染蘗作儂衾持氷置儂枕城烏夜夜啼寒苦不成寢美人寄書云秋夢無憑客路遥尺書封寄恨迢迢吳綾不及桃花紙顔色都從别後消皆有麗情南屏詩四明豐道生雪夜過西湖南屏山詩千巖萬壑玉層層夜半山腰見佛燈竹影掃窓塵不到滿牀風雪定中僧清逸逼人陳髙吾桃源詩武陵陳髙吾少司馬題桃源云輪蹄影落東西路雞犬聲聞逺近村又云有無仙跡在何處今古人家住此山亦佳句也陳徳音吾鄉嘉靖中有陳籥字徳音隠士也詩法唐人人無知者近其孫鴻出遺稿一帙佳句層出如山深僧餉早天逺鶴歸慵日影沉秋磬松聲響暮山歸心秋轉切逺夢老難成窓寒葉落後竹響雨來時久客依人懶虗名到老休行裝衝片雨歸夢落千山棲鴉驚夜火歸雁過更樓殊有幽人之致周所諧周所諧名如塤莆處士也足跡不出户庭苦唫弗輟未嘗妄與顯者逰里中鄉紳學士罕識其面故其為詩綽有林壑之致自作田家吟云不識市朝車馬喧殘蓑篛笠老田園柴門去郭無多路野竹臨流自一村春雨桑麻終嵗足清時雞犬數家存兒孫牧畜南山下為道湏防猛虎繁可以見其逸韻矣他如風生極浦潮常白霜冷空林草變衰萬里寒山横積雪半汀衰草隠斜陽百花潭上漁竿在五柳門前鶴徑荒因嫌城市非吾土却傍漁家作比隣墻壓花枝妨客過泥深苔徑喚人扶等句全無烟火食氣西湖聞笛嘉靖中餘杭詩人徐後西湖聞笛云月白霜寒客夢醒笛聲逈出柳洲亭莫教吹過孤山去風裏梅花不耐聽一時傳之楊椒山臨刑詩楊椒山臨刑賦詩云浩氣還太虗丹心照千古平生未報恩留作忠魂補千載之下猶有生氣鵝池生趙郡宋登春自號鵝池生壯嵗鬚眉皓白任俠遊燕趙間後薙髪為僧不知所之吳郡徐大宗伯學謨為之傳而梓其詩詩悲惋豪逸嘗賦俠客行云賭擲賽劉毅家奴過孟賁千金不肯顧一劍為酬恩趙瑟停凰柱燕姬促象尊平生款段馬羞入孟嘗門又抱玉㡬年終獻楚懐書垂老莫干秦又酒腸方大黄金盡世事才知白髪多皆自冩其胸臆者也楊鵬翼鞦韆詩咏鞦韆詩以洪覺範之作為最而元人楊鵬翼一首尤佳也日轉華簷樹影偏謝家庭院簇神仙綵繩斜擘纎纎筍畫板輕承步步蓮弄玉未升雲漢上緑珠先墜舞樓前不知小徑殘紅裏明日何人拾翠鈿近徐茂吳有句云蓮生不在地栁弱㑹揺空亦自有致沈明臣苧蘿山詩沈明臣題苧蘿山云越國輿圖海上多千岩萬壑繞鯨波計然空奏亡吳策誰道功成在苧蘿亦㣲婉纒頭集京口鄔佐卿字汝翼中丞公子也性豪爽喜遊狹邪著述甚富自文集外有艷詞十卷題曰纒頭集皆生平贈妓之作佳句麗情可歌可咏如笛中舊恨留金谷天上新愁問玉巵江栁眉稍雙鎖恨海棠春盡獨銷魂寳鏡夜寒鸞顧影畫梁春暖燕歸樓妝粉曉沾蝴蝶草啼紅春染杜鵑枝髩梳蟬影分雙翼衣剪靈綃學六銖小閣題情緘荳䓻空庭㣲步出蓮花樓前彩鳯隨仙史陌上銀筝悞使君春回漢水思捐佩月滿秦宫照捲衣玉樹輕霜凝屈戌垂楊新月掛鞦韆楊栁調翻歌扇月柘枝香度舞裙風翡翠香籠條脱煖梧桐聲轉轆轤寒明月小樓闗盼盼垂楊深院李師師等聨膾炙尤甚義山無題之後亦不多見也沈倥侗吳人沈愚號倥侗善書工詩雪夜云瓦爐温酒夜燈前紙帳梅花伴鶴眠不似玉堂金馬客五更風雪去朝天辨琴聲唐李龜年至岐王宅聞琴聲曰此秦聲良久又曰此楚聲主人入問之則前彈者隴西沈妍後彈者揚州薛滿也王百谷曲中有詩云一半秦聲半楚聲秦娥調瑟楚娥筝鳯凰城裏家家雪但是紅樓凍不成用事恰當御溝水唐人咏御溝水詩頗多亦有佳者第不如近日章元禮一絶為勝詩云西山千澗水爭流盡入宫墻出御溝紅映芙蓉青映栁更調鉛粉上朱樓魚鱗雲淮南子曰雲如魚鱗湯義仍詩風光散羊角雲氣集魚鱗亦工巧江仲魚崇安江仲魚諸生也予從王粹夫識仲魚乙未予之武夷仲魚導予遊三十六峰仲魚雖經生有碩人之致武夷諸峰各置書帙筆硯隨意所適留連旬月衣道衣冠道冠又儼然羽流也仲魚善詩詩不作人間語嘗賦秋風懐友吟二十餘首皆道侣漁父樵夫與猿鶴而已風塵之客不預焉如懐朱漁父云九溪深處似嚴灘渺渺風塵白眼看葉艇每隨幽嶂出茅房孤掩落花殘芙蓉衣上雲千片楊栁磯頭月一竿釣罷瓦瓶曾共醉滿身零露不知寒未㡬仲魚逝矣年僅三十也每過武夷不勝山陽之愴何樵仲何樵仲名其漁邵之建寜人也為詩有苦思樵仲死予哭之詩偶檢其手稿絶句有泠然之韻梅口待渡云野曠㣲風起白蘋村居三里若比隣江干風冷秋山暮立盡斜陽無渡人碧簫洞云長林籟靜自盤桓松露侵衣夜未殘三十六峰明月暁碧雲吹破洞簫寒山下買酒云隔浦漁家傍酒家漁罾掩映酒帘斜探囊恰好供歸興買得黄魚并杏花張陽生張陽生者名復亨郡諸生也能詩而名不顯丙午嵗始與予定交一再執臂而陽生遂以疫死年未三十也遺稿散逸予從友人處拾其北征一集有逰西湖云山翠湖光晝染扉珠宫縹緲晚鐘㣲僧尋三竺沿堤過鶴認孤山背水歸栁影亂分公子棹荷花輕襯美人衣繁華不醉飄零客愁聽啼鵑又夕暉又上寜夏黄開府云登壇十載拜西征部落爭𫝊建節名虎竹嚴分秦斥堠狼烟初斷漢長城葡萄月上降羌舞苜蓿風寒戰馬鳴幕府能容前箸借少年原是棄繻生又魚窺法座澄波淨龍起空山宿雨腥寄食應尋彈鋏侣埋名終托鼓刀屠春隂香徑宫蕪没烟斷松橋岸栁疎五言如花開招客至松老著書成晚晴催積雪殘雨入輕寒雨聲分夜話岸火對秋眠皆警句也林時中友人林宗大字時中邑諸生也屏居村落不入城市好吟咏人無知焉獨與余兄弟交最驩歿後遺稿散落偶得數首亦自有致送人尉西蜀云百仞髙峰入縣門官閒何處不君恩莫將萬里思家淚落盡巴江一夜猿又范増墓云鴻門玉玦計難行楚漢雌雄勢已成何待彭城方發憤可知亞父亦虗名孤墳不濺英雄淚落日堪傷鸛鶴聲此去赤松應咫尺白雲千載壯留城鴻門宴謝臯羽鴻門宴一篇可泣鬼神楊用修極稱之又有楊亷夫韓仲村繼作稍不及也予友林子真復擬一首云翳雲埋空日色黄一龍一蛇兩相將指天有約公莫舞後入者臣先者王此去鴻門判生死戰塲咫尺華筵裏漢王若失我為禽寳玦無光玉劍起覆巵壯士怒酒醺芒碭山北愁歸雲一雙玉斗正飛屑漢王間道馳至軍竒峭可喜不減廉夫仲村也吳非熊新安吳兆非熊能詩而貧日甚游江湖十年落魄不能為歸計有詩云谷口鐘聲度嶺㣲嶺頭嵐氣散朝暉江山處處通鄉路只是遊人不得歸可謂深於貧者矣又如松楸有夢鄉山逺桑柘無烟野市寒歸路馬寒廬岳雪驛樓人夢秣陵鐘尊前坐卧憐多病海内存亡問故人原桑漸緑春蠶起岸草初齊候鳥鳴皆儁爽有味予友曹能始交遊遍海内而獨賞心非熊卒之客死粤西悲夫貧況陸放翁詩云糴米歸來午未炊家人竊憫老翁飢不知弄筆東窓下正和淵明乞食詩近友人新安吳兆詩云釡裏生魚甑裏塵非闗久病却闗貧案頭但有梁鴻傳閒誘荆妻學古人皆深于貧況者此況難與富兒道耳采蓮曲吳門沈從先采蓮曲解道芙蓉勝妾容故來江上采芙蓉檀郎何事偏無頼不看芙蓉却看儂風致可挹林春秀古田隠士林春秀字子實號雲波性嗜酒躭詩家貧不能取酒有友鄭鐸多良醖日往飲焉醉後則酒狂不可禁鄭度其量錫造一壺刻雲波二字至即盛酒飲之三十年如一日也林詩竒警不凡山居云但住溝西第五村香秔釀熟少開門家僮祇自為樵牧竹徑憑他長子孫雨過暁山泉噪澗花生春菜蝶穿園抱琴客到棠梨下夘酒猶醺藉栁根又云迴巷短垣緣枸杞古塘枯竹立鵁鶄壁間寫遍籬花影雲裏崩來水碓聲又云野老眼經門刻字漁郎親見水沈碑鄭歸泉下數年林亦髪種種矣每讀其詩輒詫與人兩絶也白燕詩白燕詩國朝袁凱最得名而後人和者最多近見江西鄧泰素二律亦新麗可喜從前故壘是耶非别後新姿似者稀春暁玉樓乘霧去夜間銀漢帯星歸凌波不著鴉頭襪剪水如牽鶴氅衣多少伯勞堪逺避輕描淡抹向西飛同去同來伴侣非異姿異態世全稀鉛華盡洗都無著銀蒜低垂若箇歸逺向吳門裁匹練早從王謝託烏衣惟餘嘴距新紅溜猶啄梨花蹴絮飛墨紗燈閩中近製墨紗燈精巧異常海内爭重之曹能始曾扵杭州逢元夕人家有張此燈者乃邀友人同咏能始詩云質裂横疑水光生薄似苔憑將彩筆畫認作剪刀裁鳥向空中度花從鏡裏開細看若無力不畏暁風催諸子罷唱問月樓集崔孝廉徴仲貽予新梓問月樓詩中多儁語贈州同王九臯云笑我無魚歌幸舍憐君有蟹領監州送劉之罘將軍云射虎功髙偏不賞雕龍才老竟如斯贈陶嗣養云鳥留書法皆成篆龍是文心不用雕贈王藎卿再舉子云搗盡𤣥霜原得偶捧來明月本成雙弔謝臯羽云魂隨宋寢冬青樹墓傍嚴陵古釣磯煅煉工巧詞壇之射鵰手也長溪小草潮陽吳光卿仕訓以孝廉董長溪教事工于詩有卓錫寺云老僧舊説留衣地幼婦新題卓錫碑又贈龔令君云問俗已看馴魯雉隨車復見舞商羊出都門云能無背水師韓信豈有窮途效阮公詠懐云少年懶性抛書早暮景㣲官照鏡頻潮陽前有周廷尉善鳴今則屈指光卿徐氏筆精卷四
