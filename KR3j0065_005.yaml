body:
  text: 徐氏筆精卷五明徐􅎾撰詩談歸宗偈歸宗芝菴主依黄龍遂領深㫖作偈云千峰頂上一間屋老僧半間雲半間昨夜雲隨風雨去到頭不似老僧閒雖渉禪機當為佳絶句也禪偈象田梵卿禪師嘉興人上堂偈云春已暮落花紛紛下紅雨南北行人歸不歸千林萬林鳴杜宇我無家兮何處歸十方刹土奚相依老夫有箇眞消息昨夜三更月在池泐山靈澄禪師偈云東菴毎見西菴雪下澗長流上澗泉半夜白雲消散後一輪明月到牀前雖曰禪機實有詩致簡堂頌簡堂和尚頌云地爐無火客嚢空雪似楊花落歲窮破衲蒙頭燒榾柮不知身在寂寥中丹霞丹霞語録云長江澄徹映蟾華滿目清光未是家借問漁舟何處去夜深依舊宿蘆花永明禪師杭州永明壽禪師山居詩云且停多事莫矜誇寂寞門中有道華偎嶺静同猿窟宅栽松閒共鶴生涯榮來祗愛添餘禄春過誰能悟落花惟有卧雲塵外客無思無慮老烟霞又云浮生但向忙時過萬事須從静裏休師道場故在淨慈寺靈塔故在太慈山歲久廢為民墓萬厯乙巳法裔大壑詢之老農掘得石匣拾舍利十一粒靈骨俱在今移置淨慈後山起塔封焉智圓宋孤山智圓法師示寂遺訓以陶器合瘞後十五年積雨山頽眞身不壞爪髮俱長有自悼詩云蕭蕭墓後三竿竹鬱鬱墳前幾樹松此處不湏兄弟哭自然相對起悲風木菴和尚金元時有僧木菴與元好問厚善嘗有七夕感懷詩云銀河如練月如舟花滿人間乞巧樓野老家風依舊拙蒲團又度一年秋陳朝檜松江上海静安寺有陳朝檜皮陸俱有詩元僧守仁云吳楓楚桞逐烟空陳檜依然䕶梵宮可惜貞明歌舞地後庭無樹著秋風天如禪師元末姑蘇城中師子林天如禪師俗姓譚氏江西永新人嘗作楞嚴㑹解行於世又能詩聊録數首於後鄉人問我幾時還向道于今又入山一箇蒲團半間屋吳淞江上九峰間竹屋茶香滿澗烟緑杉深處響流泉目前有法誰能説落日微風一樹蟬竹根犬吠隔溪扉湖雁聲高木葉飛近聼始知雙艣響一燈浮水夜船歸開渠築岸䕶低田坐聼隣翁説去年賣却犁鋤買漁網兒童蕩槳到牀前又如隨縁消舊業任運過時光三界如夢宅四大如漚花一息微如絲寧肯長相續皆警句也恕中偈國初恕中和尚名無愠台州臨海人太祖召至闕下畱住天界寺時宋景濓在翰苑遇休沐必訪恕中恕中工詩有句云日讀經兮夜讀經眼光直與月争明有時不受諸天供饑食松花骨也清又云坐久藜牀穴書多鐵硯穿家貧無盜入山好有僧來皆有清思宗泐宗泐洪武中詩僧也祖龍行云祖龍乃好長生者沈璧徒來華山下目斷樓船海氣昏鮑車亂臭沙丘野驪山下錮三泉開泉頭宮殿仍崔嵬當時輸作方亹亹函谷無關小龍死百尺降旗軹道傍十二金人淚如水題宋徽宗山鵲圖云落日黄塵五國城中原囘首幾含情已無過雁傳家信獨有松枝喜鵲鳴銅雀臺云西陵樹色暮蒼蒼明月相將入御牀寂寂帳前歌舞歇幾人含涕憶君王皆詩中之斧鉞也古村居釋宗泐古村詩云古村民古村居古村有田復有廬屋後桑麻四五區屋前榆栁八九株老婦辟纑兒讀書青燈夜照三更初牛角𢃄經耕且鋤年年歲歲輸官租聖人治世如唐虞飽來擊壤歌康衢烏紗作巾白布襦東隣西舍相招呼醉歸兀兀杖自扶古村民古村居寫盡田家樂事如一幅佳畫天印禪師天順間延津天寧寺天印禪師年四十足不出關至八十一歸寂謂衆曰吾寂後三年某日有星自東飛入西塟吾時也僧徒寄肉身於簥中三年蠅蚋不侵及期有星大如斗從東入西遂塟之所著黄蘗心要天印語録徹空内集直透禪微嘗和永明山居詩有云穿來冷鐵多年衲坐破寒龕幾片氊風寒夢醒巢松鶴日暖藤牽挂樹猿雁將舊侶穿雲去鴉引新雛背雨過寒燈一盞半間屋夕磬三聲㡬箇山槿籬土暖花開早竹坂泥深笋出長澗水喧空懸瀑布岩松掛月碾氷輪皆警句也雪峰僧詩侯官雪峰山有二十四景天順中寺僧源潭作也雪峰云瑤臺凍合深迷路玉樹花開半雜松藍田莊云分水遠從寒澗落隔雲常見夕陽舂一洞山云松逕月斜巢鶴唳石門雲濕雨龍還無字碑云剝落舊紋惟蘚迹糢糊新篆是蝸涎萬松關云琥珀氣浮成翠靄黄金花落混香泥梯雲嶺云雲開鳥道層層險路入松門歩歩通蘸月池云弄珠神女乗空去臨鏡嫦娥倒影看閩中詩僧此為上乗五井詩僧四明五井山僧傳慧字朗初余曽見其詩于明詩正聲中但收五言律絶六首平淡無竒也辛丑之冬余客四明始與定交見其著述甚富談鋒如河詩多不能盡憶如寄王百谷云惠山泉水虎丘茶相去柴門路不賖經歲故人書斷絶夕陽林外即天涯湖上雜咏云草色連雲暗水陂掠芹乳燕影差池游絲似惜春光盡宻罥殘花挂竹枝湖水無風似鏡清湖船日日送人行垂楊浪許闗離别有限長條無限情畱别念空云問水尋山各自忙草鞋無底踏秋霜江南遊遍將江北何日還來共竹房東山紀别云谷口風斜斗笠狂米嚢夾路白於霜山童不掩溪頭寺一任閒雲滿竹廊每咏其詩便有支公之想玉山道者餘冬序錄記玉山道者還家詩云春色闌珊四月天數聲啼鳥落花前荷知有熱先擎葢栁為無寒漸脱綿處處勸耕梅子雨家家繰繭竹籬烟慿誰寄語仙源客洞口雲封信不傳辛丑冬余偶客邵武見仁壽寺壁間書此一詩起結中聯稍異今識于此東風不到畫樓前春事闌珊又一年處處揷秧梅子雨家家繰繭竹籬烟荷知有暑先擎葢栁為無寒盡脱綿莫笑山家滋味薄鳥聲啼破落花天寺壁詩不書名姓年月大都類國初人筆近歲寺燬字不存矣漫記以質博雅顧野王宅顧野王舊宅在建寧東觀有道士題詩云天上歸來鬂已皤故山涼月在松蘿自傳一曲廣陵散幾見桑田生白波正德庚辰改觀為建安學宮桑田之歎其先䜟歟莎衣丐者正徳間五羊趙克寛為建安教諭嘗與朋輩交遊作送春詩俱用風雨字傍有丐者負莎衣立和云怨風怨雨縂皆非風雨不來春亦歸蜀魄啼殘椿樹老吳蠶喫了柘陰稀墻頭紅爛梅争熟口角黄乾燕學飛自是欲歸歸未得肩頭猶掛一莎衣問之不答而去癡頥子武夷汪道人自號癡頥子又號麗陽嘉靖初修眞于接筍峰遺蜕塟於峰之石壁予游武夷得汪手錄吟稿一冊中多佳句有答葉東林云柴扉終日對雲闗何事遊人興未䦨花雨正迷蝸角競茶烟初歇鶴聲殘閒儲白石資荒歉旋種丹田不屬官近獲兩枚歐冶劒請君夜傍斗牛看又如石榻枕泉眠竹影柴門畱月浴金丹又如紫檀匣鎖元中印白玉縧懸肘後符又如曉炊石鼎三甌雪午枕山屏一縷烟絶句如幔亭峰下寒雲外流水飛花送小舠夜宿山房清不寐紫簫吹徹月華高又如赤壁元堂水火交青山旋繞白雲坳枕琴卧誦黄庭罷新月鈎簾傍鶴巢絶無烟火食氣乩仙吳門沈貞吉石田之伯父也一日請乩仙有詩云鶴背發長歌清風散林樾萬里洞庭秋湖波弄明月又云片月已蒼蒼詩成天欲曙獨宿忽不見白雲自來去鬼吟嘗聞某寺有旅櫬士人讀書寺中聞窓外吟曰月上梅梢已二更寒窓猶有讀書聲士人曰游魂何不歸鄉土辜負洛陽花滿城薛禮唐書薛仁貴軍中歌曰將軍三箭定天山戰士長歌入漢關按集古錄薛禮字仁貴見天寳二年苖神客所撰碑文軍中之歌碑亦不載歐陽遺詩余在白門時編刻歐陽詹集自謂無遺矣偶閲全蜀藝文志詹有新都行云縹緲空中絲蒙蘢道傍樹翻兹葉間吹惹彼花上露悠揚絲意去苒蒻花枝住何計脱纒綿天長春日暮原本所遺尚俟續補衛公漳浦詩李徳裕嘗至閩中過漳浦驛詩云嵩少心期杳莫攀好山聊復一開顔明朝便是南荒路更上層樓望故關此詩鮮有知者桞公權詩桞公權以書名一代而詩無聞高棅收品彚唐代諸賢無遺而公權名缺焉予得其遊底柱山一首云禹鑿鋒鈚後巍峩直至今孤峰浮水面一柱釘波心頂壓三門險根隨九曲深撑天形突兀逐浪勢浮沉㟁響秋濤射祠斑夜浪侵噴香龍上下刷羽鳥登臨祗有尖迎日曽無影轉隂舊碑文字在遺事可追尋底柱山在陕州韓致堯卒於閩中韓偓流寓閩中所作詩僅傳南臺懷古一首云無那離腸日九迴強舒懷抱立高臺中華地向天邊盡南國雲從島上來四序百花長見雨一冬無雪却聞雷離宮紫氣生冠冕却望扶桑病眼開偓卒於閩其子寅亮與鄭文寳言偓捐館日温陵師聞其家藏箱笥頗多而緘鐍甚固發觀得燒殘龍鳯燭金縷紅巾百餘條蠟淚尚新巾香猶鬱乃偓為學士日視草金鑾夜還翰苑當時皆宮人秉燭以送悉藏之又文寳少時於延平見一老尼亦説斯事尼乃偓之妾耳第未考偓塟於何所也劉昌言世人常言一舉首登龍虎榜十年身到鳯凰池之句不知此乃宋太宗朝泉州劉昌言上吕蒙正相公詩也重名清望遍華夷恐是神仙不可知一舉首登龍虎榜十年身到鳯凰池廟堂只似無言者門館長如未貴時除却洛京居守外聖朝賢相復書誰昌言仕至工部侍郎嘗獻聖徳詩五十韻得君之盛未有其比元章逸詩米元章遺文散落傳者甚少近范長康作志林收拾殆盡然亦有失收者一統志載盱眙八仙臺一首山徑重重鎖緑苔松花曽見幾番開神仙費盡招呼力那得仙官一箇來韻語陽秋載陪東坡往金山作水陸云久陰陣奪佳山川長瀾四溢魚龍淵衆看李郭渡浮玉晴嵐掃出清明天頗聞妙力開大地足病不列諸方仙想應蒼壁有垂露照水百怪愁寒烟又棲雲閣云雲出救世旱澤浹雲尋歸入石了不見豐功已如遺龍騫薦復起抱石明幽姿雲乎無定所隱者何常栖近閲千百年眼載賞心亭一絶晴新山色黛風縱蘆花雪盡日倚䦨干寒宵低細月皆可補志林之缺者也萍齋宋林彖莆人工詩閒行云風搖麥壠東西浪春入郊原遠近花閒趂溪流到村曲斷垣喬木兩三家即事云草上濃霜泫未乾曈曨初日破朝寒林中槁葉隨風去紅柿猶餘鳥啄殘彖號萍齋乾道間詔舉遺逸起家為迪功郎仙遊法華菴是其隱處勸農宋畱碩字季膺丞相正之子也官南恩州勸農詩云春風勾引出郊行小隊迢迢草路平自笑田蕪不歸去三千里外勸人耕徐彜甫詩宋三山徐範字彜甫慶元中與楊宏中劾韓侂胄編管遠方禁錮志乗及綱鑑稱為六君子然未傳能詩也嘗登太行山云茫茫遠樹隔烟霏獵獵西風振客衣山雨未晴嵐氣濕溪流欲盡水聲微回車廟古丹青老𤾂子城荒草木稀珍重狄公千載意馬頭重見白雲飛範登嘉定進士通判澤州官終朝奉大夫寔不肖族祖也詩所傳者僅此耳見河南通志岳墓詩古今題岳王墓者多矣而佳者實未易得元季韓古遺一篇岳集未收差有温李之調詩云妖星墜地芒角赤劍龍悲吼國蕭瑟中原王氣挽不回將軍一死如毛擲秦家小兒眞戲劇播弄造化搖樞極指讐為親奸且逆隻手上遮天眼碧九重茫茫隔天日無由下燭臣愚直臣愚萬死不足惜國耻未湔猶憤激古墳埋寃血空瀝風雨年年土花蝕我恐精忠埋不得白日英魂土中泣請將衰骨斵出荒苔痕獻作吾王補天石古遺名信同寧徳人項羽廟林景熈題項羽廟云英雄蓋世竟何為故里淒涼越水涯百二勢傾争逐鹿八千兵散獨乗騅計疎白璧孤臣去淚落烏江後騎追遺廟荒村人酹酒至今春草舞虞姬景熈即收宋六陵骨林義士也郊居生金銅仙人辭漢歌余辛丑客邵武於友人徐梧家見楊亷夫手書一卷字法蒼勁其後䟦云此乃郊居生題金銅仙人辭漢歌予謂小李絶唱後萬代詞人不可著筆此生膽大而有是作也呼天籟裂地維鼎定天下見於此矣銅臺折當塗高又豈為卯金氏感慨也哉其詩云神明臺些茂陵鬼六宮火滅劉郎死芙蓉仙掌擎高秋雄雷掣碎銅蛟髓魏官移盤天日昏車聲轔轔繞漢門銕肝苦淚滴鈆水石馬尚載西風魂青天為客驚曉别天籟啼聲地維裂銅臺又折當塗高夜夜相思渭城月郊居生不知何人讀此詩可泣鬼神宜亷夫愛而録之第亡其姓名可惜也陳有定陳有定元末倡義勤王太祖恨其不歸附置之重辟高岱王世貞郭造卿嘉其忠各為立𫝊有定據閩有功於閩閩郡志皆出林宗伯司空二公之手林氏世沐國恩自不宜為有定作傳得數君紀之實不泯其忠義耳有定雖起行伍而亦能詩送趙將軍云縱横薄海内不愴别離顔幾載飄零意秋風一劍寒及被收之後作詩云失勢非人事重圍㦸似林乾坤今已老不死舊臣心胡忠臣饒州畨君廟壁有畫松元末鄱人胡閏題詩云幽人無俗懐寫此蒼龍骨九天風雨來飛騰作靈物太祖下饒州見其詩召見越八年太祖即位郡舉秀才授督府都事建文初擢右補闕靖難不屈死赤族男女死者二百十七人烟雨夜其故居孤猿哀號徹曉今有祠在鄱陽近年屠御史初為立祠掲榜丈餘忽為旋風招搖上天自午至申復還邑正堂之中毫無毀裂信胡公之神猶在予客饒謁公祠詢之里人能道其詳亦怪事也浦長源荆門詩浦長源送人之荆門詩云長江風颺布㠶輕西入荆門感客情三國已亡遺舊壘幾家猶在住荒城雲邊路繞巴山色樹裏河流漢水聲若過旗亭多買醉不須弔古漫題名近見一詩話載此詩稍異今録於後疋馬南歸望古城半林殘雨夕陽明雲邊路繞巴山色樹裏河流漢水聲墮淚有碑苔色古甘棠無樹酒旗横那堪囘首成陳迹笳鼓西風慘客情詩話無名氏予得之杭州僧房亡臣遺詩當靖難時朝士出走祝髮就傭者不可勝數宣徳初有綿竹山人題詩於浦城棃嶺云山河形勝今猶昔宮闕趨蹌事已非冀野風生雙虎鬬咸陽火起一龍飛傷心何忍聞黄詔稽首無縁見衮衣擊石獨懷千古恨仰天血淚不勝揮又萬州海雲菴有老僧示寂衣上有詩曰十年依佛國萬里走天涯舊主無尋處孤臣敢問家何心嬰組綬有血滴袈裟寒食魂應寂悲歌愧五蛇皆泯其姓氏近秀水屠侍御刻朝野彚編不載此二詩故録以待野史採擇吳康齋詩崇仁呉與弼號康齋㑹元溥之子也當英宗時講學授徒名重一時英宗特㫖聘至京授左春坊諭徳堅辭不就職仍遣行人送歸故里所著有康齋集皆光風霽月誠意正心道學頭巾語然喜為詩處處畱詠而求其不陳腐者絶少漫録數首重其品也過䢴溝云丹陽古渡接𤓰洲萬頃黄雲麥正秋一榻午風清夢覺又題新句過揚州夢家云百體衰慵兩眼花雲山久已隔紛華宵來魯水橋邊榻一片離魂只在家見紅樹云船頭時作望鄉吟難寫浮生去住心忽忽不知為客久誰家紅樹報秋深伯虎逸句唐伯虎詩今世傳者十之一耳有杜曲梨花杯上雪灞陵芳草夢中烟佳句也集中不載見郎瑛七脩類稿芙蓉園𫝊丁戊山人初家朱紫坊即宋陳忠肅芙蓉園故址也鄭繼之為題門帖云巷陋過顔老去無心朱紫園名自宋秋來有意芙蓉晩歲移居桂枝坊有詩云巷隱桂枝堪偃息家存土窟省經營呉歌呉歌云夜合花開香滿臺夜夜期郎郎不來當初只道夜合花開夜夜合那知夜合花開夜夜開畫蘭詩先君子少時得文徴仲畫蘭一幅文題詩云手培蘭蕙兩三栽日暖風微次第開坐久不知香在室推窓時有蝶飛來後宦遊南北此畫寄之親故竟致失落予幼年先君曽為予誦之至今歴三十餘年猶不忘也考之甫田集無載因記之黄后谷福安黄后谷先生釧字玠夫舉嘉靖丁酉鄉薦為温州郡丞丙辰倭寇温州將兵拒戰乗勝直進孤軍無援遂大潰賊脇之降叱之索之金復叱之賊怒支解寸斬之年四十七詔贈右㕘議祠祀之弇州王元美為作衣冠墓志先生能詩有墮樵録野望云連朝微雨恰新晴沙草含風軟緑平碧水畫船歸棹去夕陽烟樹一痕清又云竹松踈䕶兩三家流水浮香帯落花樵笛數聲烟漠漠隔溪人散夕陽斜曉行云誰家流水石橋邊􅘹麥花開白滿田日出柴門人未起嵐雲飛滿小樓前先生無子猶子嗣之蔭太學生林粤山先輩林粤山紀善畫工詩官石城令歸與先君隣居論交最宻嘗賦二律詩寄先君於京邸云花屛一别幾經秋錦里長懷舊日遊村碓溪流舂月急野亭路接占雲幽虛名自笑身為累往事徒驚鬂是愁吾道看君高誼在暮烟囘首思悠悠自憐野性生來僻愛住溪山斷俗氛林下一笻穿鳥出沙邊半舫與鷗分野僧久别詩還寄隣老頻過酒又醺目送征鴻度天碧悠悠巖際有歸雲遺稿散逸二詩曽書扇頭予至今寳藏之古文類詩古書句法可入詩者甚多文繡被臺榭菽粟食鳬雁晏子門外長荆棘堂前生藿藜甲胄生蟣虱燕雀處帷幄韓非子強弩弋高鳥走犬逐狡淮南子勁弩殪狂兕長戟斃熊虎瓦石成珪璋龍駿棄林洞鑿石有餘焰年命已凋頽抱朴子典御進新水鈎盾獻早李顔氏家訓金甲映平陸鐵馬炤長原江淹答休範書空梁落燕泥小説家嘗言薛道衡以空梁落燕泥句為煬帝所殺非也按本傳帝㑹議新令久不能決道衡曰使高熲不死令當久行帝怒令自盡又隋唐嘉話道衡因事誅帝曰能作空梁落燕泥否只謂其從今不能賦詩耳非縁此一句被殺也不然道衡佳句甚多煬帝若果忌之當早誅之矣安能容其至七十而死耶三條燭唐以詩賦取士科試日給燭三條作賦八韻時謡云三條燭盡燒殘士子之心八韻賦成驚破試官之膽又云三條燭盡鐘初起九轉丹成鼎未開然八韻律賦似不待三條燭盡而後成是知唐士才思遲鈍若温飛卿八义能有幾耶杜律雙字杜律喜用雙字泠泠冥冥皎皎淒淒霏霏細細陰陰娟娟冉冉事事深深欵欵熒熒颯颯丁丁寂寂悠悠處處泛泛納納飛飛蕭蕭滚滚短短輕輕片片姍姍飄飄箇箇輝輝青青白白紛紛淅淅團團雙雙的的漠漠遲遲荒荒泯泯欣欣時時村村㟁㟁惺惺句句哀哀匆匆暉暉蒼蒼茫茫微微脈脈湛湛裊裊戎戎淰淰至古風歌行又不可勝數矣後生後生輕侮老成從古為然杜詩云晩將末契託年少當面輸心背面笑雲溪范攄云近來年少輕前軰好染髭鬚事後生東坡云世上小兒誇疾走如公相待今安有以二公之名徳猶然不滿於後生况其他乎驥子熊兒杜甫二子一曰熊兒宗文也一曰驥子宗武也甫詩云驥子好男兒又云驥子春猶隔又云驥子最憐渠又云詩是吾家事又云汝啼吾手戰而無一語及熊兒何也豈宗文失學耶失學從兒懶豈指宗文耶南海寳玉唐王珪之孫砯使南海子美詩曰家聲肯墜地寳貝休脂膏魏徴之孫祐使交廣子美詩曰南游炎海甸世亂輕土宜子美愛惜王魏故戒其孫之却寳貝土宜也至岑參送人尉南海則曰此鄉多寳玉愼莫厭清貧乃教之以貪也今之為官多喜入廣其嘉州之意乎古栢行子美古栢行云霜皮溜雨四十圍黛色參天二千尺四十圍者言其榦也二千尺者言其高也語似不經然段文昌武侯廟亦作古栢文云合抱在于旁枝駢梢葉之青青百尋及于半身蓄風雷之冥冥觀旁枝合抱則見榦之四十圍百尋半身則見高之二千尺二公詩文暗合栢樹之大不誣矣唐貢荔枝唐鮑防襄州人天寳末舉進士大厯中為福建觀察使時明皇詔馬遞進南海荔枝七日七夜達京師防作雜感詩云漢家海内承平久萬國戎王皆稽首天馬常銜苜蓿花遠人歲獻葡萄酒五月茘枝初破顔朝離象郡夕函關雁飛不到桂陽嶺馬走皆從林邑山甘泉御果垂仙閣日暮無人香自落遠物皆重近皆輕雞雖有徳不如鶴目擊時艱一念忠懇可見是知貴妃所食荔枝實出南海已見劉昫唐書并防詩蔡君謨譜謂愛嗜涪州歲命驛致羅景綸以為一騎紅塵乃瀘戎之產恐悞矣鶴林寺李渉游鶴林寺云終日昏昏醉夢間忽聞春盡强登山因過竹院􅑮僧話又得浮生半日閒曽子固續云昔人春盡强登山只肯逢僧半日閒何事一尊乗興去醉中騎馬月中還文士窮孟郊落第云出門自有礙誰謂天地寛于濆思歸云日開十二門自是無歸計文士之窮眞堪涕淚射鴨孟郊作尉開射鴨堂蓋性喜射鴨為樂也有句云不如竹枝弓射鴨無是非寔自況耳詩䜟不然白樂天十八歲時作絶句云久為勞生事不學攝生道少年已多病此身豈堪老然白公壽至七十五善才元和中曹保之有子善才孫曹綱俱善彈琵琶有名白樂天琵琶行云曲罷曽令善才伏用當時事也樂天賣田宅白樂天有詩云先賣南坊十畝園次賣東郭五畝田然後兼賣所居宅彷彿獲緡二三千吾今年紀七十一眼昏鬚白頭風眩但恐此錢用不盡即先朝露歸夜泉此語可為老人求富者之鍼砭也長吉詩用事李長吉詩本竒峭而用字多替換字面如吳剛曰吳質美女曰金釵客酒曰箬葉露劍曰三尺水曰玉峰劍具曰簏􅉡甲曰金鱗燐火曰翠燭珠釧曰寳粟氷曰泉合嫦娥曰仙妾讀書人曰書客桂曰古香裙曰黄鵝釵曰玉燕蠶曰八繭月曰玉弓曰碧華日曰白景曰頳玉盤帨曰封巾城曰女垣䑕穴曰竄徑天門曰闔扇王孫曰宗孫禁中曰御光小栁曰拱栁鵾絃曰雞筝竹曰緑粉笋曰龍材漆燈曰漆具旅獒曰旅狗帯曰腰鞓犬曰宋鵲墓曰墳科碑曰黒石拍板曰蠟板白馬曰白騎髮曰鳯窠懸鶉曰飛鶉日光曰飛光槐曰目鮐背曰鮐文陶令曰陶宰螢曰淡蛾鮫綃曰海素熊掌曰玃拳五星曰五精山曰叠龍馬曰神騎天曰圓蒼女衣曰銀泥符曰合竹錢曰蚨母白黑曰粉墨香曰龍腦丹書曰靈書賓雁曰客雁湘君曰江君四皓楊鐵厓嘗論四老人者秦皇漢帝之不可迹而招者也使為子房一呼而至子房之奴不翅也豈足為四老人哉子房之所呼者老人之贋者也蓋子房一時巧術借人間四老以動漢廷如優孟之衣冠面目髭髩為叔敖而出者漢祖驚見以為眞而太子之羽翼遂成豈料其為贋也漢廷諸人罔有覺者墮良之計深矣太史公闕而不録其知良之所為歟唐李頻題四皓詩云龍樓曽作客鶴氅不稱臣尊之也余曽游桃源有詩云種得桃花洞裏居子孫相約事耕鋤采芝笑殺龎眉叟輕出商山翼漢儲政謂四老人未宜輕出商山不如秦人之高蹈也唐僧不戒酒唐僧多不戒酒余嘗見有元人畫醉僧圖僧可醉乎任華贈懷素上人云十杯五杯不觧意百杯已後始顛狂韋應物有寄釋子良史酒云秋山僧冷病聊寄三五杯應瀉山瓢裏還寄此瓢來然則唐僧嗜酒者多矣詩人不以為諱也僧飲酒宋蘇子美贈僧秘演詩云賣藥得錢祗沽酒一飲數斗尤惺惺演塗去之子美大怒演曰公詩傳萬口吾持戒不謹已為浮屠罪人公從而暴之可乎懷素工草書同時如顔尚書張處士餉酒與魚然則懷素亦飲酒茹葷僧也予游四明時與僧公朗交甚宻詩多竒警亦終日陶陶然醉屠緯眞諸公亦不責之持戒總之未能見性即左持酒杯右持蟹螯何害耶石羊松石黄初平叱石為羊在金華洞金華饒古松往往化而為石陸龜蒙詩云萬古清風吹作籟一條寒溜滴成穿指東陽松化石也石化羊松化石皆在金華亦一異也蘭眼櫻唇蘭眼擡露斜櫻唇映花老陸龜蒙子夜歌中語阿瞞岧郎君虎唐𤣥宗稱阿瞞按唐語林開元二年春上幸寧王第叙家人禮上曰大哥好作主人阿瞞但謹為上客杜氏通典亦云上禁中嘗自稱阿瞞乾符歲僖宗幸蜀羅隱詩云馬嵬山色翠依依又見鑾輿幸蜀歸泉下阿瞞應有語這回休更怨楊妃唐徳宗小名岧郎宋高宗小字君虎鷓鴣杜鵑唐鄭谷作鷓鴣詩得名宋建炎中諌議大夫鄭㲄作杜鵑詩諭百官當迎乗輿反正之意稱鄭杜鵑楊大年宋楊大年數歲不能言偶家人抱登樓偶觸其首即能語吟詩曰危樓高百尺手可摘星辰不敢髙聲語恐驚天上人然李白峰頂詩曰夜宿峰頂寺舉手捫星辰不敢高聲語恐驚天上人大年數歲能吟豈前生夙根耶張三影張子野號三影謂雲破月來花弄影隔墻送過鞦韆影浮萍斷處見山影也後山詩話又云雲破月來花弄影簾幕捲花影墮絮輕無影若然則五影矣江郎石江郎三片石相傳有江氏兄弟三人登之化為石宋王禹偁詩云三茅遺躅在金陵又見江家有弟兄謝眺門前春色好一時分付與岩扃余觀江郎之石高數十仞非人所化必矣然郡國志亦云江氏兄弟所化歲漸長此尤不根也橘蟲化蝶蝶之翅文者牝也翅純者牡也多橘蟲所化范成大詩云橘蠧如蠶入化機枝間垂繭似蓑衣忽然脱作尋花蝶翅粉纔乾便學飛鴨脚子鴨脚子即銀杏也歐陽永叔和梅聖俞詩云鵞毛贈千里所以重其人鴨脚雖百箇得之誠可珍又云鴨脚生江南名實未相浮絳囊因入貢銀杏貴中州此果北地不能種今人又呼為白菓其葉頗似鴨脚又鮑照賦園葵已有鴨脚二字朱陳村朱陳村事見白樂天詩按徐州志亦不詳所在東坡題朱陳嫁娶圖云何年顧陸丹青手畫作朱陳嫁娶圖聞道一村惟兩姓不將門户買崔盧又云我是朱陳舊使君勸農曽入杏花村而今風物那堪畫縣吏催錢夜打門二詩切中時弊予喜誦之儲祥宮碑東坡在翰林被㫖作上清儲祥宫碑哲宗親書其額紹聖黨禍起磨去坡文命蔡元長别撰故東坡自作詩云淮西事業冠吾唐吏部文章日月光千載斷碑人膾炙不知世有段文昌蓋自況也題云不知何人作得于沿流館中蓋避禍而諱之也以韓蘇重名尚遭此厄毋怪今之文人不售於俗眼也元暉印章米元章嘗得古印元暉二字後字其子曰元暉黄山谷詩云我有元暉古印章印刓不忍與諸郎虎兒筆力能扛鼎教字元暉繼阿章父子俱用元字本此劉鐵笛武夷五曲舊有鐵笛亭舊志云宋胡寅與劉衡遊此劉善吹鐵笛胡贈之詩云更煩横鐵笛吹與衆仙聽劉没亭廢朱文公一日與客尋其故址俄有笛聲發於林外文公驚異因復作亭以鐵笛名之萬厯初吾郡陳司馬于五曲築雲窩凡亭榭皆以雲名更鐵笛之名為遲雲泊然無味矣棊宋魏鶴山贈奕者云少年不識棊但見剝剝啄啄更相圍有人指授予衝關奪角刼復持少年不識星但見歴歴落落還如棊亦有告予者縮贏伏見元有期七年五溪讀書暇時把二事相悦怡久之剨然悟是間有數人不知三百六十一棊子此是乾䇿藏其竒萬有一千五百二十星若以三十六乗之乗之既盡除坤䇿恰與棊數無参差此理極精宻歸後不復思此詩引易以悟棊者也人能精易數不患棊之不擅國手潘紫岩癸辛雜識云閩人潘廷堅初名筠後以詔歲乞靈南臺神夢有持方牛首與之遂改名牥殿試第三人牥號紫岩跌宕不羈日醉騎黄犢歌離騷于市人以為仙嘗與社友飲梅花下皆白衣既而俱脱衣飲酒酣客散衣間各濃墨大書一詩矣又同社置酒瀑泉庭堅脱巾裸立流泉之衝且唱濯纓之章衆羅拜以為不可及然寒氣已深入經絡歸即卧病而殂庭堅讀書五行俱下終身不忘六歲時有詩云竹才生便直梅到死猶香識者知其不永郡志列庭堅于風概似未盡其生平豪舉耳洞中紅荔枝烏石山有宿猿洞怪石森聳昔有老翁畜一猿毎夜輒宿洞中唐季大築城垣隔此洞於城外宋熙寧中湛郎中俞棄官歸隱於此程大卿師孟篆書宿猿洞三字於石徑尺許洞前舊有荔枝樹極佳名曰洞中紅古靈陳襄贈湛俞詩云此去蓬萊峰頂月夢魂應到荔枝園羅源林逈詩云荔枝影裏安吟榻菡蓞香中繫釣舟國朝廢為叢塜荔枝已無存矣謝肇淛有句云湛侯當年拂衣歸卜築喜就城南陲菡萏香風垂釣裏荔枝寒影對僧時予亦有詩云怪石高於雉堞齊昔人曽此卜幽栖白楊滿地髑髏出蒼蘚上崖名姓迷夜雨徒聞山鬼哭秋風不見野猿啼荔枝樹死洞門塞行到此中生惨悽壁上諸名公題刻俱存無人修復良可慨也瘞筆隋智永禪師王右軍七世孫臨書三十年取退筆頭瘞之號退筆塜㑹稽山五雲顯聖寺後有右軍筆倉今為眢井清異錄載趙光逢薄遊襄漢濯足溪上見一方磚類碑題云髠友退鋒郎功成髩髪霜塜頭封馬鬛不敢負恩光後題獨孤貞節立此蓋好事者瘞筆之所宋徽宗畫宋徽宗繪畫題咏者多含譏刺元成廷珪題白頭翁圖云梔子紅時人正愁故宮衰草不勝秋西風吹落青城月啼得山禽也白頭國初高季廸題畫眉百合圖云百合蕪殘六合塵汴京啼鳥怨無人不知風雪龍沙地還有圖中此様春又題宣和畫云御翰親題賞畫工疎枝野鳥怨秋風那知囘首宣和殿物色淒涼與畫同張來儀題桂枝圖云玉色官瓶出内家天香濃浸月中葩六宮總愛新涼好不道金風捲翠華汪廣洋題雙鴛圖蘆葉青青水滿塘文鴛晴卧落花香不因羌管驚飛起三十六宮春夢長釋來復題喜鵲圖黄沙風急蒺藜秋回首中原淚暗流誤聽當時靈鵲語誰知舊喜是新愁釋宗泐題小鵲圖云落日黄塵五國城中原回首幾含情已無過雁傳家信獨有松枝喜鵲鳴又雪江獨棹云艮岳秋深百卉腓邊塵吹滿衮龍衣淒涼五國城邊路得似寒江獨棹歸周仲方題雙燕圖江南簾幙重重雨艮岳河山處處花两地舊巢傾覆盡西風萬里入誰家張璨題墨蘭云御墨淋漓寫楚蘭披圖却憶政宣間分明一種湘纍怨萬里青城似武關夏忠靖題墨竹云寳殿無心論治安碧窓著意寫琅玕枝枝葉葉眞瀟洒争耐金人不愛看又無名氏題石橊云金風吹綻絳紗囊零落宣和御墨香猶喜樹頭霜露少南枝有子殿秋光王元美題馬圖云天閑萬馬盡權竒寫出丹青意自悲長白山頭三萬匹可憐龍種一雄嘶康與之題花鳥云玉輦宸遊事已空尚餘奎藻繪春風年年花鳥無窮恨盡在蒼梧夕照中項忠題鴝鵒圖云五國城邊掩淚時汴梁宮闕了無遺争如鴝鵒知春意猶占東風第一枝呂囦題鴝鵒圖云御墨淋漓玉數枝畫圖瀟洒使人悲春風鴝鵒湘江景不似龍沙夜雪時余題秋江獨釣圖鏡水無波釣艇閒人間治亂豈相關金風忽動黄沙暗不見中原萬歲山又題墨蘭圖嫩蕊疎花寫澤蘭宣和御墨半凋殘國香莫道蕭條甚北地風霜不耐寒畱夢炎趙孟頫畱夢炎失身降元有玷科名元世祖問葉李畱夢炎優劣於趙孟頫孟頫曰夢炎臣之父執其人重厚有大臣器帝曰汝以夢炎賢於李耶夢炎為宋狀元位丞相當賈似道悞國罔上夢炎依阿取容李乃布衣伏闕上書是賢於夢炎也汝以夢炎父友可賦詩譏之孟頫曰狀元曽受宋家恩國破臣强不敢言往事已非那可説且將忠直報皇元何潜齋譏畱夢炎宋末狀元畱夢炎衢州人失身事元遺笑千載時夢炎北歸就養其子於嚴陵判㕔何潜齋孟桂寄之詩曰昆明灰刼化塵淄夢裏功名一黍炊鍾子不將南操變庾公空抱北臣悲歸來眼底湖山在老去心期浙水知白髪門生憐未死青衫畱得裹遺屍不知當時夢炎得此詩作何媿謝夏貴淮西閫帥夏貴以至元丙子附大元授中書左丞至己卯薨有弔以詩曰自古誰不死惜公遲四年問公今日死何似四年前元學士古田張以寧以洪武二年徴為原官四年卒與夏貴略相似松雪題畫嘗於故家見趙仲穆畫一幅子昻題云昨自杭回道經茅山之西野時夕陽也松如偃蓋水若鳴琴青山萬重白雲千頃山下有乗駿馬者出沒於其間乃天然一圖畫心有所得以目疾未愈不能舉筆因命子雍代之雲白山青幾萬重溪邊游子馬如龍眼前有景畫不盡歸去鷗波命阿雍至大四年五月既望識於鷗波亭高宗書畫國初王澤題宋高宗所書杜詩云江頭宮殿日遲遲朝退千官黙坐時春盡龍沙無雁度素縑只寫少陵詩高壁云萬里龍沙信不通江頭虚築上皇宮中興謀略無心定較得臨池筆法工吾鄉陳㕘藩全之題高宗鸚鵡云隴山鸚鵡説還鄉中使傳宣出禁墻漠北有人歸不得思鄉愁比隴山長予題敗荷鶺鴒圖云游宴湖山啓御園紹興粉本至今存弟兄急難龍沙北不獨悲鳴痛在原松雪畫馬趙子昻畫馬近代題詠多含貶辭國初楊文貞士竒云天閑第一渥洼姿卓犖騰驤肯受羈何不翻然絶牽鞚踏雲追電看神竒李文正東陽云宋家龍種墮燕山猶在秋風十二閑千載畫圖非舊價任他評品落人間又無名氏云塞馬肥時苜蓿枯奚官早已著貂狐可憐松雪當年筆不識檀溪寫的盧釋古淵題山水云雪後潮痕上釣磯江南天水一絲微萋萋芳草迷禾黍何事王孫尚不歸予有詩云宋室王孫粉墨工銀鞍金勒貌花驄天閑十二眞龍種空自驕嘶向北風王道士梧竹圖楊文貞士竒官春坊日從沈某求王道士梧竹圖不與後李時勉掌學士印沈遽贈之後文貞與李對奕文貞奕勝遂捲而去自是李見輒有不舍之意文貞題一絶歸之云永别錫山王道士空餘翰墨亂人心黄金若綰封侯印曹霸王維聚若林楊世昌東坡游赤壁時有綿竹道士楊世昌同遊赤壁賦云客有吹洞簫者即世昌也吳匏菴詩云西飛孤鶴記何詳有客吹簫楊世昌當日賦成誰與註數行石刻舊曽藏此一證也少年致政呉郡楊循吉字君謙登成化甲辰進士為禮部主事初授官即致仕歸讀書支硎山南華寺沈石田賦詩以美之云到手功名賦子虚深山長谷覔安居讀書已足功名事更讀人間未讀書都門祖帳百花飛多見龍鍾賦式微較取栁條千萬折不曽送一少年歸春隂詩憲宗朝金陵王給諌欽佩舉進士獨居逆旅有歌而過者有朝來睡起繞花行香霧襲衣寒氣重之句後閣試春陰詩遂用之相國李公東陽謂非世人語遂改庶吉士官終太僕少卿此與錢起湘靈鼔瑟事同第欽佩不得全篇可惜也交州木山海南木石先輩許黄門天錫正徳中奉使安南於僧寮中得枮木一片狀若山峰黄門厚酬主僧携歸閩中自刻詩云萬年木精化青牛瘦骨不朽沈江洲江洲水急魚龍湫神物始出隨迴流玲瓏崒嵂誰能鏤山僧得之溪峒酋蠻荒僻遠絶賞鑒木爾韜晦誰怨尤洞江先生好事者邂逅願脱千金裘古今琴材出爨下㧞爾幸免為人槱風厓雨谷偕我老無復夢想仍丹丘歲久流落士夫家已百年不知寳惜棄之泥滓予友高景倩博物好古見而賞識遂乞以歸洗刷塵垢置之齋中名其齋木山同社俱有詩紀其事然竟不知何木也黄云金陵姚允初觀察海南得一石如木有枝云出之海中余曽見之戒酒詩嘉靖初建州士人陳安性嗜酒落魄不羈好吟咏嘗作戒酒詩云門前冷落故人疎日日銜杯世事無寄語東風林下鳥春來切莫喚提壺陸文定華亭陸文定公年九十時以衲衣一襲付慧日院手書偈于衲表云解組歸來萬事捐盡將身世付安禪披來戒衲渾無事不向歌姬為乞縁又自題其像畱寺作供云豈有文章置集賢也無勲業到凌烟只應畫作老居士畱與香山結浄縁范青衣莆田游宗謙有青衣范生能彈琴吹簫亦學為詩王弇州調之詩云瑤琴罷鼔紫簫來手草新詩阿濫堆除却數行僮約外還應事事勝方回僧道乞詩有俗僧欲遊鵝湖以卷子遍求諸貴人贈詩可厭曹能始題一絶云性内本無文字障縱耽山水亦支離我曽一宿鵝湖寺峰頂禪師不要詩偶憶王弇州曽有樓道人以詩卷索題皆翰苑諸名公弇州云囊裏牛腰詩卷麤他年鶴背重還無何如負局先生好只挾眞形五岳圖風㫖暗合俱足解頤李白詩云畫秃千筆書載兩牛腰牛腰二字本此十嵗詩錢唐田藝蘅學憲汝成子也十嵗從父渡采石賦詩云白玉樓成招太白青山相對憶青蓮寥寥采石江頭月曽照仙人宮錦船後竟以廣文老天之生才不畀大用誠不可知下榻陳蕃為樂安太守郡人周璆高潔之士前後郡守招命莫致惟蕃能致特為置一榻去則懸之蕃兩設榻今人多用徐孺子事而鮮及周也吾鄉前輩王郡丞鑛咏璆詩云南州只説徐高士能使陳蕃下榻時北海更憐周隱者不將懸榻使人知元虛子政和徐貞一號元虚子能詩嘗過仙霞關關吏訝其異服執之貞一瞪目不答吏繫之郵亭迨夜紿守者出袖中出大筆書二絶於壁云一劍凌空海色秋玉皇賜宴紫虚樓醉來跨鶴須彌頂指㸃培塿見十洲碧殿歌傳阿濫堆玉笙吹徹海桃開仰天一嘯江風發笑接白雲歸去來乗夜遁去晨起盛傳仙人至關走看墨蹟不絶于道枇杷呉中友人嘗言莫雲卿笑同時用琵琶作枇杷詩云枇杷不是這琵琶只為當年識字差若使琵琶能結果滿城簫管盡開花然枇杷作琵琶見劉熙釋名亦可通用雲卿未之考耳靈雞塜臨安徑山有靈雞塜唐一欽禪師説法雞時時佇聴師去長安長鳴三日而死黄貞父有詩云一靈通妙微萬類等佛種纍纍生人頭何如死雞壠詩䜟賦詩不祥人以為䜟騐之良然予友林子眞少年有雋才甲辰暮春晦日諸同社集王永啟塔影園作送春詩子眞有句云花為離愁魂易斷桞當别淚眼難開衆詫為工不久逝矣經語小詞辛稼軒多作詞調賦稼軒集經語踏莎行云進退存亡行藏用舍小人請學樊遲稼衡門之下可栖遲日之夕矣牛羊下去衛靈公遭桓司馬東西南北之人也長沮桀溺耦而耕丘何為是栖栖者鄭松窓宋鄭域字中卿三山人號松窓使遼回有燕谷剽聞二卷紀遼事甚詳昭君怨咏梅一詞云道是春來花未道是雪來香異水外一枝斜野人家冷淡竹籬茅舍富貴玉堂瓊榭兩地不同栽一般開興比甚佳麗情云合是一釵雙燕却成兩鏡孤鸞樂府多傳之咏蝴蝶元王和卿與關漢卿俱以北調相高偶見大蝴蝶飛過和卿賦云彈破莊周夢兩翅架東風三百座名園一采箇空誰道風流種諕殺尋芳的蜜蜂輕輕飛動把賣花人扇過橋東漢卿遂罷咏和卿此詞妙處全在結語然宋謝無逸蝴蝶詩云江天春暖晩風細相逐賣花人過橋時有謝蝴蝶之稱和卿襲其意耳宣廟詞曲宣宗皇帝御製寄生草云賽爛熳三春景稱清和四月天緑楊烟罩絨絲線彩蓮水映紅妝面翠芭蕉風颭青蘿扇林塘盡日好畱連池塘長夏宜消遣有馥郁荷香度看微茫野色邊幾行鷺印平沙遍一羣魚躍清波淺數聲樵唱西山逺茸茸芳草紫騮嘶陰陰喬木黄鸝囀宣徳六年四月御便殿召錦衣都指揮林觀對奕奕畢書以賜之觀吾閩邑人其家至今寳藏焉朱竹朱竹古無所本起於國初宋仲温有一卷不知何人筆高季迪題水龍吟云淇園丹鳯飛來幾時畱得参差翼簫聲吹斷彩雲忽墮碧雲猶隔想是湘靈淚彈多處血痕都積看蕭疎瘦影隔簾欲動應是落花狼籍莫道清高也俗再相逢子猷還惜此君未老歲寒猶有少年顔色誰把珊瑚和烟換去琅玕千尺細看來不是天工却是那春風筆此卷舊為王太史家物伯兄惟和收得之珍若重寳自題其後云根如頳虬髯葉如丹鳯尾有時截作釣魚竿珊瑚亂拂桃花水有時擲杖化為龍白日青天赤鱗起能將紅霧變蒼烟產在朱明幾洞天須臾絳節生彤管只向松間滴露妍伯兄卒卷售他人咏酒吾郡林都憲廷玉咏酒詞云米明王原掌竒門印麴將軍㑹擺迷魂陣水中郎穩坐雲安鎮柴令公傳示蘭陵信祭遵壺矢威李白蠻書令那愁城攻破難逃命詼諧成調可喜也公善擘窠書名山勝處多存手蹟有詩集行世滿江紅詞漠漠輕寒正梅子弄黄時節最惱是欲晴還雨乍寒又熱燕子梨花都過也小樓無那傷春别傍䦨干欲語更沉吟終難説一㸃㸃楊花雪一片片榆錢莢漸西垣日隠晩凉清絶池面盈盈深淺水栁梢淡淡黄昏月是誰人吹徹玉参差情悽切右文衡山先主作也清絶婉媚何減宋人擅場者燕子不來香髙郵王磐作野菜譜并綴以詞雅俗相雜山家之公案也嘉禾周履靖作茹草編亦效西樓而起編中詠燕子不來香云新蒲正短舊壘猶空繡箔珠簾面面風粘天芳草碧玉茸茸趁呢喃聲杳曉摘芳叢昭陽殿裏妬緑嫌紅無奈香消一眄中清婉可詠徐氏筆精卷五
