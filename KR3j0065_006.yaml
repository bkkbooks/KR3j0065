body:
  text: 徐氏筆精卷六明徐􅎾撰文字呂氏春秋呂氏春秋引孔子事數十則言必稱孔子讀其書不類其人治安䇿賈誼治安策後缺一太息近閲田子藝留青日札云新書內銅布一篇可謂長太息者此其一也即是全文錯簡耳歷漢至今唯子藝認出真誼之忠臣也蔡雍五弄琴書云蔡雍嘉平初入青溪訪鬼谷先生所居山有五曲一曲製一弄東曲常有仙人遊曰遊春南曲有澗冬夏常淥曰淥水中曲鬼谷所居曰幽居北曲高岩猿鳥所集感物愁坐曰坐愁西曲灌木吟秋曰秋思三年曲成示馬融甚異之後世作者徒因題命辭無復本意矣笑林晉孫楚笑賦曰信天下之笑林調謔之巨觀宋祕閣中有古笑林十篇雞碑戴逵總角日以雞卵汁溲白瓦作鄭𤣥碑又自為文而自鐫之詞麗器妙唐丁用晦云學慙鼠獄智乏雞碑張融海賦張融海賦浮海至交州所作也文詞詭激顧凱之曰此賦實超𤣥虛恨不道鹽耳融即求筆注之曰漉沙搆白熬波出素積雪中春飛霜暑路全篇載南齊書本傳楊用修博極羣書謂載籍不見其全亦千慮一失也融為文數十卷自叙其集名玉海褚淵問玊海名融答曰玊以比德海崇上善宋王伯厚玊海襲其名耳甘石星經禽蟲述余家舊藏甘石星經乃陶隱居重訂者今新安程榮梓漢魏叢書中一卷比余家十才二三且缺首篇分野說及五星行例署云漢甘公石申著按晉志齊有甘德魏有石申夫皆掌天文程不深考而妄署之急於射利故耳此書盛行天下恐訛以傳訛也至於彚刻山居雜志中禽蟲述一卷乃閩中袁達著達字德修程則署云袁達德著如此之類甚多若傳之後世誰能辨其姓名乎書之以資博雅者訂正刀劍録唐詩金石録淳化帖陶𢎞景作刀劎録不載莫邪干將殷璠姚合元結高仲武芮挺章選唐詩不收李白杜甫歐陽修作金石録不採衛夫人淳化諸帖不選蘭亭序俱不可曉者王勮敏給人但知王勃賦滕王閣之敏贍而不知王勮之草冊文尤難也夭壽中壽春郡王成器等五人同日冊命有司忘載冊文百僚在列相顧失色勮立召小吏五人各執筆口授分寫斯須而畢詞理典贍舉朝歎服薛書記唐托言云元相公在浙東賓府有薛書記酒後爭令以酒器擲傷公猶子遂出幕既去作十離詩曰犬離主筆離手等作今諸女史皆編入薛濤集內何附㑹之甚耶以薛書記認作薛校書以元載認作元微之况濤蜀人非浙東事可附㑹彤管遺篇詩女史青泥蓮花記及蜀本薛濤詩皆載十離詩故表而出之序曹子建集龍城録云韓中卿夢曹子建求序其文集寤檢曹集分為十卷序而傳之今世傳本並無韓序而作序者亦未言及夢中事送窮乞巧昌黎揖五鬼而送窮不免垂頭喪氣桞州拜天孫而乞巧終難諂貌淫辭信夫文章最能窮人拙宦莫容於世草華洪景盧謂草華傳非韓子之筆羅文江瑶葉嘉陸吉諸傳託以為東坡大可笑也今世傳本韓集不收革華而蘇集盡收羅文諸傳洪公去蘇未遠當必知其詳而斥僞也按宋陳善捫蝨新語葉嘉傳乃陳表民作表民名元規羅源人與善同邑平淮西碑野客叢書謂唐史與小說皆云退之淮西碑多歸功裴度李訴妻唐安公主不平訴于帝謂愈文不實遂斫其碑更命段文昌為之而丁用晦芝田録則曰元和有老卒推倒淮西碑帝怒縛殺之卒曰碑中只言裴度功不述李訴力微臣是以不平命放罪敇段文昌别撰羅隱石烈士說亦曰石烈士名孝忠猛悍多力為李訴前驅一旦熟視韓碑大恚怒因作力推去其碑傾欹再三吏執之孝忠云云上因得平淮西本末命段學士更為之再讀李商隱淮西碑詩又非關老卒推仆乃為當時讒言所入天子自使人曵倒之別刻文昌之作也又考韻語陽秋謂碑成李訴之子謂沒父之功訟于朝憲宗使文昌別作此與捨周鼎而寶康瓠何異哉諸說不同竟不知易者何意余取二文反覆誦讀段文才學充實援古證今六朝體格非淺學能辦韓文古健簡約難入時眼憲宗當時易韓為段自有深意至於姚鉉文粹亦録段而棄韓宋人宗韓遂大貶段作是為韓公盛名所怵耳李商隱詩亦只述韓文可惜未嘗訾及段作使人知韓文之足重也敢作迂評為臨淄藎臣平夏平蜀唐憲宗元和元年三月夏綏楊惠琳伏誅十月劍南劉闢伏誅韓退之平淮西碑文明年平夏又明年平蜀誤也新唐書刪去明年平夏一句臨文不諱忌退之送楊巨源歸鄉序末云古之所謂鄉先生沒而可祭於社者其在斯人與其在斯人與語似不祥可見古人臨文無所避諱若用之今時則羣唾而棄之矣昌黎闢佛昌黎諌佛骨并弔武侍御畫佛文世謂昌黎闢佛也今其集中有送惠師送靈師送文暢師送無本師聽頴師彈琴送僧澄觀别盈上人和歸工部赴僧約廣宣上人頻見過題秀禪師房送浮屠文暢序送高間上人序與大顚師書往往見諸篇什何耶李賀文東觀餘論云李藩嘗輯李賀詩歌所得甚富聞賀有表兄與賀筆硯之舊因示之其人甚喜且請借閲久之不還李公屢索乃曰素惡賀傲常思報之遺文已投溷中久矣豫按杜牧作賀詩序曰集賢學士沈子明授賀詩歌四編凡二百二十三首今集中詩歌已符其數則賀之作俱在未嘗為表兄投之溷中也然表兄未嘗言及詩歌今賀文無片語之傳想皆在溷中耳蓋賀非不能文者天上玉樓成召賀為記必生平文章尤竒也唐閩遷新社記唐濮陽寧撰新社記即社稷壇也其文甚古雅歐陽公作集古録時此碑尚在而今亡矣福州烏石有李陽氷篆書今猶存其墨本歐公又未之見托言稗海托言一卷此書有十五卷此僅什一掇拾類書而為之者王定保作保定誤定保光化初進士沈嵩遺文唐乾寧三年狀元沈嵩閩縣人仕錢鏐父子拜相與羅隱契厚嵩為文摹寫徐庾隱墓志嵩筆也駢麗詳正末作兩銘一志兩銘此為僅見嵩集不傳余所見者但此篇耳志云隱曽祖羅仙字童知仕福清縣令福州志失載千佛贊宋理宗御製千佛贊云一佛不二千佛奚别如處處水現在在月無去無來不生不滅梅花開時前村深雪續博物志張華著博物志而有續博物志者宋李石也近年㑹稽商氏所梓稗海編為唐人李石著誤也志中言太平興國陳摶林逋魏野及研譜遁齊間覽諸書則宋人無疑矣焦太史國史經籍志亦編作唐人皆誤然書末有門人迪功郎黃公泰跋迪功郎宋秩也唐無此秩此又一證唐李石河中人官至宰執木經宋初有都料匠預浩著木經三卷每卧則交手於胸為結構狀如此踰年撰成此經今軼不傳近代諸藝術皆有著撰獨此技缺焉省心録世傳林和靖省心録朱子語録第四十卷云是沈道原作非和靖也宋景濓文集嘗引之為證天順正德間刻本俱沿襲和靖未之深考近日陳眉公續祕笈亦作和靖著道原之名幾晦矣朱子闡之於前景濓辨之於後畢竟傳訛奈之何哉醉翁亭記醉翁亭記東坡書於滁州泉冽而酒香改作酒冽泉香水落而石出改作水清石出大有㸃綴之妙山家清供世傳山家清供二卷宋林洪著按本集溫陵鵝黃豆生末云僕遊江淮二十秋每因以起松楸之念將賦歸以償此一大願則洪溫陵人也又按撥霞供云向遊武夷六曲訪止止師止止師者白玉蟾也則洪與玉蟾同時人今泉州郡志逸洪之名似大闕典仲休記右軍書上虞縣西四十里舊有含珠院閩僧從契開山也宋沙門仲休作記文甚典而沙門有文集右軍書刻之石鮮有搨者東坡硯銘東坡作硯銘二十九而古文品外録載一銘甚佳集中所無也銘云或謂居士吾當往端溪可為公覔硯居士曰吾兩手其一解寫字而有三硯何以多為曰以備損壞居士曰吾手或先硯壞曰真手不壞居士曰真硯不損紹聖二年十月臘日軾書赤壁東坡赤壁賦古今傳誦即婦孺亦知之然一篇大㫖誤以黃州赤鼻山認為周瑜破曹操處後人不甚指摘之實為盛名所怵耳若今人有此紕繆得無羣起唾之乎事不在盤古地不在荒外信筆而書不暇考核安足傳信耶暹老福州西禪寺暹禪師有語録一卷黃魯直為之序暹老初寄瓶鉢於古田時人不識也曽福州子固拔于稠人之中授以西禪而道俗皆與之漳州蘭譜宋龍溪王貴學著王氏蘭譜趙時庚著金漳蘭譜皆紹定淳祐時人所紀藝蘭之法與閩種品目之竒亦岩谷中清士也漳州郡志逸其名即漳州縉紳學士亦不知有此人豫近出二書以質鄭瓉思張紹和二孝亷行將梓板以傳是知古人著作湮沒不稱者多矣微豫藏其譜微二孝亷闡其幽不將與草木俱腐耶著書宋季著書之富無過王伯厚計其生平述作七百二十餘卷即鄭漁仲不是過也漁仲位不顯伯厚仕至禮部尚書在官日多尤所難耳忍卦忍刃上心下元亨初吝終吉悔亡利君子貞不利小丈夫彖曰忍剛發乎內柔制乎外小有所抑大有所益也象曰心上有利刃忍君子以含容成德初一必有忍其乃有濟象曰能忍其性事克濟也次二小不忍則亂大謀象曰小不克忍成大亂也次三一朝之忿忘其身以及其親象曰一朝之忿至易忍也忘身及親禍孰大也次四出於胯下以成漢功韓信以之象曰胯下之辱小辱也成漢之功大功也次五張公藝九世同居書一忍字以對天子象曰同居之義忍克致也積而九世有容德也上六血氣方剛戒之在鬬象曰方剛之氣忍則滅也形而為鬬自求禍也右吳草廬先生作悔過銘穆公悔過爰作秦誓武帝悔過棄輪臺地悔不可有亦不可無不可無也其可長歟悔雖可有然不可再是以君子有過則改不遠而復乃可無悔既悔而復亦猶未害悔而復悔岌乎危殆頻復之厲大易有戒思昔顔子過而不二有一不善未嘗復行如得一善拳拳服膺才知差失便不更然歉於己者不再萌焉思昔太甲度以欲敗其後三年自怨自艾處仁遷義反躬引罪卒為賢君克終厥德推所從來一悔之力悔心之生良心之萌乘此憤悱有大發啓當悔之餘惟新是圖朝雖為跖暮可為虞當悔之時不圖改之是乃自棄小人之歸吳草廬作戒石銘戒石銘相傳蜀孟昶時作也其文不止四句宋朝但取四句而已元浙江亷訪使徐琰改銘曰天有明鑒國有公法爾畏爾謹以中刑罰倪朴自叙陸儼山嘗云浦江倪布衣朴善著書自叙曰今之學者大抵急於利祿而專務於時文故不識者不肯目而識者未暇觀也今時著書者亦多求其披閲至終卷者幾何人哉桑悅硯銘桑民懌硯銘云一孔淵源洙泗之澤不歸于朱則歸于墨季漢書新安友人謝少連作季漢書自足千古然國初廬陵貢士蕭常有續漢書起昭烈至少帝為紀魏吳皆為載記而擇裴注之善者併書之至於少連併降魏為傳又著五十八論真良史才也佑維佑祐右三字書為佑易為祐詩為右惟唯維三字書為惟易為唯詩為維其義一也鳩今人欲集聚曰鳩鳩者糾也糾者合也桓公糾合諸侯晉書白符鳩舞符合也糾亦合也鑽漢書云商鞅挾三術以鑽今之言善宦者必曰鑽本此鼂錯潘嶽西征賦云成七國之稱亂翻助逆以誅錯押寞郭謔博惡韻然則錯不當讀為措也乙韓文公讀鶡冠子乙者三滅者二十二注十有二字歐陽公詩譜後序曰增減圖乙圖者塗抹也乙者勾止也按史記東方朔上公車三千牘人主從上方讀之止輒乙其處讀之二月乃盡准字今制文移用准字即凖也唐宋以來皆用凖字自冦凖為相避其名遂減十字至今不改誤誤誤謬誤也誤欺也今俱通用即宋人詩文亦然俗書誤焦氏筆乘云俗書蟲字作蟲不知蟲乃音虺須字作須不知須乃音船字作船不知船乃音航商字作啇不知啇乃音滴蠶字作蠶不知蠶乃音腆美字作美不知美即是羔無字作旡不知旡即是既本字作夲不知夲乃音滔盼字作盻不知盻音系圖字作啚不知啚音鄙趨字作趍不知趍音馳如此之類未易悉舉至如暴已從日又加日而為曝然已從火又加火而為燃岡之岡芻之篘昏之婚女之汝掬之掬與之歟回之回果之果席之席架屋叠牀觸目皆是而字學掃地矣豫見年來以意作俗字尤多如壻本從女今改從士姪亦從女今改從侄相沿傳寫即士大夫亦倣效之殊可笑也攬序王右軍祖名覽蘭亭序作攬者避諱也東坡祖名序凡為人序文皆作叙今人不察一槩學之誤也飲器史云趙襄子漆智伯之頭為飲器韓子云智伯死三國分其首以為杯杯飲器也或以飲器為溺器非赤字赤族言盡殺無遺類也漢書注以為流血丹其族大謬古人謂空盡無物曰赤如赤地千里其家赤貧是也今人言不著衣曰赤條條赤字本此竒字漢書云劉棻從揚雄學作竒字而雄素貧嗜酒時有好事者載酒從遊則載酒學竒字竒字乃大篆也六書一曰古文二曰竒字三曰篆書四曰佐書五曰繆篆六曰鳥書非竒僻之字也明矣湩乳汁為湩列子乳湩有餘謝承後漢書乳為生湩史記胸奴湩酪之美音種龍鍾今人謂年老曰龍鍾按裴度曰見我龍鍾故相戲耳時裴尚少也然則龍鍾不專指老人而言唐詩云雙袖龍鍾濕未乾齠齔男八月而齠齒女七月而齔齒見韓詩外傳齠齔並用非也伯孟禮緯云嫡長曰伯庶長曰孟自有分别鮐背鮐河豚也其背皮甚粗澀老人皮膚索澤不寒而栗故似之釐毫絲忽釐毫絲忽毫者獸之毛言輕也絲者蠶之所出比毫尤輕矣忽蜘蛛網也較之絲尤微而細故取以為數帝王好書歷代帝王皆好典籍秦火為萬古罪人無論已漢興除挾書律廣開獻書之路景帝募求天下遺書藏之祕府武帝建藏書之策置寫書之官成帝使謁者陳農求天下遺書詔劉向等校定光武入洛書二千餘輛後於東觀廣集新書命班固等讐校明帝犬㑹諸儒於白虎觀考訂羣籍靈帝詔諸儒正定五經刻石魏道武命郡縣大收書籍悉送平城隋文帝遣使四方搜討異本每書一卷賞絹一匹煬帝觀文殿構甲乙丙丁書屋唐貞觀中魏徴虞世南顔師古請購天下書選五品以上子孫繕寫藏內庫𤣥宗幸東都議借民間異本傳録以千錢購書一卷後唐莊宗募民獻書及三百卷者授以官銜明宗令國子監校定九經雕印賣之周世宗鋭意求訪凡獻書者悉加優賜宋太宗下詔購募亡書分置書府涉弼等並賜科名太宗構崇文院以藏書籍分經史子集四庫仁宗詔中外士庶上館閣闕書每一卷支絹一匹五百卷與文資官徽宗詔郡縣訪求祕書助教張頥進二百二十餘卷賜進士出身李東一百六十卷補迪功郎高宗南渡獻書有賞元世祖遣使取在官書籍版刻至京師我太祖定鼎之後極重儒臣詔纂國家切要之書成祖詔修永樂大典一時儒臣畢集天下賢才聘辟無算凡南京文淵閣所貯古今一切書各取一部送京以後則杳無求書之令矣國家事事可侔前代獨好文之主稍遜藏書海鹽姚叔祥有言今藏書家知祕惜為藏不知傳布為藏何者祕惜則緗槖中自有不可知之秦劫傳布則毫楮間自有遞相傳之神理然所謂不知傳布之說有四大抵先人立言有一時怒而百世與者則子孫為門户計而不敢傳鬬竒炫博樂於我知人不知則寶祕自好而不肯傳卷軸相假無復補壞刋謬而獨踵還癡一諺則慮借抄而不樂傳舊刻精整或手書妍妙則懼翻摹致損而不忍傳凡此四不傳者彼繇不知世變靡常聚必有散一旦三災橫起流爛滅沒無論藏者且纍著作姓名一併抹煞是藏有加於亡何必後來狺狺詈祖龍為也又吾鄉前輩藏書富者馬恭敏公森陳方伯公暹馬公季子能讀能守陳公後昆寖微則散如雲烟矣又林方伯公懋和王太史公應鍾亦喜聚書捐館未幾書盡亡失然四公之書咸有朱黃批㸃句讀余間得之不啻拱璧也豫友鄧參知原嶽謝方伯肇浙曹觀察學佺皆有書嗜鄧則裝潢齊整觸手如新謝則鋭意搜羅不施批㸃曹則丹鉛滿卷枕藉沈酣三君各自有癖然多得祕本則三君又不能窺豫藩籬也楊文貞積書楊文貞公士竒文籍志序云吾先世藏書數萬卷元季悉燬於兵吾早有志於學而孤貧不能得書稍長事抄録無以為楮筆之費則往往從人借讀不能數得年十四五出教童蒙頗有所入以供養不暇市書也弱冠稍逺出授徒所入頗厚始蓄書不能多也及仕於朝有常祿又時有賜賚節縮百費日月積之一為收書之資歷十餘年經史子集雖不能備頗有所蓄視吾先世所藏千百之什一視吾少時可謂富矣夫人於其所好勞心苦力以求得之必將謹護珍襲不至於廢壞逮傳其後之人未嘗知得之之難蓋有視之漠然不以留意棄之如瓦礫者矣吾懼後之人不知守也凡書其志吾之所以得而勉其所以守蓋昔人愛一草一木猶戒子孫以勿壞矧書籍聖賢至訓之所寓乎敬之哉文貞公勳業名位冠於國初賜賚祿入積為收書之費足見先輩雅尚書城宋季德茂環積墳籍名曰書城豫友邵武謝兆申好書盡罄家資而買墳籍兀坐一室四面皆書僅容一身宋世版本未盛恐季公未必如此之富豫與謝君極稱臭味交謝君藏蓄幾盈五六萬卷又多祕冊合八郡一州未有能勝之者不獨古人書城書窟書倉書岩為竒耳保守書籍世之蓄田産屋宇多者子孫稍賢必保守不失何也可以資衣食不匱也蓄尊罍􅉓鼎多者子孫稍賢亦保守不失何也可以資耳目近玩也惟蓄書籍圖畫多者子孫雖賢未必保守不失何也非深知篤好者鮮不屑越也余見保産業之家多至六七代而保書籍者不過一二代耳然保之之法當較之田産屋宇尤加嚴密庶幾歷四五代也唐末吳人徐修矩世守書籍萬卷皮日休常就借讀日休詩云保兹萬卷書守愼如羈紲陸龜蒙詩云吾聞徐氏子奕世皆才賢因之遺孫謀不在黃金錢若才賢不至奕世守愼不如羈紲非所以論保守也聚書十難陳貞鉉曰聚書有十難學無淵源一難也家少承書二難也不生通都大邑三難也乏慧鍳四難也隋唐以上書不多見五難也攜帶跋涉易致觸損六難也檢曝之勞病於夏畦七難也近無善本校讐斯苦八難也家貧購書九難也片時不閲便供蛀蟲十難也夫聚必有散物理之常念此十難嗜好彌篤余嘗言曰田宅易購美書難逢緣不相值竒祕終藴昔杜暹藏書每題跋尾曰清俸買來手自校鬻及借人為不孝言雖未大亦自痛切矣觀書三益陳貞鉉曰客來觀書病懶時頗厭其煩然有三益不可以厭煩而廢賤性善忘經目輒忽獨對客搜尋之事雖閲年能記一益也覽所不及庋牀便蠧因客披搜二益也習懶成病偶因客至整書忘疲亦古人運甓之意三益也夫學求益也一益尚可况三益乎讀書樂余嘗謂人生之樂莫過閉户讀書得一僻書識一竒字遇一異事見一佳句不覺踴躍雖絲竹滿前綺羅盈目不足踰其快也六一公有云至哉天下樂終日在几案余友陳履吉云居常無事飽暖讀古人書即人間三島皆㫖哉言也四觀友人陳貞鉉曰室廬雖陋取足庇身况有架書之所作廣厦觀薄田自供取足糊口况禀淡薄之訓作京坻觀擁書萬卷取足娛志况嗜彛鼎之玩作極樂觀城居習懶取足鎮喧况耽禪室之趣作清淨觀借書陳貞鉉曰古人衣裘與敝書不借人則疑於不廣非不廣也置書之勞不畢世不已借書之敝多至遺亡㸃汙則其掛懷不至于再置不已使書可再置抑又何嫌間或重帙善本抄篇集函非通都大邑不購非良緣竒遇不值非閲年積時不成偶欲披閲或方借而未還或已借而既失至於撫卷痛恨不如不借之為愈也客曰如是書終不借人乎居士曰書亦何可不借人也賢哲著述以俟知者其人以借書來是與書相知也與書相知者則亦與吾相知也何可不借來借者或蓄疑難或稽異同或補遺簡或搜竒祕至則少坐供茶畢然後設几持帙恣所觀覽隨其抄謄請主客無相妨尋常供具不為添設絶不置酒恐緣酒而狼戾書帙夫如是或竟日或數日或十數日豫俱不厭客亦無猜若欲以半部一函持借出門僕已具觴酌誓于大聖大賢之前斷斷不爾人各有願幸毋相強贈遺得人宋虞世和甫最愛黃庭堅每得佳墨精紙竒玩必歸魯直國初王羽儀之最善楊士竒楊喜收書或數月不相見相見輒贈一書皆贈遺得人者也祕書蔡雍祕論衡於帳中或搜得之輒抱以去又家有書萬卷末年載數車與王粲何私一論衡而萬卷不之惜耶蓋搜得論衡者未必為雍意中人固宜珍祕而仲宣素有異才即捐數車之與不為傷惠要在得其當耳今世以書為羔雁連篇纍牘贈送貴人貴人全不知惜膏蟻飼鼠豫者非雍受者非粲徒為典籍一厄與其為貴人屑越寧祕帳中異書余嘗語曹能始云有異人其家必有異書常人之家必有常書俗人之家無書矣欲求異書先求異人不遇異人勿問異書書不讐校北齊書邢子才有書甚多而不甚讐校見人校書輒笑曰何愚之甚天下書至死讀不可遍焉能役役校此錯誤書余嘗披覽抄本之書十訛二三難以句讀令人燥熱又無處借書校對偶及邢事心神頓涼書畫碑版陳睂公云見古人書畫如見家譜豈容更落他人手見古人墟墓碑版如見先壟間物豈容更落樵采不呵護名言也瓦官祕藏南部烟花録得之瓦官寺廢閣王右軍告誓文真蹟亦得之瓦官寺鴟吻內竹筒中何此寺之多祕藏也豈支許輩所留耶書法六一居士筆說云古人皆能書獨其人之賢者遂傳逺後世不推此但務於書不知工於書隨與紙墨泯棄者不可勝數也使顔魯公書雖不佳後世見之必寶也又云學書當自成一家之體其摹倣他人謂之奴書今人肉眼妄評某人書酷肖某帖不論其人之賢否正蹈六一居士之誚耳嗚呼此但可與知者道也古書古帖養生家云目不醫不瞎耳不挖不聾豫喜蓄古書古帖嘗語人云書不裝不蛀帖不裱不蟲邇來書板極善但一加外函不久生蟫藏書家須急去之勿惜也八分書子美李潮八分小篆歌云尚書韓擇木騎曹蔡有鄰開元以來數八分潮也奄有二子成三人然此三人書皆不傳扇書杜詩宋高宗紹興元年賜經筵官扇皆書杜甫詩句親書與之賜學士王綯曰霖雨思賢佐丹青憶老臣賜尚書胡直孺曰文物多師古朝廷半老儒賜舍人胡交曰相門韋氏在經術漢臣須高宗之光寵儒臣如此僧善書隋唐善書僧三人智永懷素高間也智永懷素今墨本紛紛摹刻惟高間鮮傳戲魚堂帖宋劉次莊謫居臨江卜築鑿池東山自摹淳化帖十卷刻石置堂中時稱戲魚堂帖今在新淦縣東山寺前寶晉齊米元章守無為州州治東北建寶晉齊有法書碑刻立壁間因名鄭回溪父子書學宋乾道五年狀元鄭僑本永福人家與興化鄰後寓莆中淳熙間使金不屈官至參知政事著書衡三篇號回溪善行草書其子寅官至樞密承㫖著包蒙七卷號肯亭亦善書二公書名不顯著作無傳近見元人鄭灼所傳衍極專論字學多引述之而其論書亦博綜今古惜無全文耳董山書史宋鄭昻字尚明號董山祭酒鄭穆之孫也作書史起伏羲終五代凡二十五卷今軼弗傳昻善書九仙山蓬萊峰盤石上有題名徑尺許古徑絶倫昻所書也陳述古書吾閩古靈先生陳述古書法在蔡君謨之右學柳誠懸酷肖也烏石山平逺臺鼓山卧龍山俱有題名鐫之石壁皆徑五寸鮮有知其妙者寺額名書衍極載元人陳旅題署書記略中一段云閩中風俗以正月六日游烏石山寺其外大父趙大蓬指寺額曰是古題署法書也古時人人知有是法王公貴人有所建立不能書不書必求能書者雖微賤必書也紹興後無論能否官大即書一時迎合爭乞新題易舊榜于今存者什之一耳米南宮黃太史非不爽峭可喜直可施之亭榭宴遊處唐以來惟顔太師雄秀而題署李北海為最云徐氏筆精卷六
