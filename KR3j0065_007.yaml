body:
  text: 徐氏筆精卷七明徐􅎾撰雜記陶唐丹朱郡縣志云堯先居唐後居陶丘故曰陶唐氏尚書逸篇云堯子不肖舜使居丹淵為諸侯故曰丹朱醫王釋迦佛能醫一切衆生苦惱名大醫王碑隂姓名漢孔宙碑隂載門生故吏姓名楊用修云漢儒開門授徒親授業者則曰弟子次相傳授則曰門生未冠則曰門童總而稱之亦曰門生舊所治官府其掾屬則曰故吏占籍者則曰故民非吏非民則曰處士素非所蒞則曰義士義民皆讀漢碑者所當知也石敢當今人家正門適當巷路則竪小石碑鐫曰石敢當按西漢史遊急就章云石敢當顔師古注衛有石碏石買石惡鄭有石癸石楚石制皆為石氏周有石速齊有石之紛如其後以命族敢當所向無敵也姓源珠璣曰五代劉智逺為晉祖押衙潞王從珂反愍帝出奔遇於衝州智逺遣力士石敢當袖鐵鎚侍晉祖與愍帝議事智逺擁入石敢當格鬬死智逺盡殺帝左右因燒傳國璽石敢當生平逢凶化吉禦侮防危故後人凡橋路衝要之處必以石刻其形書其姓字以捍民居或贈以詩曰甲胄當年一武臣鎮安天下護居民捍衝道路三義口埋沒泥塗百戰身銅柱承陪間紫塞玉關守禦老紅塵英雄來往休相問見盡英雄來往人二説大不相侔亦日用而不察者也串眉美女顰眉額痕成串梁簡文詩云長嚬串翠眉屈竒屈竒短長也服之不中曰屈竒淮南子云聖人無屈竒之服艾綬漢時諸侯王金璽盩綬晉灼曰盩草名出琅琊平昌縣似艾可染緑因以名綬後人名為艾綬犢鼻褌犢鼻褌注謂形似犢鼻非是按明堂圖人身兩膝以下有穴名犢鼻褌至犢鼻言其短也即寧戚南山歌短布單衣適至骭杜甫同谷歌短衣數挽不掩脛之意稽首周禮有九拜一曰稽首二曰頓首前代表文多稱稽首頓首今人居喪投刺皆曰稽首則以稽首為凶拜矣蓋周禮有凶拜拜而後稽顙是也若以稽首為稽顙殊非禮也返璧左傳僖公二十二年僖負羈乃饋盤餐置璧焉晉公子重耳受餐返璧故事本此今人誤以為藺相如事曰完璧曰歸趙昧之甚矣蒙恬筆蒙恬秦時人古今傳為造筆之始非也詩云彤管有煒孔子作春秋筆則筆自周時已有筆矣哥窑瓷器有哥窑夀州有舜哥山此窑所出今賞鑒家解哥字謂其兄所製誤矣朱提漢犍為郡有朱提山出銅鋼朱提銀八兩為一流直一千五百八十他銀一流直一千然今之銀直與古大異而朱提山不聞有鋼矣今人尺牘往往以銀為朱提譬若以玉為崑岡珠為合浦可乎五夜五夜者甲夜乙夜丙夜丁夜戊夜也出漢舊儀省中黃門持五夜天祿天祿獸名漢時有貢此獸者因以名閣以藏祕書宫上古居室皆曰宫不分天子庶人禮記云父子異宫又云儒有一畝之宫孟子云宫室之美自秦漢以後則以天子所居為宫矣紫塞秦築長城土皆赤色故稱紫塞􅡡有詭戰國策秦伐魏取􅡡有詭地名也華不注醫無閭山名也風馬牛牛走順風馬走逆風故曰風馬牛不相及草堂杜子美居浣花草堂李太白懷故鄉以草堂名集草堂在成都周顒昔經蜀以蜀草堂林壑可懷乃于鍾山立草堂寺今人概以草堂名屋何耶不睡龍錢鏐作警枕名不睡龍取蔡雍警枕銘應龍蟠蟄之語食魚列士傳曰孟嘗君食客三千人上客食肉中客食魚下客食菜故馮歡歌長鋏歸來兮食無魚也孟子孟子門人見於書者十七人皆配享他無考楊文貞母楊文貞公士竒少孤貧十六嵗出為村落童子師欲買史略二册百錢不能得其母夫人畜一牝雞數嵗命以易之世有此母安得不生此子兩腳書厨永樂中毗陵陳濟善記書文廟謂為兩腳書厨古人號書厨者有矣此云兩腳文皇亦善諧謔也博物史稱張華博物識劍識狸及著博物志信矣然左傳引叔向之言曰子産博物君子也又曰延陵季子閎覽博物君子也然子産季子不以博物名惟張華為著痛飲讀離騷離騷悲憤令人讀之不歡故昔人有云痛飲讀離騷蓋醉而後讀始不為鬱惋幽憂之氣所擾耳曹孟德云惟有杜康可以解憂正此意也囊螢隋煬帝宫中囊螢為戲車胤無油囊螢讀書丁朱崖囊螢當火恐熱氣蒸人同一螢火而所用苦樂逈别趙家書畫趙文敏善書畫而妻管夫人子雍欒弟孟籲孫鳳麟甥王蒙皆以畫名于時惟欒以書名不聞能畫吳興三絶元季吳興馮應科筆與趙子昂字錢舜舉畫稱三絶四十二章經錢塘六和塔上刻四十二章經乃紹興中諸名臣分寫者沈該湯思退陳誠之陳康伯王綸賀允中葉義問楊椿周麟之洪遵楊偰沈介趙令根孫道夫王希亮黃祖舜張孝祥宋棐金安節董蘋李洪錢端禮張宗元張運楊朴莫濛路彬張庭實周操葉謙亨胡沂陳俊卿鮑彪陳棠楊邦弼張洙黃子淳楊倓沈樞韓彥直虞允文洪邁共四十二人皆以官爵序次字俱生硬無晉人筆法蓋此四十二人無一人以書名者也惟錢端禮虞允文差勝耳古磚杭吳山萬厯乙巳年里人建水神廟于上奠礎日豐草中的皪有光視之則古廢磚方二寸許上有安寧萬姓四字類蘇長公筆法今在廟中中元大鵬年號先輩陳中丞達嘗于荒莽得石盆甚巨背刻中元庚申僧本兹造八字按中元乃光武年號光武無庚申庚申乃明帝之永平三年也今石盆尚存近余友林熙工掘地得古磚刻大鵬二年不知何代年號書之以質博雅者古鏡餘姚孫忠烈公初巡撫至江西治廨舍得古鏡于深溝中背刻其文曰光運忠扶日月心感天揚賏忠獨難塞天不世內靖斯以明明字畫竒怪觀者多不識後孫公死好古者以意辨之其文乃著鉶鼎嘉靖初海虞王澄嘗獲一鼎其識曰維紹興丙寅三月己丑太師秦公檜一德協濟配兹乾坤乃作鉶鼎賜家廟以奉時祀子孫其永保是髙宗所賜檜之所受者澄鄙其事乃即家山作萬松樓祀嶽武穆而以鼎奉焉黃云以秦鼎祀嶽恐嶽未必饗也西園雅集宋駙馬王詵晉卿延東坡諸名流當時李伯時寫為圖今世遞相傳摹嵗月既無所考西園亦莫究何在然其人米元章有圖序甚詳國初黃文獻楊文敏林尚默各有考據儒衣冠十四人蘇東坡王晉卿張文潛蔡天啓李伯時蘇子由黃魯直陳無己李端叔朝無咎米元章王仲至劉巨濟秦少遊也釋道各一人僧圓通道士陳碧虛也侍女二人晉卿家妓雲英春鶯也膠山絹海古畫多用膠礬著絹唐宋名家皆然惟元倪瓚輩始喜寫生脫畫家蹊徑唐章孝標咏畫屏風云雨滴膠山斷風吹絹海秋唐宋畫全用膠礬此是一證古碑三代碑刻至今有于世者唯岣嶁禹碑與周石鼓文耳秦則李斯斷碑僅二十九字漢蔡雍石經與孔廟中郎碑陳思王碑蜀有樊侯碑餘俱不可覔曹娥碑曹娥江在浙之上虞當時孫權據越不知孟德何因與楊修至江滸讀其碑也殷藝小説云蔡雍刻曹娥碑傍曰黃絹幼婦外孫虀臼魏武見不能曉以問羣僚莫有知者有婦人浣于江渚曰第四車中人解之乃禰正平便以離合解為絶妙好辭此説與諸書所載大異余謂孟德決無到曹娥江之理或是當時傳印邯鄲淳曹娥碑文而孟德與楊修猜度之只見墨本非親摩碑石也禰衡之解又不知何據語林云操讀碑於汝南其為摹本無疑泰山碑刻泰山秦碑李斯篆在秦觀東廳壁僅存數字唐摩崖碑𨽻字在嶽神祠後為苔蝕其半李白遊泰山詩六章篆刻方石竪會真宫東廡無字碑泰山頂有秦無字碑唐武后乾陵亦有無字碑蓋碑緣文而立立而無字誠不可曉番君碑饒州番君廟碑趙文敏書厚七八寸文敏在京郡人欲乞其書碑重不可載乃鋸其碑面寸許載至京文敏書畢仍合竪之豫至饒見其合縫宛然昔人之好事如此書法遒徑因拓數紙以歸晝錦堂碑姑蘇志云國初陳僖敏公治宅吳城闢地得蔡君謨所書晝錦堂石碑按晝錦堂在相州君謨所書碑字甚巨何因得至蘇州歐陽文集中言書碑事甚詳未聞有兩書者豈後人重君謨筆法重摹刻之如今之閶門翻刻法帖碑本之例決非宋碑也武夷唐刻武夷三十六峰題刻甚多而唐刻絶少舊傳幔亭峰下唐明皇遣使祀仙刻大唐天寶七載嵗在戊子七月封名山大川登仕郎顔行之記共二十四字今不可覔或云石墜水中妄也虎渡橋碑漳州江東驛虎渡橋左有碑巍然是宋淳祐中狀元黃朴撰文併書字法全類栁誠懸石材完好惟篆首缺墜耳余以癸卯冬與曹能始觀賞各拓一通第鄉人不知重兼有覆瓦為亭者惜哉碑厄水經注洛陽天淵池中有魏文帝九花樓殿基悉是洛中故碑纍之澠水間談云景祐初薑遵奉太后意悉取長安碑石為塔材道山清話云天聖中詔營浮圖薑遵在永興毁漢唐碑之堅好者以代磚瓦國朝太祖登基金陵悉取六朝舊碑砌作御道唐歐陽詹集云九江有祖將軍廟碑顔真卿撰文并書後州吏有修碑之勞狀其末迹剗磨舊文詹作文以弔之平淮西碑先琢韓退之而刻段文昌宋郡守陳某又琢段文更刻韓文一石遂遭兩厄湖州天聖寺趙孟俯撰書錯盤龍碑記國初舁入郡治作太守去思碑歐陽公金石録所收古刻千卷今什不得一二皆遭此數厄耳黨籍碑重刻元祐黨籍碑蔡京欲傳示後世使其子孫有餘辱也𢎞治中吳興沈暐以其祖沈千名與洓水伊川聨名懼其久而磨滅取拓本重刻于石今世所傳碑皆沈氏刻子孫有餘榮矣元程二守元絳程師孟宋熙寧中先後守福州山劖石刻多二公筆至今傳為佳事佳話興除舉廢皆稱二公二公俱吳郡人生平稱臭味交故出守行事亦大相類丁刻字趙承旨時鄱陽丁信可者善刻字凡承旨書極喜信可鐫刻打拓他手不如也畨君廟乾元寺二碑承旨所書皆信可刻今信可子孫猶日拓賣丁氏食此碑已十餘世矣他人不得拓也余至鄱陽目擊之柚皮打碑桂海虞衡志云打碑用柚子皮蘸墨以代氊宜墨而不損紙試之良然長慶石萬厯甲申吳興張稚通卜築玲瓏山得一石乃唐長慶間陸羽故物髙可尺許有孟郊題曰長慶甲辰餘杭孟郊來訪竟陵陸宵翁字法遒古尚未剝蝕稚通造軒貯之名友石軒好事者皆為題詠後贈謝在杭為王百谷索去今為王氏家物遊夏文學聖門列四科惟以文學許遊夏子夏於易則有傳於詩則有序於禮則有儀禮喪服篇於春秋則授之公羊髙榖梁赤於論語則鄭康成以為子夏與仲弓所撰定者許以文學夫何忝哉不知子遊當時有何文學而魯論稱之也當是世逺而撰述不傳耳若非魯論并稱之後世孰知子遊亦文學也哉徐氏文人古今文人之盛惟徐氏歷代不乏建安七子則有徐幹一代文宗則有徐陵河東三絶則有徐彥伯江南文士則有徐鉉徐鍇詩𣲖法嗣則有徐俯晚宋四靈則有徐道暉徐致中國初四家則有徐賁盛明四家則有徐禎卿中原七子則有徐中行此皆丁極盛之時而文士輩出名震霄壤者至于單詞片語流傳文苑不可勝紀矣祖孫王羲之七世孫曰僧智永謝靈運十世孫曰僧皎然書法詩學皆不愧祖風後世侈談之不因沙門而薄其祖先也韓托胄為韓魏公之裔時論為之嘆息豈紫衣宰相反不如緇衣髠徒乎信所重在彼而不在此也江淹夢史稱江淹夢張景陽寄錦取還文章日躓又謂夢郭景純索舊筆還為詩才盡何二夢相似之甚然則淹之詩賦皆少作邪沈約獨異志云沈約家藏書十二萬卷然心僻惡聞人一善如萬箭攢心噫此謗語也劉協著文心雕龍未為時流所稱取定於沈約投之車中約取讀大重之嘗陳諸几案倘萬箭攢心定不爾爾嚴武不殺杜甫新唐書嚴武傳云武最厚杜甫然欲殺甫數矣甫本傳云武欲殺甫集吏于門武將出冠鈎于簾者三左右白其母奔救得免而舊史甫本傳云甫登武床瞪目視曰嚴挺之乃有此兒武雖急暴不以為忤然則武未嘗欲殺甫也武卒甫賦八哀詩云空餘老賔客身上愧簮纓甫之感武者至矣豈人有欲殺我者而反哀之耶必不然矣李杜子孫盛唐詩人莫過李杜其子皆早夭至孫曽則泯然矣晚唐詩人莫過元白又皆無嗣惟韓退之子昶孫綰衮俱登進士蟬聨金紫天之報施誠不可知李益栁子厚為其父作神道碑碑隂載其先友六十七人凡天下善士舉集焉知名者僅二十人其中能詩者李益一人而已唐以詩程士為官者未必人人知詩也六十七人僅得一李益不亦難乎賈島馬端臨嚴羽羅願賈島詩歌清淡竒峭可與孟郊張籍比肩舊史不為立傳新史附名韓愈之後數言而已馬貴與博洽卓絶古今嚴儀卿論詩理入三昧羅端良翼雅富如武庫宋史俱不為立傳并附名亦無之史臣之不公如此蓋冠蓋之華易登史册布衣之傑難上石渠賈島官不過主簿貴與儀卿終身草茅端良位不甚顯故史臣特略之然數公之名自有不朽信夫文士不因位顯亦不藉史傳也文士好竒唐劉蛻取生平所為文千一百八十紙起塜以封之自作銘曰文乎文乎其鬼神乎風水惟貞將利其子孫乎白居易寫生平所為詩四部置諸四大藏經中與寺僧約曰不出院門不借官客有好事者任就觀之唐求詩成置之木瓢任流江中識者得之曰此唐山人詩瓢也陸龜蒙以平日詩文稿藏之像設腹中至宋咸淳中里人醉仆其像腹稿始傳南齊禇澄著遺書十卷刻石納之墓中後羣盜發墓得莆廣父子釋義以傳古人藏文各創獨見不相師襲元魯修鄱陽人有詩朋十人皆工詩賦恐罹兵矢失傳埏埴為甓刻瘞山中名曰詩塜宋濂為之銘蓋倣劉蛻也劉蛻文塜在今蜀梓州南二里兜率寺庭前古柏數百株皆虬枝龍幹至今尚存香山飲酒白香山喜飲酒每飲酒必賦詩集中飲酒詩九百首今人無香山之詩沉冥麯糵只可目為酒囊非真能飲酒者也樂天詩友白香山詩與元微之倡和什有六七元白齊名微之為樂天作詩序手自排纂成五十卷不可謂不密矣乃樂天作醉吟先生傳云與嵩山僧如滿為空門友平泉客韋楚為山水友彭城劉夢得為詩友安定皇甫朗之為酒友獨不及微之誠不可解元微之元白雖齊名而微之品格不逮樂天逺甚微之少通崔鶯鶯作會真記暴其事既通籍又夤緣宦官得知制誥為武儒衡鄙厭恬不知怪文人無行殆斯人與溫李北夢瑣言云溫廷筠舊名岐一名廷雲與李商隱齊名時號溫李今皆以李賀為溫李非也志銘兩手明道間洛陽張堯夫卒尹洙作墓志歐陽修為之銘志銘出兩手亦古今希覯也憐才王荆公見劉季孫杖藜携酒看芝山詩即判監酒稅見盧秉但得有錢留客醉之句立薦于朝因登卿二秦檜聞陸士規黃陵廟一絶傾倒如平生若宰執不憐才反荆公秦檜之不若矣進稽古録表司馬溫公撰稽古録成黃魯直為作進表今黃集刻之司馬集刪之可見古人文字無所假借亦不掩為已有也彭乘鄭景望張世南宋彭乘著墨客揮犀鄭景望著蒙齊筆談張世南著遊宦紀聞三公言閩事甚詳蓋曾宦于閩者郡志俱逸其名尚俟考其人而增之黃華淡遊金王庭筠字子端河東人大定間舉進士官不達寓彰德黃華山寺自號黃華老人善草書有文集四十卷子曼慶亦能詩自號淡遊善畫竹仕至行省郎中句曲外史元茅山道士張天雨自號句曲外史工書善詩宋張九成之裔孫也耽犁生洪武初長樂鄭琳自號耽犁生讀書播耨不求聞達同時與鄭定助教友善練子寧有犁生賦張顯宗為之跋又有建安蘇伯厚張智等詩文子萬奎為廣州教授郡志所不載文人慳一第國朝科目限人長才者或慳一第如文徴明王寵文彭文嘉何良俊田藝蘅歐大任文章俱足名世獨靳一舉竟以嵗貢起家豈非命耶郎田二先生杭州近代博雅君子仁和郎瑛錢唐田藝蘅瑛字仁寶號草橋少孤長為諸生尋謝去家故饒一以購書所藏載籍古圖畫金石刻甚富而資日貧瑛無所顧獨敞大屋樹髙庋列置數几危坐諷誦辨異同所著有訂正孝經大學格物通各一卷萃忠録一卷青史衮鉞六十卷後昆斬然俱軼弗傳傳者七修彚稿耳藝蘅字子藝號香宇性放曠不羈善酒任俠喜著書生平所著文集前後數十卷老子指元一卷煮泉小品一卷梅花新譜一卷詩女史二十卷留青日札四十卷晚嵗以貢為新安博士歸常衣絳衣挾二小鬟遊湖上或逢友人則令小鬟進酒促坐談謔時時挾內人遍遊諸山日暮無驢覔得其一乃與內人共跨一驢入城藝蘅詩文在六朝初唐間駸駸入作者之室瑛辨證考核不減藝蘅至於談詩猶説夢也然瑛事母孝兩刲股皆愈內行尤可述耳杜宇鱉靈戰國時杜宇君於蜀舉荆人鱉靈治水水既平禪之位死皆葬於郫今郫南一里二塜對峙鱉靈一云鱉令八公名蘇飛李尚左吳田申雷被毛被伍被習昌兩京房漢有兩京房一為楊何弟子官齊郡太守宣帝時人一為焦延夀弟子東郡頓丘人其説長於災變今漢書京房傳及世所傳京氏易傳皆延夀弟子也林閭林閭氏揚雄之師也見路史七卷第十三之注白帝非叛王莽篡漢凡世之豪傑有志天下者皆得起而誅之公孫述欲誅莽非一日也方豪傑羣起之時孰不欲頓八紘都萬乘述不得罪於漢而盡有益州之地子養一方者十有三年大有功德於蜀臨陳殞命與國存亡一念不降可謂賢矣史書述叛豈可與叛漢者同科按更始二年述自立為蜀王明年夏四月改元龍興是嵗漢世祖以蕭王即位鄗南改元建武是為光武皇帝當是時雌雄未定成敗未分萬一使述功成則光武亦為僭亂耳然光武漢裔漢德方興蜀僻一隅成功匪易述與光武猶項羽之與髙祖也書之為叛不亦過乎寶志公楊大年寶志公宋元嘉中現于東陽郡古木鷹巢中手類鳥爪朱氏婦聞巢中兒啼遂收育之因以朱為姓楊大年始生則一鶴雛家人驚駭貯而棄之江其叔父異之追至江濵開視則鶴蛻嬰兒具焉體猶有紫毳尺餘既月乃落世間怪事往往有之不但后稷之生為異矣白馬三郎常山有白馬三郎廟宋季禱旱有應紹興中龍圖梁默奏於朝曰白馬三郎王審知號也生前已享王爵不宜猶用軍中之號改額昭應常山與閩接壤至今祠祀陳冕陳子昂字伯玉見盧藏用敘并唐書獨雲溪友議載陳拾遺名冕字子昂雲溪唐范攄也當必有據雪峰檀越雪峰祖師初至福州求一菴基弗得侯官人藍文卿指門首池畔大枯樹下草菴與師居之唐咸通十一年見四方雲衲奔輳難安廣衆將所居屋宇三百餘間米倉十二間莊田二十所水牛三百六十頭諸莊田地各立契書分明嵗收米一萬一百石盡捨入常住建大梵剎即今之雪峰寺也乾符二年閩忠懿王具奏僖宗敕號禪師真覺大師封檀越藍文卿明護侯王男藍應潮通祐神君今護法伽藍實文卿父子也歷數百年香火不絶使當時不發心捨此誰其逼之文卿不難一決不惟獲福田利益而寺存則香火永以不墜今之擅文卿之富者不乏其家産留以遺所不知之何人至於布施錙銖慳惜悲夫悲夫鐵冠道人蘇子瞻在海外自號鐵冠道人詹仲和亦號鐵冠道人楊亷夫亦號鐵冠道人洪武初有鐵冠道人張景華常與太宗言休咎未來事菊坡宋季崔丞相與之號菊坡至八世其家有菊數本皆一蒂兩蕊人咸異之以字行國初名臣多以字行楊士竒名遇練子寧名安黃子澄名湜李時勉名懋李至剛名銅唐之淳名愚士吳伯宗名祐張孟兼名丁劉伯序名秩董良史名紀鄭居貞名恆許廷慎名伯旅胡虗白名奎李昌祺名禎王汝玉名璲劉三吾名昆孫桂彥良名德稱金幼孜名善劉子欽名敬錢習禮名幹周是修名德劉季箎名韶至于蹇義舊名瑢楊榮舊名子榮胡靖舊名廣李騏舊名馬皆出上賜也葉給事秀水屠侍御撰建文朝野類編會輯諸書詳備周悉有葉福字叔疇閩縣人建文庚辰進士授給事中極言宗室之非宜建文君怒杖幾死亟遣人歸養其母靖難兵攻金川門首犯其鋒死衣冠歸葬久諱其事楊文敏公入省求其從孫為文碣其墓萬厯初奉恩詔祀于鄉賢祠林文恪公修郡志始為立傳人鮮知之故屠侍御未之列也當時吾郡死建文之難者止福一人而古田林英字章叔為御史自經死妻宋氏亦自經皆彚編所不載按朝野彚編乃陳眉公所纂名史待屠侍御借為已書更名彚編志吾閩死事者止陳彥回陳繼之而不及福與英今史相國世程官南少宰日率同鄉建三忠祠清涼山祀二陳與福英猶缺焉蓋當時無有知其事者志之以俟後人補此佚典也孫太初考太白山人孫一元同時諸公與之倡和實不知其何許人鄭善夫序其詩曰關西豪傑也李夢陽殷雲霄劉麟皆云關中人惟王世貞云太初裔本王家託迹方外馮夢禎云關西王孫易名為孫一元􅎾近閲徐渭逸稿孫山人考云孫一元父早亡而貧以抄書役某府中府公嘉之為出資特補吏密事多任之會覲槖白金四百兩使山人致布政使途被盜無以報命遂亡抵浙寓西湖休寧有范燦者其祖與山人交厚燦告渭曰嘉靖某年諸暨縣丞孫鏞罷官歸寓江都燦大父世商於鹽遇鏞頗傾蓋一日偶及山人事鏞大駭一一道山人出亡事便取所隨譜合之鏞即携其子來子貌亦似山人鏞遂問吾叔今何在燦大父云云鏞強大父偕至湖州拜其世母施氏并其已嫁妹三人相對而哭渭考諸暨官師表嘉靖十二年縣丞果孫鏞也乃曰蜀人山人舊自稱秦人非志者誤乃山人謬託為秦人也觀渭斯考則太初非宗室亦非關中人也明矣嶽禱太宰倪公嶽父尚書文僖公嘗代祀北嶽以禱祀而生公故名豈維嶽降神耶滇二孝子滇南范寅為諸生屢試不第遂成心疾出遊不知所之嘗語其子師顔云吾葫蘆山人也爾他日於此訪我師顔尚幼既長補諸生以嘉靖壬子舉於鄉鹿鳴次日即裹糧之四方尋父凡山巖市鎮僻壤遐陬無弗到行三年至蜀有葫蘆寺叩主僧謂三年前有稱葫蘆山人者寓此今化而瘞之近岡且出其手札真寅筆也師顔慟絶芟莽得穴刺血入骸斂而返葬焉御史黃中疏而旌之又有趙重華大理太和縣人父廷瑞亦諸生亦以不第逺遊莫知所往華甫七嵗至年二十一母沒乃出尋父榜其背曰萬里尋親至武當山有字云嘉靖四十四年十二月二十二日大理趙廷瑞至此華至日乃萬厯六年十二月二十二日也又間關至建康祈于三茅君夢元帝謂之曰爾父故在如是者三覺而由丹陽至毗陵遇老僧示往無錫南禪寺語訖不見明日至南禪見皤髮老叟曝背廊下華心疑之伏地曰我雲南人叟曰我亦滇人出逰時一子七嵗亦澘然淚下各道姓名相持而哭迎歸故鄉茅坤為文以紀之長人苻堅時有夏默獲磨那申香三人身長一丈八尺並多力善射三人每食飯一石肉三十斤翟母漂母漢髙帝厄於楚餒甚翟母常饋食及帝業成母已死矣髙帝封其墓至今名封邱縣漂母哀韓信而進食後報以千金至今廟祀所謂一飯之德不忘也今人報德如漢君臣者鮮矣美人名風晉世美人以風名者惠帝皇后諱南風洛中謡曰南風烈烈吹黃沙石崇婢名翔風翔風石崇妾名翔風諸書互見不同有曰朔風有曰翾風翔朔翾三字相類必有一定者衛夫人衛夫人名鑅字茂漪晉汝隂太守李巨妻王逸少之師也李易安李易安格非之女也格非字文叔濟南人見張文潛集易安更嫁李易安趙明誠之妻也漁隱叢話云趙無嗣李又更嫁非類且云其啓曰猥以桑榆之晚景配兹駔􅀈之下才殊謬妄不足信蓋易安自撰金石録後序言明誠兩為郡守建炎己酉八月十八日疾卒且云余自少陸機作賦之二年至過蘧瑗知非之兩嵗三十四年之間憂患得失何其多也作序在紹興二年李五十有二老矣清獻公之婦郡守之妻必無更嫁之理今各書所載金石録序皆非全文惟余家所藏舊本序語全載更嫁之説不知起于何人太誣賢媛也容齋隨筆及筆叢古文品外録俱非全文徐氏筆精卷七
