body:
  text: 徐氏筆精雜家類二雜考之屬提要臣等謹案徐氏筆精八卷明徐􅎾撰􅎾字維起更字興公閩縣人是編分易通經臆詩談文字襍記五門其曰筆精則取江淹别賦語也􅎾以博洽名一時朱彛尊静志居詩話謂見其遺書大半施􅖳㸃墨題端跋尾然是書踳駁之處乃復不少如以乾象陽在下為老子之猶龍以坤卦黄中艮卦行其庭為皆指道家之黄庭以繫辭逰魂為變為釋氏之四生六道皆不免好為異説援儒入墨從王柏之説謂野有死麕為滛詩從焦竑之説謂洛書出佛經從陳元齡之説謂周實建寅皆失詳考他若以鐵裲襠為馬鞍之餙不知裲襠為袙腹廣雅本有明文以漢郊祀歌寗字當増入庚青韻不知齊梁以前本無四聲謂杜詩郫筒本李商隠不知商隠在杜甫後謂冬青引唐珏林景熙二集並載不知景熙有集珏無集謂溶溶為水貎晏殊詩不應借以詠月當改為雨不知月穆穆以金波以水比月漢郊祀歌已然謂一東二冬為沈約所分而不知約之詩賦二韻實皆同用據李涪刋誤分用者乃陸法言謂蒙齋筆談為鄭景望作沿商濬之誤不知乃葉夢得書謂李清照為趙抃子婦不知趙明誠乃挺之之子謂琵琶故事皆婦人而男子無聞不知賀懐智康崑崙羅黒黒紀孩孩皆著名唐代亦多渉踈舛至謂杜牧語多猥澁羅隠詩極淺俗而稱髙啟梅詩詩隨十里尋春路愁在三更挂月村句為在林逋踈影暗香一聨之上尤為鹵莽甚至謂孟子不深於易理周公之作金縢為不能以命自安尤明人恣縱之習特其采摭既富可資考証者頗多亦有不可遽廢者衡其品題盖焦竑筆乗之流亞也乾隆四十三年八月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
