body:
  text: 徐氏筆精卷八明徐􅎾撰雜記文恵文安宋陳文恵堯佐以太子太師致仕卒年八十二子十人長尚書主客郎中述古次比部員外郎求古次主客員外郎學古次虞部員外郎道古次大理寺評事博古次殿中丞修古次秘書省正字履古次光禄丞游古次大理丞襲古次太常丞大祝象古我朝林文安瀚以太子太保致仕卒年八十六子男九人長鄉進士庭桂次太子太保工部尚書庭㭿次指揮僉事庭楷次慶逺知府庭杓次廣東都司經歴庭樟次潮州推官庭榆次上虞縣丞庭枌次鄉進士庭枝次太子少保禮部尚書庭機古今多福多夀多男子兩公而外不多見也二公俱史館知制誥俱諡文而子皆列宦籍尤相等也狀元宰相宋狀元為宰相者六人吕蒙正王曾李迪宋祁留夢炎文天祥國朝狀元為相者十四人吳伯宗胡廣馬愉曹鼐陳循彭時謝遷費宏顧鼎臣李春芳申時行朱國祚周延儒商輅浙江文塲𢎞治壬子浙江文塲中夜半塲中人見東西立二巨人一衣緋一衣緑合言曰三人好做事遂隠不見是年胡公世寜王公守仁孫公燧同舉于鄉卒之宸濠之變胡公發其奸孫公折其氣王公平其難三人相次成功云見王允寜孫忠烈傳第十九名建陽李有年舉嘉靖庚子鄉試第十九名其弟有則舉己酉亦第十九名有年子聞韶舉萬厯甲午亦第十九名父子兄弟榜次相同亦一竒也又建寜貳守吳興施可大二子夀明浚明先後中萬厯壬辰乙未㑹試俱第十九名尤竒矣掾曹國朝進取不拘資格有掾史而置身青雲者自況鍾外不可悉數如閩縣吳復任工部侍郎陳永祥任恵州知府南平楊文達恵安洪炬俱任太僕寺丞連江孫瑛任吏部郎中建安盧大政任吏部主事侯官胡鼎任户部郎中福清游元欽任濟南通判髙世岳任承天通判孫瑛洪武中陳永祥宣徳中吳復胡鼎天順中楊文達洪炬正徳中盧大政游元欽髙世岳嘉靖中父子百嵗義烏人陳世恭至萬厯戊寅年一百六嵗子陳迪亦夀九十八嵗福清三老宋季福清有三老政和間林雄年百七嵗紹興中林洞年百十七嵗並恩授迪功郎張魏公浚名其堂曰眉夀二子年俱九十餘同時有吳齊年九十三亦恩授迪功郎又蔡伯俙三嵗舉神童年八十七卒林瓌年九十卒烏青九老姓氏宣徳間湖州烏青鎮有九老趙嶬官序班年九十一吳煥年九十趙岐年八十九孫孟吉建文中太常博士年八十五水宗達運司年八十二漏瑜建文中御史唐其諒建文中縣丞胡敏錢郁年皆八十漏瑜㑹稽人唐其諒鳳陽人革除後流寓烏鎮俱能詩結社倡和亦一時之盛莆田九老八老嘉靖初莆田有逸老㑹皆鄉邦之望都憲林茂達年七十五憲副吳希由逸士林嘉績俱年六十七御史林季瓊知縣宋元翰俱年六十五憲副林有年年六十四侍郎鄭岳年六十三侍郎林富寺丞李廷梧亦㡬六十有逸老詩集行於世隆慶己巳有耆老㑹太守鄭弼年七十八少参雍瀾年七十七太守陳叙年七十六運使林汝永年七十五主事柯維騏年七十四太守林允宗年七十二尚書康太和年七十一太和賦詩云故里重開耆老㑹七人五百二十三後尚書林雲同年六十九亦與斯㑹真太平盛事也同居世傳同居皆曰張公藝九世難矣熙寜中上虞劉承詔家同居十世四百餘人趙清獻為越州具奏上聞旌表其門人鮮知者田子藝留青日札序至十八世承詔不與積善之家人行一善可謂之善矣行數善可謂之積善之人如范希文父子捐麥舟事可謂之積善之家矣易曰積善之家必有餘慶非指一人一事言也智巖警語世有怨府畏途禍胎鬼趣積習晏安於其中未曽一念覺悟今人於四者無不蹈之後患其能免乎殺人欠債諺云殺人償命欠債還錢今之豪家以威勢殺人貨賄官府即脱巨室以厚息逼人致死官府亦不之究是殺人還錢欠債償命也好給沙門何次道好佛供給沙門而不施貧乏殷仲堪好道不恡財賄而嗇于周急今有佞佛求福者廣施貲財不吝千金而貧交尠一錢之贈與其結納髠徒不如周賑困乏延師舫陳履吉林熙工皆余友也熙工修淨業足跡尠入城市履吉雅重之一日具贄幣拜熈工為師執弟子禮特造一船扁曰延師舫履吉長熙工一嵗鬚髭盡白同輩無不笑之目為病狂履吉曰今之司理縣令皆少年科第無道徳學問足以教人而人望風投拜惟恐其不我納也一與晉接人以為榮吾之求師非求少年權貴世自病狂吾何病之有然熙工儼然受其隅坐兩見其髙也交友利瑪竇歐邏巴人也著天主實義人傳誦之而交友論尤切中人情有云古有二人同行一極富一極貧或曰二人為友至宻矣竇法徳曰既然何一為富者一為貧者哉言友之物皆與共也又云視其人之友如林則知其徳之盛視其人之友落落則知其徳之薄死友張幼于有友姚文學懋言借齋中養疾疾篤其伯氏懋樂欲舁之歸幼于艴然曰生為吾友死即非吾友耶竟卒于館舍幼于服緦送之嘗閲陳沂蓄徳録載吳文定寛為修撰時有同年賀恩寢疾將易簀託于公之旁廡公即掃室請遷及卒舉殮於中堂使其子服衰以答弔者幼于此舉可謂不愧文定矣通財余嘗嘅朋友無通財之誼聖門諸賢推顔子原憲為最顔則簞食瓢飲所居陋巷原則三旬九食捉衿見肘甕牖繩樞貧亦極矣乃同時有子貢廢著鬻財于曹魯之間最為饒益且結駟連騎以訪原憲又有公西華乗肥衣輕當時亦不能分給二子稍稍不至乏絶可見通財之義賢者猶難之况末世乎善夫利西泰交友論曰一貧一富號曰相知某人曰既云相知何為一貧一富哉温公僕司馬温公家一僕三十年止稱君實許魯齋在中書欲買一僕牙儈以能應對􅈺禮節者進輒謝去後得蓬首垢面愚騃者用之或詰其故曰聰明過我我反為其所使矣噫此腐儒之見也蘧伯玉使人於孔子孔子曰使乎使乎未嘗愛愚騃之人也至司馬公為其僕呼君實乃公之盛徳若人家畜此奴不大悞事耶後世腐儒遵此為訓是主僕皆憒憒者耳閩中福興漳泉人家僕軰頗跳梁然皆識體至延建邵汀主人肅客而捧茶僮奴隅坐主人不以為怪僕愚騃垢面終身不知著衣戴帽魯齋之言悞之也狐䑕蚊盜晝伏夜動者狐也䑕也蚊也盜也四者秉隂氣人之所惡也士君子昏夜乞哀其狐䑕蚊盜之類與夀夭户樞不蠧流水不腐是以安逸者常多疾病勞碌者恒鮮損傷好花易謝不材天年是以智巧者恒致夭折魯鈍者多享遐齡飲食髙帝不忘情於頡羮韓信不負諾於漂絮靈輒赴難以酬恩淵明乞食思㝠報誰謂口腹之㣲無闗心身之重祈禱武王疾而周公以身代聖人亦不能以命自安孔子病而子路以禱請賢者亦不免以神為佞是以聖人賢者作之於前愚夫愚婦惑之於後再拜玉藻君酒肉之賜弗再拜子思於繆公餽鼎肉稽首再拜而受孟子亦曰以君命將之再拜稽首而受子思孟子先與禮舛矣毋怪後世之廢古禮也諺今人諺語皆本於古句法恒相類如掩耳偷鈴刻舟求劍坐井觀天抱薪救火守株待兎膠柱調瑟落井下石隔靴掻痒炊沙作飯見兎放鷹灼艾分痛臨寒索裘又如水中摸月佛面削金管中窺豹夢中説夢屋上架屋人皆常談鮮有究其義者山林公案友人陳履吉云山中何景最竒曰雨後露前花朝雪夜何事最竒曰釣同鶴守果遣猿收華亭陳仲醇云三月茶笋初肥梅風未困九月蓴鱸正美秫酒初香勝客晴窓出古人法書名畫焚香評賞無過此時二語足為山林公案睡訣陸文量睡訣云半酣酒獨自宿軟枕頭煖葢足能息心自瞑目余不甚喜睡嘗有訣云俗事簡聲色恬不怯冷無苦炎厚襯褥低下簾倦即卧自黒甜友人陳履吉云手宋人陳編輒自引寐此山窓睡訣也過矣過矣煮茶友人羅髙君曰山堂夜坐汲泉煮茗至水火相戰儼聽松濤傾瀉入杯雲光㶑灧此時幽趣未易與俗人言奕棋奕雖小技然日長一局是最清境界林君復生平極清至以著棋與擔糞並稱煞風景矣不如楊廉夫云棋損閒心畫為人役語和緩有致銕冠楊廉夫號銕冠道人所戴銕冠重四錢六分向藏髙太醫家陳眉公今收得之聞其買銕冠時正在除夕前數日公私之逋蝟集猶抽力置此足稱名士竹如意笋籜冠南齊明僧紹隠勞山詔徴不就賜竹根如意笋籜冠隠者以為榮著裘帯帽華亭孫雪居太守十月便以薪草縛柑橘上陳眉公曰此為木奴著裘余小園中喜種菊結苞時以龍眼殻罩之直至臈後放殻始開陳惟秦嘗戲余云此為菊花戴帽可為的對種菜宋宇種菜三十品雨後按行園圃曰天茁此徒助余鼎俎周顒曰春初早韭秋末晩菘王維詩云松下清齋折露葵三君皆得農圃風味此况未可與肉食肥漢道也蹲䲭顔氏家訓云江南有一權貴讀誤本蜀都賦注解蹲䲭芋也乃為羊字人饋羊肉答書云損恵蹲䲭舉朝驚駭張九齡知蕭炅不學故為調謔一日送芋書稱蹲䲭蕭答云損芋拜嘉惟蹲鴟未至耳然僕家多怪不願見此惡鳥也九齡以書示客滿座大笑赤雪仙家有絳雪晉朝雜事云太康七年雨赤雪二頃唐五行志貞元二十一年正月雨赤雪于京師孫甫有論赤雪䟽非祥兆也甜雪周穆王時西王母獻嵰山甜雪見拾遺記金馬碧雞金馬碧雞二山在雲南神在成都漢遣王褒祀金馬碧雞之神實在蜀也蜀有碧雞坊薛濤曽居之廬山周武王時方輔先生與李老君跨白驢入山煉丹得道仙去惟廬存故名廬山又云周威烈王以安車迓匡續續仙去惟廬存因命其山為靖廬山邦人以先生姓呼匡山又曰匡阜山川異聲平涼有彈箏峽峽口水流風吹滴厓如彈箏之韻金陵靈谷寺有琵琶街湖口有石鐘山武夷有鼓子峰皆山川之異聲也武夷木樓武夷鼓樓巖舊志云石樓四楹非也萬厯癸未五月陳孔震司馬憑陳羽士引至鼓子峰前鐘模石下縁石壁至其所見木造鼓樓一區髙廣三四尺瓦甓皆以木窓櫺户牖皆具制甚精巧釘頭出木外四五分不知何代物傳云飛來或然也司馬至時不難及歸怖甚幾作昌黎華山之慟程羽士力掖之始得下吕梁洪石硯吕梁洪行署之北山韞美石可為硯嘉靖初張鏜為主事分司其地始剖石製硯姚明山淶紀其事云此石貞潤受墨不讓端歙徐州又有一種花斑石非此類也印文内外諸司印文俱用叠篆以九畫為止字用成雙不及雙者足以之字而總兵所掛印文則用栁葉篆其玉璽與王府之寳則用玉箸篆其印形方大小有差一品者三臺二品者二臺俱銀三品以下者銅惟應天府特賜銀印廵按御史鐵印柄端有孔條穿之其餘職衙門則形稍長不方謂之條記永樂天順正徳南唐賊張遇賢宋方臘俱改元永樂遼舒嚕號天順皇帝宋西夏賊號正徳我朝同此三號儒臣失考之過也甚矣宰相湏用讀書人周太祖十二樂五代周太祖廣順元年邉蔚議改漢十二成為十二順之樂祭天神奏昭順之樂祭地祗奏寜順之樂祭宗廟奏肅順之樂登歌奠玉帛奏感順之樂皇帝行幸及臨軒奏治順之樂王公出入送文舞迎武舞奏忠順之樂皇帝食舉奏康順之樂皇帝受朝皇后入宫奏雍順之樂皇太子軒懸出入奏温順之樂正至皇帝禮㑹登歌奏禮順之樂郊廟俎入奏禋順之樂酌獻飲福奏福順之樂祭孔宣父齊太公降神同用禮順之樂三公升降及行同用忠順之樂享籍田同用寜順之樂今五代史無志故樂名闕焉十二樂見郭茂倩樂府足補史氏之缺金花帖制唐登進士有金花榜帖用塗金黄紙濶三寸長四寸大書姓名下有兩知舉花押仍用白紙作大帖貯金花帖外亦書姓名二字葢以此報其人也見崑山志茶户北苑團茶盛於宋民編徭役名曰茶户及至我朝久罷其貢而茶户子孫年費數十金輸官多至破産歴洪武迄萬厯初無有議免其額者泰和郭公子章理建州㢘得其狀請於兩臺蠲其税夫團茶之貢久廢禍及茶户十數代子孫無名横征莫此為甚郭公初仕即能釐數百年積弊真有實政在民者不識當時丁蔡輸貢日民之苦又何如也孟子出妻荀子言孟子惡敗而出其妻韓詩外傳言孟子欲出妻因母言而止二説不同書可盡信哉髙柴為武城宰人知子游為武城宰不知髙柴亦為武城宰而化行民有不服其親者改之行䘮如禮君子之徳風也以身先之而民不遺其親右見陶元亮士孝傳家語亦云仕為武城宰子平宋有徐子平精星學術士宗之但稱曰子平子平名居易五季人與麻衣道者同隠華山今之推子平者祖宋末徐彦昇實非子平也玉璽圖説天啓四年九月四日磁州東八里臨漳縣務本村漳河北岸有田夫邢姓者正畊野間瞥見異風數陣河岸攤塌聲震林木隨滚出黄白色物如斗大光芒陸離精彩奪目三尺許乃除去浮土得玉璽不敢自秘因呈本道按而騐之重一百二十兩方各四寸面厚一寸二分螭龍紐髙一寸八分篆文曰受命于天既夀永昌於都懿哉余觀此寳埋光掩彩不知閲㡬千年聖明在御遂獻禎符是天終不愛道地終不愛寳也所謂既夀永昌且為我皇上發之矧夫黄河澄清鳳凰來儀諸瑞畢至廼爾未有禎祥迭見如今日之盛者億萬斯年惟願皇上相傳若此敢不靖共厥位以輔受命于無疆哉分廵河北道副使齊東張夢鯨撰按南村輟耕録云至元三十一年甲午春正月太師國王之孫曰實徳哩者嘗得通政院事既歿家計窘極其妻托克托濟農病一子九嵗以玉貿供朝夕及出玉印也取視色混青緑而𤣥光彩射人其方可尺四寸厚方之三背紐盤螭四厭方際紐盡璽􅠂之上取中通一横窽可徑二分舊貫以韋條面有象文八皆若蟲鳥魚龍之狀其文曰受命于天既夀永昌此傳國璽文也秦以和氏璧所造厥後有天下者寳之以君萬國御史楊桓率百官進獻皇太后御前傳㫖賜收玉之家楮幣三千五百貫御史中丞崔彧進傳國牋歴攷累朝傳授亡失之由見輟耕録但篆文係鳥跡非若天啓四年臨漳所拾者也崔彧牋曰徽宗為金所虜凡有寳璽金皆取之内璽十有四青玉傳國璽一與至元所獻同則知南渡二百年無傳國璽也明矣天啓四年所獻璽與至元大小不相侔篆文亦異豈徽宗十四璽中之一乎記之以俟博古者石鐘湖口石鐘山水經注以為水石相搏若洪鐘唐李渤以為潭上有雙石聲清越若鐘蘇東坡親履水濵聽風濤鏜鞳遂非李説千百年㡬成聚訟東坡好竒者也又酈道元載之水經可據若李説山石之響宇内何處無之烏足以名是山哉瓦棺人死藏魄於木古禮也金陵瓦棺僧事甚異陸放翁筆記云靖康丙午臨卭夾門鎮山險處得瓦棺長七尺厚二寸與木棺同骨猶不壊然則昔之以瓦為棺不獨一僧也金蓮炬金蓮炬送歸院始于令狐綯宋王珪蘇軾晁逈史浩亦被此寵今人但知蘇軾銕硯古人用銕硯者桑維翰也洪厓先生欲歸河内舍人劉守璋贈以揚雄銕硯以銕為硯始自揚雄維翰效之耳琵琶故事琵琶故事烏孫公主王昭君潯陽商婦最著皆婦人也男子無聞放龜毛寳放龜事實其軍人見寳本傳諸書誤以為寳相沿不察寳守邾城石虎遣將攻城寳突圍出溺死江中戮鱷人但知韓文公能驅鱷魚逺徙而不知宋陳文恵堯佐詔縣吏操網捕鱷戮而烹之唐有鱷既徙至宋猶出食人文恵一戮之後不聞鱷再為患然則文恵之功在昌黎上矣文恵有自撰戮鱷文放鶴徐州雲龍山有山人張天驥放鶴亭山人有二鶴甚馴旦則望西山而放莫則望東山而歸蘇子瞻為作記今人但知林和靖孤山放鶴亭而天驥之名不著特表出之捕蟬今之穉子捕蟬每用桃膠塗竹竿梢上粘之即得曹子建云怪柔竿之冉冉兮運㣲粘而我纒欲翻飛而逾滯兮知性命之長捐葢自古已然矣朱子前定數義烏東平山有宋平昌刺史劉豪墓隆慶戊辰長至裔孫尚恭重修墓碑掘數尺見墳臺臺上有磚方尺許刻晦菴卜墓數云天聖戊辰塟此丘䕃十八紀出公侯子子孫孫垂不替繩繩武武永無休五百四十一年損十七八嵗裔孫修戊辰戊辰新一石重修重修千百秋秘書郎朱熹書按天聖戊辰至隆慶戊辰年數良是而長至又恰戊辰仍孫劉仕龍在宋贈武節侯修墓裔孫果年十七嵗文公之數亦竒矣劉之曽孫煇熺皆文公門人故為之卜而刻之墓吳司空夢新建吳司空桂芳未第時至鯉湖禱夢仙書云蘭陵美酒賞心樂事功蓋天下澤及萬民公宻記之人問夢只以前兩句對及登第出守揚州蒞任之日見酒肆中懸一招牌則前兩句憬然有悟但後兩句未騐耳後公累官漕運總督經畧淮海晉工部尚書以勞瘁卒贈太子少保制云功蓋天下澤及萬民乃歿後始驗也水去就好華亭曹别駕藩為書生日禱於鯉湖夢一童子云君榜上已有名但水去就好甲午試北畿從閘河入京竟不第迨丁酉嵗焦弱侯為考官録其文魁禮經寫榜人誤書藩字作畨所謂水去之應也别駕與余言禇氏平脈南齊禇澄精於醫著書十篇刻石殉塟後盜發其塜書傳人間第三篇平脈言女子肺脾命在左心肝腎在右與今人診脈殊異録之備攷學醫五難祝允明云病家貴驕不肯敬從一也病人愚愎強謂自知不能服從二也愚下之輩不辨良庸時有劣工謬得俗譽愚下必棄上匠而委劣工三也劣謬之徒信其妄施偶中他力自執為是四也良雖薦藥服者他參用而復疑愈不専工敗乃分謗五也阿育王塔四明鄮山阿育王塔晉太康三年從地湧出其狀青色似石非石髙一尺四寸方廣七寸露盤五層四角挺然中懸金色小鐘舍利綴於鐘下圓轉不定繞塔四周俱是鏤空諸佛菩薩金剛聖僧八部等像神工聖迹非人力所及萬厯丙子平湖陸五臺公瞻禮初見舍利大如芡實已如彈丸已大如𤓰最後大如車輪五色變幻光彩射目壬子泰和郭孔泰孔陵到山瞻禮舍利初視若黍珠已如豆如蓮子同觀者或見如新菱出殻兩角垂絲絲綴以珠或見如葡萄色或見如桃瓣或見如金蓮花瑞相種種莫可殫述始知佛大神通歴千百年不滅也金雞武夷接筍道士程應元者曽入金雞下洞從舟中仰視洞若不甚深廣所堆木若有限比履其所甚宏邃内有三丈餘楠木上閣仙蜕十三函每函頭顱一二片脛骨一二莖手骨一二節皆裹以錦帕一函中有鶴骨頭與足各一又楠木刳一舟長丈餘濶三尺内細羅香末并香灰㡬滿而洞中香灰成堆者亦纍纍然上金雞洞視下洞為小人不敢到萬厯丁丑五月有張富郎者年八十餘冒險入其中則見數人鼾睡香灰内傍有銅磬覆地富郎翻而視之磬下一雞遽展翼鼓扇香灰眯目倉皇俯伏半晌稍息亟由籃縋下半空籃掀富郎墜入舟子懐中無恙後年九十終應元親見富郎道其詳陳司馬又親見應元紀其實金雞洞香爐武夷金雞洞舊志云嘉靖甲午飛來銕香爐可三百斤戊戌御史李元陽作記謂洞中見新置一物如香奩狀丹朱炫耀約方六七尺侍御先一日望洞中無有次日乃有見洞在二十仞之上下臨不測何一宿之頃能致之速耶據此二説則洞中飛來者先為香爐後飛者不知何物也邇年陳司馬孔震記云只見洞傍小石巖中有一爐若盤盂而不見所謂六七尺及三百斤者豈變幻無常耶石鏡髙州府城有洗夫人廟祀梁太守馮寳妻廟前古碑一通厚可尺餘有石鏡一㸃白色形類碁子通明瑩徹視之可見後殿屋宇器物余幼游髙涼及壯所見異物僅此耳蛇精蟒精范鎮東齋記事云蔡君謨知福州疾不視事者累日夜夢登鼓樓憑鼓而睡通判有怪鼓角將累日不打三更者因對數夜有大蛇盤據鼓上君謨既愈與通判言所夢正與鼓角將所説同遂以君謨為蛇精米襄陽志林云米知無為軍嘗呼譙門鼓吏曰夜來三更不聞鼓聲吏言有巨白蛇纒繞其鼓故不敢近米頷之叱吏去不復問故郡人疑其蟒精朱晦菴魏鶴山宋咸淳間蜀人彭澹軒罷江東倅遊武夷山嘗獨行林藪入草菴中見二士夫峩冠博帯對食招彭坐俎中豕首一羊肺一雞一所言皆先天圖易傳性理之學𤣥妙深奥不可暁彭問其姓字右坐者曰姓魏山林野叟無字可稱問左坐者不答日暮辭出彭明日携僕挈榼再往無徑可達下山至一富家言所以富家曰異哉昨日至朱祠致祭正俎中之肴方悟左者朱晦菴右者魏鶴山也此段載異聞總録可備武夷山志之缺鱉異錢塘張尚書曽孫某典簿堯恩之子也有塘栖吕氏饋張活鱉張付烹炰俄聞釡中有慨嘆聲張異之取視而鱉斃矣剖其腹中有人長二寸眉目口鼻肢體手足無一不具跏趺坐蓮花上金中丞公子魯親見之為余言時萬厯戊申年也龜異孫太初居南屏山時養一龜後去道塲山遺龜于南屏僧寺孫化十數年僧明鏡夢青衣人求救曰某孫太初伴也願師明晨索我于花臺之下僧悟往發得一龜徑尺為石所壓其筒半裂而蛆叢集僧欲瘞之越夕不知所往然嵗嵗聞其聲至今不絶魚異仁和張問渠者冡宰元洲之兄也母陳畜朱魚二十餘頭玩弄日久母殁問渠哀毁不忍往視皆變為白羣客聚觀咸謂魚常變色無異也比及去䘮之日魚復變赤儼同除䘮人謂孝感所致金字牌萬厯己酉五月十四日揚子江心風浪大作有渡船載百餘人㡬覆忽見浪中有鬼面者持一牌起書金字一字衆謂必有金姓者在舟當死果有姓金者一人衆欲推之入水金本持齋誦經乃曰若活衆命吾何惜死然數止此安能倖免乃躍入水中時風狂舟速金彷彿若有人扶之出巨浪送上郭璞墓墩而立見舟翻覆俱溺死獨金得生江右劉觀南觀察親見其事毁佛魏莊渠毁佛搥碎六祖遺鉢折寺院無數後嗣乏絶聶雙江毁寺亦無嗣誰云佛無報應哉雷震毁寺蜀成都府彭縣有寂光寺廣袤五六里香火甚盛其地有縉紳劉志淵者垂涎梵宇可拓私居斥逐僧流毁除佛像方埋佛入地忽霹靂一聲震志淵立斃身首異處火玉唐武宗時夫餘國貢火玉光照數十步積之可以然鼎寘室内不必挾纊古所無也窑變饒州府學神庫中有窑變香爐一花瓶二相傳舊為回青所畫變成赤色今花紋或淡或濃宛然錦繡上署永樂四年造但神爐非玩器也宋硯三十年前吾鄉宋硯最多人不知重故家收藏與凡硯等余目擊宋硯不下百數二十年間轉鬻吳越殆盡葢鄉人利其厚值故也余友林熙工家藏一硯石質完好背刻嘉祐御賜鄭穆六字林得于鄭之子孫真世寳也穆字閎中侯官人居館閣三十年官至祭酒閩先達也此硯欵識宛然為吾鄉第一流黄劍上元夫人佩流黄劍㑹王母於漢武宫中軟倭刀嘉靖中胡總制宗憲有軟倭刀長七尺出鞘地上卷之詰曲如盤蛇舒之則勁自若唐天寳時有軟玉鞭光可鑑物屈之則如環伸之則如繩亦異國所獻銕玉最堅剛之物能屈伸之理之不可暁者鵲尾爐費崇先信佛法以鵲尾香爐置膝前陶貞白有金鵲尾香爐料絲燈料絲出滇金齒者勝詢之土人云以瑪瑙紫石英諸藥品搗為屑煮腐如粉然必市北方天花菜㸃之方凝即繅為絲織如絹狀上繪山水人物諸色極晶熒可愛以煮料為絲故名料絲桃花故事謝在杭文海披沙徴芙蓉事極多謂他不能稱是予以桃花為名亦甚夥因列于後桃花源武陵桃花渡四明地名桃花雨天寳中雨如桃花明年有馬嵬之變桃花水三月之水桃花浪杜詩三月桃花浪桃花醋唐世風俗貴葫蘆油桃花醋桃花蜆海錯桃花蹊桃花紙楊炎在中書糊窓用桃花紙塗以水油桃花馬馬名桃花稉閩穀名桃花石在定海桃州山昔安期生以醉墨洒石成桃花桃花扇桃花帳桃花縹二千石後名出漢官儀桃花信毒藥桃花米宋武帝張妃事桃花癲桃花妝貴妃事開寳遺事桃花酒酒漬桃花益人顔色見太清卉木方桃花犬宋太宗淳化中綿州貢桃花灘在貴溪縣桃花觀元都觀在朗州桃花靣人靣桃花相映紅崔䕶詩桃花賦皮日休桃花岩在邵武桃花洞在杭州桃花精博異記紅衣人送酒事桃花嶺談圃石曼卿判海州日以桃核抛嶺上二三嵗花開如錦桃花舖安慶太湖縣桃花臉桃花腮桃花塢杭州臯亭山鍾山獨龍岡桃花煞咸池煞桃花犬山西廉使趙澤民家獵犬見秘笈桃花偈志勤禪師桃花汗貴妃桃花井師曠聞天老曰井上種桃花落井中不祥桃花㕔在許州梅聖俞有詩桃花絲青齊間桃花垂絲二三尺練以松脂相纒織鞋履雲仙雜記桃花骨守宫塗臂而骨紅名桃花骨桃花行李嶠作桃花詩帝采入樂府因名桃花寺見宋趙師秀詩桃花夫人即鬼夫人見杜牧詩桃花茶東坡詩問大冶長老乞桃花茶凌霄金錢凌霄花金錢花皆有毒不宜近眼花露入眼則失明刺桐嶺南異物志曰刺桐南海至福州皆有之叢生繁茂唐陳去疾家于閩郡因言方物云刺桐葉緑花紅今泉州名刺桐城問之泉人亦云不識此樹何狀福州葢未之見矣枸杞枸杞續仙傳朱孺子見二犬入杞叢下異之乃尋掘得二杞根形如犬故名狗杞杜子美以狗杞對雞栖白樂天詩云不知靈藥根成狗怪得時聞夜吠聲後世方書皆曰枸杞誤也大茶天台記丹丘出大茶服之生羽翼又蒙山頂茶一服祛疾二服無病三服換骨四服即為地仙故盧仝歌云但覺兩腋習習清風生蓬萊山在何處玉川子乘此欲歸去皆有所據非漫語也異草善語國有草食之令人不眠名却睡草洞㝠記興慶池南有草紫葉而香醉者嗅之即醒名醒醉草開元遺事常山有草置諸門夜有人過輒叱之名䕶門草酉陽雜俎東海祖州有草人死三日覆之即活一株可活一人名不死草十洲記瓊州有草視其節知一嵗風候名知風草一統志黄帝時有草生於庭佞人入則指之名指佞草御覽漢武帝時異國獻草似蒲帝思李夫人懐此草輒夢見之名懐夢草酉陽雜俎禹餘糧張華博物志曰扶海川上有草名蒒其實食之如大麥七月熟民斂之至冬乃訖名自然榖或曰禹餘糧唐詩云澗有堯時韭山餘禹日糧嘉客紅宋福清翁昭文先儒亢從子也圃中非時生荔支其母曰豈有嘉客踵門耶頃之莆田林光朝至因名為嘉客紅可補荔譜之缺龍荔交南有一種龍荔實如小荔枝味如龍眼木與葉亦類閩廣陳剛中詩云龍荔綴如珠三寸柑凡柑皆圓獨成都産者形如鴨卵故杜甫詩云三寸黄柑猶自青三寸言其長也余嘗過臨江府地産黄柑有長三寸者嘉慶子唐韋述兩京記東都嘉慶坊有李樹極美故稱嘉慶李千百年後稱李子皆曰嘉慶子他物未有如此之得名悠久也丹青樹西京雜記云終南山有合離樹紅緑相雜斑駁如錦繡長安謂之丹青樹蚊樹嶺南異物志曰有樹如冬青實生枝間如枇杷每熟即坼裂蚊子羣飛惟皮殻而已名蚊子樹今永福山中有之鄉人為余言梟非不祥梟惡鳥也人聞其鳴輒為不祥昔謝艾梟鳴牙旗乃兆軍勝張率南梟鳴庭樹乃兆授官唐章顓將放榜日梟鳴簷際逐之復還顓曰我失意無所恨兼恐横罹災患湏􅁷榜出顓登第然則梟非惡鳥也念佛鳥九華山産念佛鳥形大如鳩色黄褐翠碧間而成文音韻清滑如誦佛聲唐韋蟾詩云靜聽林飛念佛鳥細看壁畫䭾經馬龍九子龍生九子所載不同一曰蒲牢好鳴鐘紐之獸囚牛好音樂器之獸鴟吻好吞殿􅆃之獸嘲風好險殿角之獸睚眦好殺刀頭之獸屓屭好文碑旁之獸狴犴好訟獄門之獸狻猊好坐佛座之獸霸下好重碑座之獸又云瓦猫好險簷前獸饕餮好水橋下獸􅀈􅀈好慵門前獸憲章好囚獄門獸蜥蜴好腥刀頭獸蒲牢霸下屓屭鴟吻與前同猫睡猫之善捕䑕者日常睡終日跳擲者必不捕䑕見陳止齋集猫不捕䑕者名麒麟猫有味鮫魚皮閩中産銅鐵鑄刀劍甲天下劍鞘以鮫魚皮為之堅硬如石海中有魚名鮫魚或以為鯊魚皮非也李長吉劍子歌云鮫鮐皮老蒺藜刺鸊鵜淬花白鷴尾正指此也魚皮隠起細刺如蒺藜故云鱟車螯蠣閩中産鱟見韓退之詩車螯見歐陽永叔詩蠣見蘇子瞻詩徐氏筆精卷八
